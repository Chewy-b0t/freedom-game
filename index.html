<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Freedom Fighters">
<link rel="manifest" href="./assets/icons/manifest.webmanifest">
<link rel="icon" href="./assets/icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./assets/icons/icon-192.png">
<title>Freedom Fighters vs War Mongers</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --frame-size: 2px;
  }
  body {
    background: #0a0a0f;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
    padding:
      max(0px, var(--safe-top))
      max(0px, var(--safe-right))
      max(0px, var(--safe-bottom))
      max(0px, var(--safe-left));
  }
  canvas {
    border: 2px solid #1a1a2e;
    image-rendering: pixelated;
    cursor: crosshair;
    display: block;
    width: min(
      calc(100vw - var(--safe-left) - var(--safe-right) - (var(--frame-size) * 2)),
      calc((100dvh - var(--safe-top) - var(--safe-bottom) - (var(--frame-size) * 2)) * 1.5)
    );
    height: auto;
    max-width: calc(100vw - var(--safe-left) - var(--safe-right) - (var(--frame-size) * 2));
    max-height: calc(100dvh - var(--safe-top) - var(--safe-bottom) - (var(--frame-size) * 2));
    touch-action: none;
  }

  @media (display-mode: standalone), (display-mode: fullscreen), (pointer: coarse) {
    :root {
      --frame-size: 0px;
    }

    body {
      padding: 0;
    }

    canvas {
      border: 0;
      width: min(100vw, calc(100dvh * 1.5));
      max-width: 100vw;
      max-height: 100dvh;
    }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// NUCLEAR: Block ALL Ctrl shortcuts before anything else
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    e.stopImmediatePropagation();
  }
}, true);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./assets/icons/sw.js').catch(() => {});
  });
}

// ============================================================
// FREEDOM FIGHTERS vs WAR MONGERS
// A 2D Top-Down Shooter - HTML5 Canvas + Vanilla JS
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const prefersCoarsePointer = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
const isFirefoxBrowser = /\bfirefox\b/i.test(navigator.userAgent) && !/\bseamonkey\b/i.test(navigator.userAgent);
let fullscreenRequestInFlight = false;
let controllerFullscreenPromptVisible = false;
let audioUnlockPromptVisible = false;
let audioUnlockPromptSource = '';
let audioUnlockListenersInstalled = false;

function isStandaloneDisplay() {
  return window.matchMedia('(display-mode: standalone)').matches ||
    window.matchMedia('(display-mode: fullscreen)').matches ||
    navigator.standalone === true;
}

function isFullscreenDisplayActive() {
  return isStandaloneDisplay() ||
    !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
}

function syncFullscreenRequestState() {
  fullscreenRequestInFlight = false;
  if (isFullscreenDisplayActive()) controllerFullscreenPromptVisible = false;
}

document.addEventListener('fullscreenchange', syncFullscreenRequestState);
document.addEventListener('webkitfullscreenchange', syncFullscreenRequestState);
document.addEventListener('MSFullscreenChange', syncFullscreenRequestState);

function tryEnterFullscreen(source = 'pointer') {
  if (fullscreenRequestInFlight || isFullscreenDisplayActive()) {
    if (isFullscreenDisplayActive()) controllerFullscreenPromptVisible = false;
    return false;
  }
  const target = document.documentElement;
  const request = target.requestFullscreen ||
    target.webkitRequestFullscreen ||
    target.msRequestFullscreen;
  if (!request) return false;
  fullscreenRequestInFlight = true;
  try {
    let result;
    try {
      result = request.call(target, { navigationUI: 'hide' });
    } catch (optionError) {
      result = request.call(target);
    }
    if (result && typeof result.then === 'function') {
      result.then(() => {
        controllerFullscreenPromptVisible = false;
      }).catch(() => {
        if (source === 'gamepad' && !isFullscreenDisplayActive()) {
          controllerFullscreenPromptVisible = true;
        }
      }).finally(() => {
        fullscreenRequestInFlight = false;
      });
    } else {
      fullscreenRequestInFlight = false;
      if (isFullscreenDisplayActive()) controllerFullscreenPromptVisible = false;
    }
  } catch (e) {
    fullscreenRequestInFlight = false;
    if (source === 'gamepad' && !isFullscreenDisplayActive()) {
      controllerFullscreenPromptVisible = true;
    }
  }
  return true;
}

// --- Canvas sizing ---
const GAME_W = 960;
const GAME_H = 640;
canvas.width = GAME_W;
canvas.height = GAME_H;

// --- Sound System (Web Audio API, no files needed) ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
let audioResumePromise = null;
let audioUnlockChimePlayed = false;
let pendingStartScreenAction = '';
function hasStickyUserActivation() {
  return !navigator.userActivation || navigator.userActivation.hasBeenActive === true;
}
function hideAudioUnlockPrompt() {
  audioUnlockPromptVisible = false;
  audioUnlockPromptSource = '';
}
function showAudioUnlockPrompt(source = 'generic') {
  if (muted) return;
  if (audioCtx && audioCtx.state === 'running') {
    hideAudioUnlockPrompt();
    return;
  }
  audioUnlockPromptVisible = true;
  audioUnlockPromptSource = source;
}
function hasPendingAudioUnlock() {
  return !muted && audioUnlockPromptVisible && (!audioCtx || audioCtx.state !== 'running');
}
function getAudioUnlockPromptText() {
  if (audioUnlockPromptSource === 'gamepad') {
    if (isFirefoxBrowser) {
      return 'Firefox needs one click, tap, or key press for sound';
    }
    return 'Browser needs one click, tap, or key press for sound';
  }
  return 'Click, tap, or press any key once to enable audio';
}
function syncAudioUnlockPrompt() {
  if (!audioCtx || muted || audioCtx.state === 'running') hideAudioUnlockPrompt();
}
function ensureAudio() {
  if (!audioCtx && AudioCtx) {
    audioCtx = new AudioCtx();
    if (audioCtx.addEventListener) audioCtx.addEventListener('statechange', syncAudioUnlockPrompt);
  }
  return audioCtx;
}

function getAudioRuntimeStatus() {
  if (!AudioCtx) return 'unsupported';
  if (muted) return 'muted';
  if (!audioCtx) return hasStickyUserActivation() ? 'idle' : 'locked';
  return audioCtx.state || 'unknown';
}

function playAudioUnlockChime() {
  if (!audioCtx || audioCtx.state !== 'running' || muted) return;
  const now = audioCtx.currentTime;
  [659, 988].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now + i * 0.08);
    gain.gain.setValueAtTime(0.0001, now + i * 0.08);
    gain.gain.exponentialRampToValueAtTime(0.09 * masterVolume, now + i * 0.08 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.18);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now + i * 0.08);
    osc.stop(now + i * 0.08 + 0.2);
  });
}

function markAudioRunning() {
  hideAudioUnlockPrompt();
  if (!audioUnlockChimePlayed) {
    audioUnlockChimePlayed = true;
    playAudioUnlockChime();
  }
}

function performPendingStartScreenAction(source = 'auto') {
  if (!pendingStartScreenAction) return false;
  if (gameState !== 'start' || talentsOpen || keybindsOpen || controllerSettingsOpen || settingsOpen) return false;

  const action = pendingStartScreenAction;
  pendingStartScreenAction = '';
  requestAudioResume(source);
  tryEnterFullscreen(source);

  if (action === 'settings') {
    settingsOpen = true;
    settingsSelection = 0;
    return true;
  }
  if (action === 'daily') {
    dailyMode = false;
    startDailyChallenge();
    return true;
  }
  if (action === 'start') {
    try { initGame(); } catch (e) { console.error(e); }
    return true;
  }
  return false;
}

function handleAutomaticAudioUnlock(source) {
  if (muted) return;
  const ctx = ensureAudio();
  if (!ctx) return;
  if (ctx.state === 'running') {
    hideAudioUnlockPrompt();
    if (hasStickyUserActivation()) performPendingStartScreenAction(source);
    return;
  }
  requestAudioResume(source);
  if (hasStickyUserActivation()) performPendingStartScreenAction(source);
}

function installAutomaticAudioUnlockListeners() {
  if (audioUnlockListenersInstalled) return;
  audioUnlockListenersInstalled = true;

  document.addEventListener('pointerdown', () => handleAutomaticAudioUnlock('pointer'), true);
  document.addEventListener('mousedown', () => handleAutomaticAudioUnlock('pointer'), true);
  document.addEventListener('click', () => handleAutomaticAudioUnlock('pointer'), true);
  document.addEventListener('touchstart', () => handleAutomaticAudioUnlock('touch'), true);
  window.addEventListener('keydown', () => handleAutomaticAudioUnlock('keyboard'), true);
  window.addEventListener('keyup', () => handleAutomaticAudioUnlock('keyboard'), true);
  window.addEventListener('focus', () => {
    if (hasStickyUserActivation()) handleAutomaticAudioUnlock('auto');
  });
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && hasStickyUserActivation()) handleAutomaticAudioUnlock('auto');
  });
}

installAutomaticAudioUnlockListeners();

function requestAudioResume(source = 'auto') {
  if (source === 'gamepad' && !hasStickyUserActivation()) {
    showAudioUnlockPrompt('gamepad');
    return false;
  }
  const ctx = ensureAudio();
  if (!ctx) return false;
  if (ctx.state === 'running') {
    markAudioRunning();
    return true;
  }
  if (source === 'gamepad') showAudioUnlockPrompt('gamepad');
  if (ctx.state === 'closed') return false;

  if (!audioResumePromise) {
    try {
      const resumeResult = ctx.resume();
      audioResumePromise = Promise.resolve(resumeResult)
        .then(() => {
          if (ctx.state === 'running') markAudioRunning();
        })
        .catch(() => {})
        .finally(() => {
          audioResumePromise = null;
          if (ctx.state === 'running') markAudioRunning();
        });
    } catch (e) {
      return false;
    }
  }
  return false;
}

function needsManualAudioUnlockForGamepad() {
  if (muted) return false;
  if (!isGamepadUiPreferred()) return false;
  if (hasStickyUserActivation()) return false;
  return !audioCtx || audioCtx.state !== 'running';
}

function blockStartScreenGamepadActionUntilAudioUnlock(action = '') {
  if (!needsManualAudioUnlockForGamepad()) return false;
  pendingStartScreenAction = action || pendingStartScreenAction;
  showAudioUnlockPrompt('gamepad');
  tryEnterFullscreen('gamepad');
  return true;
}

function playSound(type) {
  ensureAudio();
  if (!audioCtx) return;
  if (audioCtx.state !== 'running') {
    const unlockSource = lastInputMode === 'gamepad' ? 'gamepad' : 'generic';
    showAudioUnlockPrompt(unlockSource);
    requestAudioResume(lastInputMode === 'gamepad' ? 'gamepad' : 'auto');
    return;
  }
  if (muted) return;
  const now = audioCtx.currentTime;
  const vol = masterVolume;

  switch (type) {
    case 'shoot': {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(880, now);
      osc.frequency.exponentialRampToValueAtTime(220, now + 0.08);
      gain.gain.setValueAtTime(0.12 * vol, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.08);
      break;
    }
    case 'enemyShoot': {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.06);
      gain.gain.setValueAtTime(0.06 * vol, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.06);
      break;
    }
    case 'hit': {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.1);
      gain.gain.setValueAtTime(0.15 * vol, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.1);
      break;
    }
    case 'explosion': {
      const bufferSize = audioCtx.sampleRate * 0.25;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.2 * vol, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(1000, now);
      filter.frequency.exponentialRampToValueAtTime(100, now + 0.25);
      source.connect(filter).connect(gain).connect(audioCtx.destination);
      source.start(now);
      break;
    }
    case 'pickup': {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
      gain.gain.setValueAtTime(0.1 * vol, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.1);
      break;
    }
    case 'convert': {
      [523, 659, 784].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.08, now + i * 0.08);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.15);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now + i * 0.08);
        osc.stop(now + i * 0.08 + 0.15);
      });
      break;
    }
    case 'shopOpen': {
      [440, 554, 659].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, now + i * 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.2);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now + i * 0.1);
        osc.stop(now + i * 0.1 + 0.2);
      });
      break;
    }
    case 'purchase': {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(500, now);
      osc.frequency.exponentialRampToValueAtTime(1000, now + 0.15);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.15);
      break;
    }
    case 'playerHit': {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.2);
      break;
    }
    case 'waveStart': {
      [330, 440, 550, 660].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.08, now + i * 0.12);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.2);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now + i * 0.12);
        osc.stop(now + i * 0.12 + 0.2);
      });
      break;
    }
    case 'gameOver': {
      [440, 370, 311, 261].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, now + i * 0.25);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.25 + 0.4);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now + i * 0.25);
        osc.stop(now + i * 0.25 + 0.4);
      });
      break;
    }
    case 'bossPhase': {
      [200, 250, 300, 400].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.15, now + i * 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.3);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now + i * 0.1);
        osc.stop(now + i * 0.1 + 0.3);
      });
      break;
    }
    case 'bossEnter': {
      [100, 120, 140, 160, 200].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.12, now + i * 0.15);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.4);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now + i * 0.15);
        osc.stop(now + i * 0.15 + 0.4);
      });
      break;
    }
    case 'bossDeath': {
      const bufferSize = audioCtx.sampleRate * 0.8;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(2000, now);
      filter.frequency.exponentialRampToValueAtTime(50, now + 0.8);
      source.connect(filter).connect(gain).connect(audioCtx.destination);
      source.start(now);
      // Add descending tones
      [400, 300, 200, 100].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0.1, now + i * 0.15);
        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.3);
        osc.connect(g).connect(audioCtx.destination);
        osc.start(now + i * 0.15);
        osc.stop(now + i * 0.15 + 0.3);
      });
      break;
    }
    case 'laser': {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1200, now);
      osc.frequency.exponentialRampToValueAtTime(400, now + 0.15);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.15);
      break;
    }
    case 'levelUp': {
      [523, 659, 784, 1047].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.12, now + i * 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.3);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now + i * 0.1);
        osc.stop(now + i * 0.1 + 0.3);
      });
      break;
    }
    case 'talentSpend': {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(900, now + 0.15);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.15);
      break;
    }
    case 'bossEnraged': {
      [200, 300, 400, 500].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.15, now + i * 0.08);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.2);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now + i * 0.08);
        osc.stop(now + i * 0.08 + 0.2);
      });
      break;
    }
  }
}

const COLORS = {

}

function wrapTextLines(text, maxWidth) {
  const words = String(text).split(/\s+/).filter(Boolean);
  const lines = [];
  let current = '';
  for (const word of words) {
    const next = current ? `${current} ${word}` : word;
    if (current && ctx.measureText(next).width > maxWidth) {
      lines.push(current);
      current = word;
    } else {
      current = next;
    }
  }
  if (current) lines.push(current);
  return lines.length ? lines : [''];
}

function getControllerTokenBadgeInfo(token) {

function getInlineControllerTokenWidth(token, badgeHeight) {
  if (token.type === 'text') return ctx.measureText(token.text).width;
  const info = getControllerTokenBadgeInfo(token);
  const innerWidth = ctx.measureText(info.label).width;
  if (info.shape === 'circle') return badgeHeight;
  return Math.max(info.minWidth || 0, innerWidth + badgeHeight * 0.7);
}

function drawRoundedRectPath(x, y, width, height, radius) {
  const r = Math.min(radius, width / 2, height / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + width - r, y);
  ctx.arcTo(x + width, y, x + width, y + r, r);
  ctx.lineTo(x + width, y + height - r);
  ctx.arcTo(x + width, y + height, x + width - r, y + height, r);
  ctx.lineTo(x + r, y + height);
  ctx.arcTo(x, y + height, x, y + height - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawInlineControllerPrompt(tokens, x, y, options = {}) {
  const {
    align = 'left',
    font = '11px monospace',
    textColor = '#fff',
    gap = 4,
    badgeHeight = 16
  } = options;

  ctx.save();
  ctx.font = font;
  ctx.textBaseline = 'middle';

  const widths = tokens.map(token => getInlineControllerTokenWidth(token, badgeHeight));
  const totalWidth = widths.reduce((sum, width) => sum + width, 0) + Math.max(0, tokens.length - 1) * gap;

  let cursor = x;
  if (align === 'center') cursor -= totalWidth / 2;
  else if (align === 'right') cursor -= totalWidth;

  tokens.forEach((token, index) => {
    const width = widths[index];

    if (token.type === 'text') {
      ctx.fillStyle = token.color || textColor;
      ctx.textAlign = 'left';
      ctx.fillText(token.text, cursor, y);
    } else {
      const info = getControllerTokenBadgeInfo(token);
      const top = y - badgeHeight / 2;

      if (info.shape === 'circle') {
        ctx.fillStyle = info.fill;
        ctx.beginPath();
        ctx.arc(cursor + width / 2, y, badgeHeight / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = info.stroke;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      } else {
        ctx.fillStyle = info.fill;
        drawRoundedRectPath(cursor, top, width, badgeHeight, badgeHeight * 0.42);
        ctx.fill();
        ctx.strokeStyle = info.stroke;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      ctx.fillStyle = info.text;
      ctx.font = info.shape === 'circle'
        ? `bold ${Math.max(9, Math.round(badgeHeight * 0.6))}px monospace`
        : `bold ${Math.max(8, Math.round(badgeHeight * 0.48))}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(info.label, cursor + width / 2, y + 0.5);
      ctx.font = font;
    }

    cursor += width + gap;
  });

  ctx.restore();
}

function sanitizeControllerBindings(data) {

  for (const key of Object.keys(DEFAULT_CONTROLLER_BINDINGS)) {

}

function updateTouchMovement(point) {
  const maxRadius = 64;
  const deadzone = 10;
  let dx = point.x - touchState.leftBaseX;
  let dy = point.y - touchState.leftBaseY;
  const len = Math.hypot(dx, dy);
  if (len < deadzone) {
    touchState.leftStickX = touchState.leftBaseX;
    touchState.leftStickY = touchState.leftBaseY;
    touchState.moveX = 0;
    touchState.moveY = 0;
    return;
  }
  if (len > maxRadius) {
    dx = dx / len * maxRadius;
    dy = dy / len * maxRadius;
  }
  touchState.leftStickX = touchState.leftBaseX + dx;
  touchState.leftStickY = touchState.leftBaseY + dy;
  touchState.moveX = dx / maxRadius;
  touchState.moveY = dy / maxRadius;
}

function updateTouchAim(point, clicked = false) {
  const maxRadius = 56;
  let dx = point.x - touchState.rightBaseX;
  let dy = point.y - touchState.rightBaseY;
  const len = Math.hypot(dx, dy);
  if (len > maxRadius) {
    dx = dx / len * maxRadius;
    dy = dy / len * maxRadius;
  }
  if (Math.hypot(dx, dy) > 6) {
    const norm = Math.hypot(dx, dy);
    touchState.aimX = dx / norm;
    touchState.aimY = dy / norm;
  }
  touchState.rightStickX = touchState.rightBaseX + dx;
  touchState.rightStickY = touchState.rightBaseY + dy;
  touchState.rightX = point.x;
  touchState.rightY = point.y;
  mouse.x = touchState.rightStickX;
  mouse.y = touchState.rightStickY;
  touchState.shootDown = true;
  if (clicked) touchState.shootClicked = true;
}

function handleGameplayTouchStart(touch) {
  setInputMode('touch');
  const point = getCanvasPoint(touch.clientX, touch.clientY);
  const buttons = getGameplayButtonRects();

  if (pointInRect(point, buttons.pause)) {
    paused = !paused;
    return;
  }
  if (pointInRect(point, buttons.convert)) {
    keys[keybinds.convert] = true;
    return;
  }
  if (pointInRect(point, buttons.shop)) {
    keys[keybinds.shop] = true;
    return;
  }
  if (point.x < GAME_W * 0.5 && touchState.leftId === null) {
    touchState.leftId = touch.identifier;
    updateTouchMovement(point);
    return;
  }
  if (touchState.rightId === null) {
    touchState.rightId = touch.identifier;
    touchState.rightBaseX = TOUCH_RIGHT_BASE.x;
    touchState.rightBaseY = TOUCH_RIGHT_BASE.y;
    touchState.rightStickX = touchState.rightBaseX;
    touchState.rightStickY = touchState.rightBaseY;
    updateTouchAim(point, true);
  }
}

function handleTouchStart(event) {
  if (isDuplicateBodyTouchEvent(event)) return;
  requestAudioResume('touch');
  tryEnterFullscreen();
  if (touchControlsEnabled && gameState === 'playing') {
    event.preventDefault();
    for (const touch of event.changedTouches) handleGameplayTouchStart(touch);
    return;
  }
  const firstTouch = event.changedTouches[0];
  if (!firstTouch) return;
  const point = updateMousePosition(firstTouch.clientX, firstTouch.clientY);
  mouse.x = point.x;
  mouse.y = point.y;
  mouse.down = true;
  mouse.clicked = true;
  event.preventDefault();
}

function handleTouchMove(event) {
  if (isDuplicateBodyTouchEvent(event)) return;
  if (!(touchControlsEnabled && gameState === 'playing')) {
    const firstTouch = event.changedTouches[0];
    if (firstTouch) updateMousePosition(firstTouch.clientX, firstTouch.clientY);
    event.preventDefault();
    return;
  }
  event.preventDefault();
  setInputMode('touch');
  for (const touch of event.changedTouches) {
    const point = getCanvasPoint(touch.clientX, touch.clientY);
    if (touch.identifier === touchState.leftId) {
      updateTouchMovement(point);
    } else if (touch.identifier === touchState.rightId) {
      updateTouchAim(point);
    }
  }
}

function handleTouchEnd(event) {
  if (isDuplicateBodyTouchEvent(event)) return;
  if (!(touchControlsEnabled && gameState === 'playing')) {
    mouse.down = false;
    event.preventDefault();
    return;
  }
  event.preventDefault();
  for (const touch of event.changedTouches) {
    if (touch.identifier === touchState.leftId) {
      resetTouchJoystick();
    } else if (touch.identifier === touchState.rightId) {
      resetTouchAim();
    }
  }
}

function getConnectedGamepads() {
  const readGamepads = getGamepadApi();
  if (!readGamepads) return [];
  try {
    lastGamepadReadError = '';
    return Array.from(readGamepads() || []).filter(Boolean).filter(gamepad => gamepad.connected !== false);
  } catch (error) {
    lastGamepadReadError = error && error.name ? `${error.name}: ${error.message || ''}`.trim() : 'Gamepad read failed';
    return [];
  }
}

function getActiveGamepad() {
  const pads = getConnectedGamepads();
  if (!pads.length) return null;
  const current = pads.find(gamepad => gamepad.index === gamepadState.index);
  return current || pads[0];

  const now = typeof performance !== 'undefined' ? performance.now() : Date.now();

  for (let read = 0; read < array.length; read++) {
    const item = array[read];

      array[write++] = item;

const gridCanvasCache = new Map();
const COLLISION_GRID_SIZE = 96;
const enemySpatialGrid = new Map();
const enemyBulletSpatialGrid = new Map();
const enemyGridQueryBuffer = [];
const enemyBulletGridQueryBuffer = [];
let storedHighScore = 0;

function getGridKey(col, row) {
  return `${col},${row}`;
}

function rebuildSpatialGrid(items, grid, cellSize, includeItem = null) {
  grid.clear();
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    if (includeItem && !includeItem(item)) continue;
    const col = Math.floor(item.x / cellSize);
    const row = Math.floor(item.y / cellSize);
    const key = getGridKey(col, row);
    let bucket = grid.get(key);
    if (!bucket) {
      bucket = [];
      grid.set(key, bucket);
    }
    bucket.push(item);
  }
}

function querySpatialGrid(grid, x, y, radius, cellSize, out) {
  out.length = 0;
  const minCol = Math.floor((x - radius) / cellSize);
  const maxCol = Math.floor((x + radius) / cellSize);
  const minRow = Math.floor((y - radius) / cellSize);
  const maxRow = Math.floor((y + radius) / cellSize);

  for (let col = minCol; col <= maxCol; col++) {
    for (let row = minRow; row <= maxRow; row++) {
      const bucket = grid.get(getGridKey(col, row));
      if (!bucket) continue;
      for (let i = 0; i < bucket.length; i++) out.push(bucket[i]);
    }
  }

  return out;
}

function findNearestThreat(source, maxDistance = 300) {
  const maxDistanceSq = maxDistance * maxDistance;
  let nearest = null;
  let nearestDistSq = maxDistanceSq;
  const candidates = enemySpatialGrid.size
    ? querySpatialGrid(enemySpatialGrid, source.x, source.y, maxDistance, COLLISION_GRID_SIZE, enemyGridQueryBuffer)
    : enemies;

  for (let i = 0; i < candidates.length; i++) {
    const enemy = candidates[i];
    if (!enemy || enemy.converted || enemy.health <= 0) continue;
    const dx = enemy.x - source.x;
    const dy = enemy.y - source.y;
    const distSq = dx * dx + dy * dy;
    if (distSq < nearestDistSq) {
      nearest = enemy;
      nearestDistSq = distSq;
    }
  }

  if (boss && boss.alive && !boss.entering) {
    const dx = boss.x - source.x;
    const dy = boss.y - source.y;
    const distSq = dx * dx + dy * dy;
    if (distSq < nearestDistSq) {
      nearest = boss;
      nearestDistSq = distSq;
    }
  }

  return {
    target: nearest,
    distance: nearest ? Math.sqrt(nearestDistSq) : maxDistance
  };
}

class Player {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.radius = 14;
    this.speed = 3.2;
    this.baseSpeed = 3.2;
    this.health = 100;
    this.maxHealth = 100;
    this.damage = 20;
    this.baseDamage = 20;
    this.fireRate = 180; // ms between shots
    this.lastShot = 0;
    this.sats = 0;
    this.score = 0;
    this.highScore = 0;
    this.invincible = 0; // ms of invincibility after hit
    this.speedBoostTimer = 0;
    this.damageBoostTimer = 0;
    // Weapon system
    this.weapons = ['pistol']; // unlocked weapons
    this.currentWeapon = 0; // index into weapons
    this.unlockedWeapons = new Set(['pistol']); // persistent unlocks
    this.weaponAmmo = { shotgun: 0, laser: 0, homing: 0, flamethrower: 0, railgun: 0 };
    this.laserCharging = false;
    this.laserChargeTime = 0;
    this.shieldCharges = 0;
    this.timeSlowTimer = 0;
    this.magnetTimer = 0;
    // Stats tracking
    this.stats = {
      kills: 0,
      converts: 0,
      bossesKilled: 0,
      wavesCompleted: 0,
      shotsFired: 0,
      shotsHit: 0,
      damageDealt: 0,
      totalSats: 0,
      elitesKilled: 0,
      minibossesKilled: 0,
      bestCombo: 0,
      runTimeMs: 0
    };
  }

  normalizeWeaponLoadout(preferredWeapon = null) {
    if (!Array.isArray(this.weapons) || this.weapons.length === 0) {
      this.weapons = ['pistol'];
    }
    if (!this.weapons.includes('pistol')) {
      this.weapons.unshift('pistol');
    }
    if (preferredWeapon && this.weapons.includes(preferredWeapon)) {
      this.currentWeapon = this.weapons.indexOf(preferredWeapon);
      return;
    }
    if (!Number.isInteger(this.currentWeapon) || this.currentWeapon < 0 || this.currentWeapon >= this.weapons.length) {
      this.currentWeapon = 0;
    }
  }

  equipWeapon(weapon) {
    if (!this.weapons.includes(weapon)) {
      this.weapons.push(weapon);
    }
    this.normalizeWeaponLoadout(weapon);
  }

  removeWeaponFromLoadout(weapon) {
    const activeWeapon = this.weapons[this.currentWeapon];
    this.weapons = this.weapons.filter(w => w !== weapon);
    const fallbackWeapon = activeWeapon === weapon ? 'pistol' : activeWeapon;
    this.normalizeWeaponLoadout(fallbackWeapon);
  }

  update(dt) {
    // Movement
    let dx = 0, dy = 0;
    // Check movement keys (supports multiple bindings per direction)
    const upKeys = Array.isArray(keybinds.moveUp) ? keybinds.moveUp : [keybinds.moveUp];
    const downKeys = Array.isArray(keybinds.moveDown) ? keybinds.moveDown : [keybinds.moveDown];
    const leftKeys = Array.isArray(keybinds.moveLeft) ? keybinds.moveLeft : [keybinds.moveLeft];
    const rightKeys = Array.isArray(keybinds.moveRight) ? keybinds.moveRight : [keybinds.moveRight];

    if (upKeys.some(k => keys[k])) dy -= 1;
    if (downKeys.some(k => keys[k])) dy += 1;
    if (leftKeys.some(k => keys[k])) dx -= 1;
    if (rightKeys.some(k => keys[k])) dx += 1;
    if (touchControlsEnabled) {
      dx += touchState.moveX;
      dy += touchState.moveY;
    }
    if (gamepadState.connected) {
      dx += gamepadState.moveX + gamepadState.dpadX;
      dy += gamepadState.moveY + gamepadState.dpadY;
    }

    // Normalize diagonal
    if (dx !== 0 && dy !== 0) {
      const len = Math.hypot(dx, dy);
      dx /= len;
      dy /= len;
    }

    let currentSpeed = this.speed;
    const timeSlowActive = this.timeSlowTimer > 0;
    if (this.timeSlowTimer > 0) this.timeSlowTimer -= dt;
    if (this.magnetTimer > 0) this.magnetTimer -= dt;
    if (this.speedBoostTimer > 0) {
      currentSpeed = this.baseSpeed * 1.6;
      this.speedBoostTimer -= dt;
    }
    if (this.damageBoostTimer > 0) {
      this.damageBoostTimer -= dt;
    }

    this.x += dx * currentSpeed;
    this.y += dy * currentSpeed;

    // Clamp to bounds
    this.x = clamp(this.x, this.radius, GAME_W - this.radius);
    this.y = clamp(this.y, this.radius, GAME_H - this.radius);

    // Invincibility timer
    if (this.invincible > 0) this.invincible -= dt;

    // Shooting
    if (consumePrimaryShootPressed() && Date.now() - this.lastShot > this.fireRate) {
      this.shoot();
    }
    // Hold to auto-fire
    if (isPrimaryShootHeld() && Date.now() - this.lastShot > this.fireRate) {
      this.shoot();
    }
  }

  shoot() {
    this.normalizeWeaponLoadout();
    const weapon = this.weapons[this.currentWeapon];
    const aimTarget = getAimTarget();
    const a = angle(this, aimTarget);
    let dmg = this.damageBoostTimer > 0 ? this.baseDamage * 2 : this.baseDamage;
    // Vengeance talent: +10% damage when below 30% HP
    if (hasTalent('vengeance') && this.health < this.maxHealth * 0.3) {
      dmg *= 1.10;
    }
    // Critical hit chance from talent
    let isCrit = false;
    if (hasTalent('crit') && Math.random() < 0.05) {
      isCrit = true;
    }
    const now = Date.now();

    // Weapon mastery passive bonus: +1% damage per 10 kills (max +10%)
    const masteryBonus = 1 + Math.min((weaponMastery[weapon] || 0) / 1000, 0.10);
    const finalDmg = dmg * masteryBonus;

    switch (weapon) {
      case 'pistol':
        const pistolDmg = isCrit ? finalDmg * 2 : finalDmg;
        bullets.push(new Bullet(
          this.x + Math.cos(a) * 18,
          this.y + Math.sin(a) * 18,
          Math.cos(a) * 8,
          Math.sin(a) * 8,
          pistolDmg,
          'player',
          isCrit ? '#ffeb3b' : undefined
        ));
        this.lastShot = now;
        playSound('shoot');
        player.stats.shotsFired++;
        if (isCrit) {
          spawnDamageNumber(this.x + Math.cos(a) * 20, this.y + Math.sin(a) * 20, pistolDmg, '#ffeb3b');
        }
        break;

      case 'shotgun':
        if (this.weaponAmmo.shotgun <= 0) { this.removeWeaponFromLoadout('shotgun'); return; }
        this.weaponAmmo.shotgun--;
        this.fireRate = 350;
        const pellets = 7;
        for (let i = 0; i < pellets; i++) {
          const spread = (i - (pellets - 1) / 2) * 0.2;
          const sa = a + spread;
          bullets.push(new Bullet(
            this.x + Math.cos(sa) * 18,
            this.y + Math.sin(sa) * 18,
            Math.cos(sa) * 8,
            Math.sin(sa) * 8,
            finalDmg * 0.75,
            'player',
            '#ffeb3b'
          ));
        }
        this.lastShot = now;
        playSound('shoot');
        triggerShake(5, 150);
        player.stats.shotsFired++;
        break;

      case 'laser':
        this.laserCharging = true;
        break;

      case 'homing':
        if (this.weaponAmmo.homing <= 0) { this.removeWeaponFromLoadout('homing'); return; }
        this.weaponAmmo.homing--;
        this.fireRate = 420;
        // Find nearest enemy
        let nearest = null;
        let nearDist = 300;
        for (const e of enemies) {
          if (!e.converted) {
            const d = dist(this, e);
            if (d < nearDist) { nearDist = d; nearest = e; }
          }
        }
        if (boss && boss.alive && !boss.entering) {
          const bd = dist(this, boss);
          if (bd < nearDist) nearest = boss;
        }
        const target = nearest || { x: this.x + Math.cos(a) * 200, y: this.y + Math.sin(a) * 200 };
        const hb = new Bullet(
          this.x + Math.cos(a) * 18,
          this.y + Math.sin(a) * 18,
          Math.cos(a) * 5.4,
          Math.sin(a) * 5.4,
          finalDmg * 3.1,
          'player',
          '#e040fb'
        );
        hb.homing = true;
        hb.target = target;
        hb.turnSpeed = 0.22;
        hb.acceleration = 1.03;
        hb.maxSpeed = 10.5;
        hb.radius = 7;
        hb.explosionRadius = 120;
        hb.splashDamage = finalDmg * 2.6;
        hb.impactColor = '#ff5cff';
        hb.impactParticleCount = 30;
        hb.impactShake = 15;
        hb.trailColor = '#ff7bff';
        hb.trailTimer = 0;
        hb.drawMissile = true;
        bullets.push(hb);
        for (let i = 0; i < 8; i++) {
          particles.push(new Particle(
            hb.x - Math.cos(a) * rand(2, 10),
            hb.y - Math.sin(a) * rand(2, 10),
            i % 2 === 0 ? '#ff5cff' : '#ff9800',
            rand(2, 4)
          ));
        }
        this.lastShot = now;
        playSound('shoot');
        player.stats.shotsFired++;
        break;

      case 'flamethrower':
        if (this.weaponAmmo.flamethrower <= 0) { this.removeWeaponFromLoadout('flamethrower'); return; }
        this.weaponAmmo.flamethrower--;
        this.fireRate = 80;
        // Cone of fire - multiple bullets in a spread
        const coneWidth = 0.4; // radians
        const coneRange = 120;
        const pelletCount = 5;
        for (let i = 0; i < pelletCount; i++) {
          const spread = (Math.random() - 0.5) * coneWidth;
          const fa = a + spread;
          const dist = rand(30, coneRange);
          bullets.push(new Bullet(
            this.x + Math.cos(fa) * 18,
            this.y + Math.sin(fa) * 18,
            Math.cos(fa) * 8,
            Math.sin(fa) * 8,
            finalDmg * 0.5,
            'player',
            i % 2 === 0 ? '#ff5722' : '#ff9800'
          ));
        }
        // Fire particles for visual
        for (let i = 0; i < 8; i++) {
          const fa = a + (Math.random() - 0.5) * coneWidth;
          const dist = rand(40, coneRange);
          particles.push(new Particle(
            this.x + Math.cos(fa) * dist,
            this.y + Math.sin(fa) * dist,
            Math.random() < 0.5 ? '#ff5722' : '#ff9800',
            rand(2, 5)
          ));
        }
        this.lastShot = now;
        playSound('shoot');
        player.stats.shotsFired++;
        break;

      case 'railgun':
        // Railgun: hold mouse to charge, releases massive piercing beam
        this.railChargeTime = (this.railChargeTime || 0) + 16;
        break;
    }
  }

  fireRailgun() {
    this.normalizeWeaponLoadout();
    const charge = Math.min(this.railChargeTime || 200, 1000);
    const chargePct = charge / 1000;
    
    // Only fire if charged enough
    if (charge < 200) { this.railChargeTime = 0; return; }
    if (this.weaponAmmo.railgun <= 0) { this.railChargeTime = 0; this.removeWeaponFromLoadout('railgun'); return; }
    
    this.weaponAmmo.railgun--;
    this.railChargeTime = 0;
    
    const a = angle(this, getAimTarget());
    const dmg = this.damageBoostTimer > 0 ? this.baseDamage * 9 : this.baseDamage * 6;
    const finalDmg = dmg * (0.8 + chargePct * 1.2);
    const beamLength = 800;
    const beamRadius = 18 + chargePct * 18;
    
    // Piercing beam - hits EVERYTHING in a line
    const allTargets = [
      ...enemies.filter(e => !e.converted),
      ...(boss && boss.alive && !boss.entering ? [boss] : [])
    ];
    
    let hitCount = 0;
    for (const t of allTargets) {
      const dx = t.x - this.x;
      const dy = t.y - this.y;
      const proj = dx * Math.cos(a) + dy * Math.sin(a);
      if (proj > 0 && proj < beamLength) {
        const closestX = this.x + Math.cos(a) * proj;
        const closestY = this.y + Math.sin(a) * proj;
        const distToLine = Math.hypot(t.x - closestX, t.y - closestY);
        if (distToLine < t.radius + beamRadius) {
          t.takeDamage(finalDmg, 'player');
          spawnDamageNumber(closestX, closestY, finalDmg, '#00bcd4');
          hitCount++;
          spawnExplosion(closestX, closestY, 10 + Math.floor(chargePct * 8), '#00d8ff');
        }
      }
    }
    
    // Visual beam - wider and longer than laser
    const endX = this.x + Math.cos(a) * beamLength;
    const endY = this.y + Math.sin(a) * beamLength;
    laserBeams.push({
      x1: this.x + Math.cos(a) * 18,
      y1: this.y + Math.sin(a) * 18,
      x2: endX,
      y2: endY,
      life: 360,
      maxLife: 360,
      color: '#00d8ff',
      width: 6 + chargePct * 8,
      glow: 18 + chargePct * 12,
      coreWidth: 2 + chargePct * 3
    });
    spawnExplosion(endX, endY, 18 + Math.floor(chargePct * 10), '#b3f5ff');
    
    playSound('laser');
    triggerShake(8 + 10 * chargePct + hitCount * 0.5, 240);
    this.lastShot = Date.now();
    player.stats.shotsFired++;
    if (hitCount > 0) player.stats.shotsHit++;
  }

  fireLaser() {
    const dmg = this.damageBoostTimer > 0 ? this.baseDamage * 3 : this.baseDamage * 1.5;
    const a = angle(this, getAimTarget());
    // Laser is instant - hitscan line
    let hitSomething = false;
    const allTargets = [
      ...enemies.filter(e => !e.converted),
      ...(boss && boss.alive && !boss.entering ? [boss] : [])
    ];
    for (const target of allTargets) {
      // Simple line-circle intersection
      const dx = target.x - this.x;
      const dy = target.y - this.y;
      const len = Math.hypot(dx, dy);
      const proj = dx * Math.cos(a) + dy * Math.sin(a);
      if (proj > 0) {
        const closestX = this.x + Math.cos(a) * proj;
        const closestY = this.y + Math.sin(a) * proj;
        const distToLine = Math.hypot(target.x - closestX, target.y - closestY);
        if (distToLine < target.radius + 5) {
          target.takeDamage(dmg, 'player');
          spawnDamageNumber(closestX, closestY, dmg, '#00e5ff');
          hitSomething = true;
          // Laser hit particles
          for (let i = 0; i < 8; i++) {
            particles.push(new Particle(closestX, closestY, '#00e5ff', 2));
          }
          break;
        }
      }
    }
    // Laser visual - line from player to edge or hit
    const laserLen = hitSomething ? 200 : 500;
    const endX = this.x + Math.cos(a) * laserLen;
    const endY = this.y + Math.sin(a) * laserLen;
    laserBeams.push({
      x1: this.x + Math.cos(a) * 18,
      y1: this.y + Math.sin(a) * 18,
      x2: endX,
      y2: endY,
      life: 150,
      maxLife: 150,
      color: '#00e5ff',
      width: 3,
      glow: 10,
      coreWidth: 1
    });
    playSound('laser');
    triggerShake(2, 80);
    player.stats.shotsFired++;
    if (hitSomething) player.stats.shotsHit++;
  }

  takeDamage(amount) {
    if (this.invincible > 0) return;
    // Shield check
    if (this.shieldCharges > 0) {
      this.shieldCharges--;
      this.invincible = 300;
      triggerShake(3, 100);
      for (let i = 0; i < 6; i++) {
        particles.push(new Particle(this.x, this.y, '#2196f3', 2));
      }
      return;
    }
    
    // Apply armor talent (damage reduction)
    const armor = getTalentBonus('armor');
    const finalDamage = armor > 0 ? amount * (1 - armor) : amount;
    this.health -= finalDamage;
    this.invincible = 500; // half second iframe
    playSound('playerHit');
    triggerShake(6, 200);
    spawnDamageNumber(this.x, this.y, finalDamage, '#f44336');
    // Hit particles
    for (let i = 0; i < 6; i++) {
      particles.push(new Particle(this.x, this.y, COLORS.healthRed, 2));
    }
  }

  heal(amount) {
    this.health = Math.min(this.maxHealth, this.health + amount);
  }

  draw() {
    ctx.save();
    // Get current skin colors
    const skin = SKINS[currentSkin] || SKINS.default;
    // Glow
    ctx.shadowColor = this.invincible > 0 ? '#fff' : skin.glowColor;
    ctx.shadowBlur = this.invincible > 0 ? 20 : 10;

    // Body
    ctx.fillStyle = this.invincible > 0 && Math.floor(Date.now() / 80) % 2 === 0
      ? '#fff' : skin.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();

    // Inner detail
    ctx.fillStyle = skin.darkColor;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 0.55, 0, Math.PI * 2);
    ctx.fill();

    // Direction indicator (toward current aim target)
    const a = angle(this, getAimTarget());
    ctx.fillStyle = skin.glowColor;
    ctx.beginPath();
    ctx.arc(
      this.x + Math.cos(a) * 10,
      this.y + Math.sin(a) * 10,
      3, 0, Math.PI * 2
    );
    ctx.fill();

    ctx.restore();

    // Boost indicators
    if (this.speedBoostTimer > 0) {
      ctx.strokeStyle = COLORS.convert;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius + 4, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
}

class Enemy {
  constructor(x, y, type, wave, isElite = false, isMiniboss = false) {
    this.x = x;
    this.y = y;
    this.type = type;
    this.wave = wave;
    this.isElite = isElite;
    this.isMiniboss = isMiniboss;
    this.converted = false;
    this.convertTimer = isElite || isMiniboss ? 0 : 30000; // elites and minibosses immune to convert
    this.convertWindow = 30000;
    this.lastShot = 0;

    // Elite modifiers
    this.hasShield = false;
    this.shieldHP = 0;
    this.isExplosive = false;
    this.canTeleport = false;
    this.teleportTimer = 0;
    this.dashTimer = 0;

    if (isElite) {
      const eliteType = Math.floor(Math.random() * 3);
      if (eliteType === 0) {
        this.hasShield = true;
        this.shieldHP = 3;
        this.eliteColor = '#2196f3'; // blue shield
      } else if (eliteType === 1) {
        this.isExplosive = true;
        this.eliteColor = '#ff5722'; // orange explosive
      } else {
        this.canTeleport = true;
        this.eliteColor = '#9c27b0'; // purple teleport
      }
    }

    if (isMiniboss) {
      this.hasShield = true;
      this.shieldHP = 5;
      this.isExplosive = true;
      this.eliteColor = '#ffd700'; // gold miniboss
    }

    // Stats scale with wave
    const scale = 1 + (wave - 1) * 0.08;
    const eliteMult = isElite ? 2 : 1;
    const minibossMult = isMiniboss ? 5 : 1;
    const mult = eliteMult * minibossMult;

    switch (type) {
      case 'propaganda':
        this.radius = 16;
        this.speed = 0.8 * Math.min(scale, 1.5);
        this.health = 30 * scale;
        this.maxHealth = this.health;
        this.damage = 5;
        this.fireRate = 2000;
        this.color = COLORS.enemyPropaganda;
        this.satsValue = randInt(15, 30);
        this.scoreValue = 10;
        break;
      case 'contractor':
        this.radius = 14;
        this.speed = 1.4 * Math.min(scale, 1.6);
        this.health = 50 * scale;
        this.maxHealth = this.health;
        this.damage = 10;
        this.fireRate = 1200;
        this.color = COLORS.enemyContractor;
        this.satsValue = randInt(25, 50);
        this.scoreValue = 25;
        break;
      case 'banker':
        this.radius = 18;
        this.speed = 2.2 * Math.min(scale, 1.8);
        this.health = 80 * scale;
        this.maxHealth = this.health;
        this.damage = 15;
        this.fireRate = 800;
        this.color = COLORS.enemyBanker;
        this.satsValue = randInt(50, 100);
        this.scoreValue = 50;
        break;
      case 'sniper':
        this.radius = 12;
        this.speed = 0.5 * Math.min(scale, 1.5);
        this.health = 25 * scale;
        this.maxHealth = this.health;
        this.damage = 25;
        this.fireRate = 2500;
        this.color = '#7c4dff';
        this.satsValue = randInt(30, 60);
        this.scoreValue = 35;
        this.preferredDist = 300;
        break;
      case 'rusher':
        this.radius = 10;
        this.speed = 2.2 * Math.min(scale, 1.3);
        this.health = 15 * scale;
        this.maxHealth = this.health;
        this.damage = 6;
        this.fireRate = 0; // doesn't shoot
        this.color = '#ff4081';
        this.satsValue = randInt(10, 25);
        this.scoreValue = 15;
        this.preferredDist = 30;
        break;
      case 'tank':
        this.radius = 24;
        this.speed = 0.6 * Math.min(scale, 1.5);
        this.health = 150 * scale;
        this.maxHealth = this.health;
        this.damage = 20;
        this.fireRate = 1500;
        this.color = '#607d8b';
        this.satsValue = randInt(80, 150);
        this.scoreValue = 75;
        this.preferredDist = 120;
        break;
      case 'fraud':
        this.radius = 14;
        this.speed = 1.8 * Math.min(scale, 1.8);
        this.health = 40 * scale;
        this.maxHealth = this.health;
        this.damage = 12;
        this.fireRate = 1000;
        this.color = '#9c27b0';
        this.satsValue = randInt(30, 60);
        this.scoreValue = 40;
        this.preferredDist = 200;
        this.mirrorPos = true; // mirrors player position
        break;
      case 'corruption':
        this.radius = 20;
        this.speed = 0.8 * Math.min(scale, 1.3);
        this.health = 100 * scale;
        this.maxHealth = this.health;
        this.damage = 10;
        this.fireRate = 2000;
        this.color = '#b8860b';
        this.satsValue = randInt(60, 120);
        this.scoreValue = 60;
        this.preferredDist = 150;
        this.auraRange = 80;
        this.regenTimer = 0;
        break;
      case 'taxes':
        this.radius = 16;
        this.speed = 1.0 * Math.min(scale, 1.5);
        this.health = 60 * scale;
        this.maxHealth = this.health;
        this.damage = 8;
        this.fireRate = 1800;
        this.color = '#78909c';
        this.satsValue = randInt(20, 40);
        this.scoreValue = 30;
        this.preferredDist = 160;
        this.stealAmount = 0;
        break;
      case 'abuse':
        this.radius = 18;
        this.speed = 2.5 * Math.min(scale, 2.5);
        this.health = 50 * scale;
        this.maxHealth = this.health;
        this.damage = 18;
        this.fireRate = 600;
        this.color = '#d50000';
        this.satsValue = randInt(40, 80);
        this.scoreValue = 45;
        this.preferredDist = 60;
        this.dashTimer = 0;
        this.dashing = false;
        break;
      case 'censorship':
        this.radius = 22;
        this.speed = 0.5 * Math.min(scale, 1.2);
        this.health = 120 * scale;
        this.maxHealth = this.health;
        this.damage = 5;
        this.fireRate = 3000;
        this.color = '#111111';
        this.satsValue = randInt(50, 100);
        this.scoreValue = 55;
        this.preferredDist = 180;
        this.silenceRange = 100;
        break;
    }

    // Apply elite/miniboss multipliers
    const hpMult = dailyMode ? (dailyModifiers.enemyHP || 1) : 1;
    this.health = Math.floor(this.health * mult * hpMult);
    this.maxHealth = this.health;
    this.damage = Math.floor(this.damage * (isMiniboss ? 2 : 1) * (dailyMode ? (dailyModifiers.enemyDamage || 1) : 1));
    this.satsValue = Math.floor(this.satsValue * mult * (dailyMode ? (dailyModifiers.satsBonus || 1) : 1));
    this.scoreValue = Math.floor(this.scoreValue * mult);
    this.radius = Math.floor(this.radius * (isMiniboss ? 1.3 : 1));
  }

  update(dt) {
    if (this.converted) {
      // Converted enemies drift away and fade
      this.convertTimer -= dt;
      this.x += (this.convertDirX || 0) * 1.5;
      this.y += (this.convertDirY || 0) * 1.5;
      return this.convertTimer > 0;
    }

    // Move toward player
    const a = angle(this, player);
    const d = dist(this, player);
    const prefDist = this.preferredDist || (this.type === 'propaganda' ? 180 : this.type === 'contractor' ? 140 : 100);

    // Better AI: different behaviors per type
    if (this.type === 'rusher') {
      // Rushers charge directly at player
      this.x += Math.cos(a) * this.speed;
      this.y += Math.sin(a) * this.speed;
    } else if (this.type === 'sniper') {
      // Snipers try to stay at range and strafe
      if (d > prefDist + 50) {
        this.x += Math.cos(a) * this.speed;
        this.y += Math.sin(a) * this.speed;
      } else if (d < prefDist - 50) {
        this.x -= Math.cos(a) * this.speed;
        this.y -= Math.sin(a) * this.speed;
      } else {
        // Strafe perpendicular to player
        this.x += Math.cos(a + Math.PI / 2) * this.speed * 0.8;
        this.y += Math.sin(a + Math.PI / 2) * this.speed * 0.8;
      }
    } else {
      // Normal behavior: move toward player, keep distance
      this.x += Math.cos(a) * this.speed;
      this.y += Math.sin(a) * this.speed;
      if (d < prefDist) {
        this.x -= Math.cos(a) * this.speed * 0.5;
        this.y -= Math.sin(a) * this.speed * 0.5;
      }
    }

    // Clamp to bounds
    this.x = clamp(this.x, this.radius, GAME_W - this.radius);
    this.y = clamp(this.y, this.radius, GAME_H - this.radius);

    // Teleport behavior for elites
    if (this.canTeleport) {
      this.teleportTimer += dt;
      if (this.teleportTimer > 3000 && d > 150) {
        this.teleportTimer = 0;
        // Teleport to random position near player
        const tpAngle = Math.random() * Math.PI * 2;
        const tpDist = rand(80, 150);
        this.x = clamp(player.x + Math.cos(tpAngle) * tpDist, this.radius, GAME_W - this.radius);
        this.y = clamp(player.y + Math.sin(tpAngle) * tpDist, this.radius, GAME_H - this.radius);
        // Teleport effect
        for (let i = 0; i < 8; i++) {
          particles.push(new Particle(this.x, this.y, this.eliteColor || '#9c27b0', 3));
        }
      }
    }

    // Shooting
    if (Date.now() - this.lastShot > this.fireRate && d < 400) {
      this.shoot();
      this.lastShot = Date.now();
    }

    return true; // alive
  }

  shoot() {
    const a = angle(this, player);
    const speed = this.type === 'propaganda' ? 3 : 4.5;
    const color = this.type === 'propaganda' ? COLORS.bulletPropaganda : COLORS.bulletEnemy;
    bullets.push(new Bullet(
      this.x + Math.cos(a) * (this.radius + 4),
      this.y + Math.sin(a) * (this.radius + 4),
      Math.cos(a) * speed,
      Math.sin(a) * speed,
      this.damage,
      'enemy',
      color
    ));
    playSound('enemyShoot');
  }

  takeDamage(amount, source = '') {
    this.health -= amount;
    if (source === 'player') {
      player.stats.damageDealt += amount;
    }
    playSound('hit');
    spawnDamageNumber(this.x, this.y, amount, '#ffeb3b');
    // Small hit particles
    for (let i = 0; i < 3; i++) {
      particles.push(new Particle(this.x, this.y, this.color, 1.5));
    }
  }

  draw() {
    ctx.save();
    if (this.converted) {
      const alpha = this.convertTimer / this.convertWindow;
      ctx.globalAlpha = alpha;
      ctx.shadowColor = COLORS.convertGlow;
      ctx.shadowBlur = 15;
      ctx.fillStyle = COLORS.enemyConverted;
    } else {
      ctx.shadowColor = getEnemyColor(this.color);
      ctx.shadowBlur = 8;
      ctx.fillStyle = getEnemyColor(this.color);
    }

    // Shape varies by type
    if (this.type === 'propaganda') {
      // Diamond shape
      ctx.beginPath();
      ctx.moveTo(this.x, this.y - this.radius);
      ctx.lineTo(this.x + this.radius, this.y);
      ctx.lineTo(this.x, this.y + this.radius);
      ctx.lineTo(this.x - this.radius, this.y);
      ctx.closePath();
      ctx.fill();
      if (!this.converted) {
        ctx.fillStyle = '#fff';
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('LIE', this.x, this.y);
      }
    } else if (this.type === 'contractor') {
      // Square
      ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
      if (!this.converted) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('$', this.x, this.y);
      }
    } else if (this.type === 'banker') {
      // Banker - hexagon
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i - Math.PI / 6;
        const px = this.x + Math.cos(a) * this.radius;
        const py = this.y + Math.sin(a) * this.radius;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      if (!this.converted) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 9px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('CB', this.x, this.y);
      }
    } else if (this.type === 'sniper') {
      // Sniper - triangle
      ctx.beginPath();
      const sa = angle(this, player);
      ctx.moveTo(this.x + Math.cos(sa) * this.radius, this.y + Math.sin(sa) * this.radius);
      ctx.lineTo(this.x + Math.cos(sa + 2.5) * this.radius, this.y + Math.sin(sa + 2.5) * this.radius);
      ctx.lineTo(this.x + Math.cos(sa - 2.5) * this.radius, this.y + Math.sin(sa - 2.5) * this.radius);
      ctx.closePath();
      ctx.fill();
      if (!this.converted) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 8px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('X', this.x, this.y);
      }
    } else if (this.type === 'rusher') {
      // Rusher - small circle with spike
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fill();
      if (!this.converted) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 8px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('»', this.x, this.y);
      }
    } else if (this.type === 'tank') {
      // Tank - large octagon
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const a = (Math.PI / 4) * i - Math.PI / 8;
        const px = this.x + Math.cos(a) * this.radius;
        const py = this.y + Math.sin(a) * this.radius;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      if (!this.converted) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('T', this.x, this.y);
      }
    } else if (this.type === 'fraud') {
      // Fraud - inverted triangle
      ctx.beginPath();
      ctx.moveTo(this.x, this.y + this.radius);
      ctx.lineTo(this.x + this.radius, this.y - this.radius);
      ctx.lineTo(this.x - this.radius, this.y - this.radius);
      ctx.closePath();
      ctx.fill();
      if (!this.converted) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 8px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('▼', this.x, this.y);
      }
    } else if (this.type === 'corruption') {
      // Corruption - spinning star (draw as 5-pointed star)
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const a = (Math.PI / 5) * i - Math.PI / 2 + Date.now() * 0.001;
        const r = i % 2 === 0 ? this.radius : this.radius * 0.5;
        const px = this.x + Math.cos(a) * r;
        const py = this.y + Math.sin(a) * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      if (!this.converted) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 8px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('★', this.x, this.y);
      }
      // Aura indicator
      if (this.auraRange) {
        ctx.strokeStyle = `${this.color}44`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.auraRange, 0, Math.PI * 2);
        ctx.stroke();
      }
    } else if (this.type === 'taxes') {
      // Taxes - square with cut corner
      const r = this.radius;
      ctx.beginPath();
      ctx.moveTo(this.x - r, this.y - r);
      ctx.lineTo(this.x + r, this.y - r);
      ctx.lineTo(this.x + r, this.y + r * 0.3);
      ctx.lineTo(this.x + r * 0.3, this.y + r);
      ctx.lineTo(this.x - r, this.y + r);
      ctx.closePath();
      ctx.fill();
      if (!this.converted) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 8px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('%', this.x, this.y);
      }
    } else if (this.type === 'abuse') {
      // Abuse - jagged polygon (6 points, irregular)
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i + Math.sin(Date.now() * 0.005 + i) * 0.3;
        const r = this.radius * (0.7 + Math.random() * 0.6);
        const px = this.x + Math.cos(a) * r;
        const py = this.y + Math.sin(a) * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      if (!this.converted) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 8px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('!', this.x, this.y);
      }
    } else if (this.type === 'censorship') {
      // Censorship - black rectangle with white bar
      ctx.fillRect(this.x - this.radius, this.y - this.radius * 0.7, this.radius * 2, this.radius * 1.4);
      ctx.fillStyle = '#fff';
      ctx.fillRect(this.x - this.radius * 0.8, this.y - 3, this.radius * 1.6, 6);
      if (!this.converted) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 7px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('█', this.x, this.y + 12);
      }
    }

    // Health bar
    if (!this.converted && this.health < this.maxHealth) {
      const barW = this.radius * 2;
      const barH = 3;
      const barX = this.x - barW / 2;
      const barY = this.y - this.radius - 8;
      ctx.fillStyle = '#333';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = COLORS.healthGreen;
      ctx.fillRect(barX, barY, barW * (this.health / this.maxHealth), barH);
    }

    // Elite/miniboss indicators
    if (this.isElite || this.isMiniboss) {
      // Shield indicator
      if (this.hasShield && this.shieldHP > 0) {
        ctx.strokeStyle = '#2196f3';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius + 5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = '#2196f3';
        ctx.font = 'bold 8px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`🛡${this.shieldHP}`, this.x, this.y - this.radius - 12);
      }
      // Elite glow
      if (this.eliteColor) {
        ctx.shadowColor = this.eliteColor;
        ctx.shadowBlur = 8;
        ctx.strokeStyle = this.eliteColor;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius + 2, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      // Miniboss crown
      if (this.isMiniboss) {
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('👑', this.x, this.y - this.radius - 18);
      }
    }

    // Convert window indicator
    if (!this.converted && this.convertTimer > 0) {
      const progress = this.convertTimer / this.convertWindow;
      ctx.strokeStyle = COLORS.convert;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius + 6, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * progress);
      ctx.stroke();
    }

    ctx.restore();
  }
}

class Bullet {
  constructor(x, y, vx, vy, damage, owner, color) {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.damage = damage;
    this.owner = owner; // 'player' or 'enemy'
    this.radius = owner === 'player' ? 4 : 3;
    this.color = color || (owner === 'player' ? COLORS.bulletPlayer : COLORS.bulletEnemy);
    this.alive = true;
  }

  update() {
    if (this.acceleration) {
      this.vx *= this.acceleration;
      this.vy *= this.acceleration;
      const speed = Math.hypot(this.vx, this.vy);
    if (this.maxSpeed && speed > this.maxSpeed) {
        const scale = this.maxSpeed / speed;
        this.vx *= scale;
        this.vy *= scale;
      }
    }
    if (this.homing && this.trailColor) {
      this.trailTimer = (this.trailTimer || 0) + 1;
      if (this.trailTimer % 2 === 0) {
        particles.push(new Particle(
          this.x - this.vx * 0.6,
          this.y - this.vy * 0.6,
          Math.random() < 0.7 ? this.trailColor : '#ff9800',
          rand(2, 4)
        ));
      }
    }
    this.x += this.vx;
    this.y += this.vy;
    // Out of bounds
    if (this.x < -10 || this.x > GAME_W + 10 || this.y < -10 || this.y > GAME_H + 10) {
      this.alive = false;
    }
  }

  draw() {
    ctx.save();
    if (this.drawMissile) {
      const a = Math.atan2(this.vy, this.vx);
      ctx.translate(this.x, this.y);
      ctx.rotate(a);
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 10;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.moveTo(10, 0);
      ctx.lineTo(-6, -5);
      ctx.lineTo(-2, 0);
      ctx.lineTo(-6, 5);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillRect(-1, -1.5, 5, 3);
      ctx.fillStyle = '#ff9800';
      ctx.beginPath();
      ctx.moveTo(-6, -3);
      ctx.lineTo(-12, 0);
      ctx.lineTo(-6, 3);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      return;
    }
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 6;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

class Particle {
  constructor(x, y, color, size) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.size = size || rand(1, 3);
    const a = rand(0, Math.PI * 2);
    const speed = rand(1, 4);
    this.vx = Math.cos(a) * speed;
    this.vy = Math.sin(a) * speed;
    this.life = rand(300, 700); // ms
    this.maxLife = this.life;
    this.alive = true;
  }

  update(dt) {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.96;
    this.vy *= 0.96;
    this.life -= dt;
    if (this.life <= 0) this.alive = false;
  }

  draw() {
    const alpha = this.life / this.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

class Sat {
  constructor(x, y, value) {
    this.x = x;
    this.y = y;
    this.value = value;
    this.radius = 8;
    this.alive = true;
    this.bobOffset = rand(0, Math.PI * 2);
    this.magnetRange = 80; // pixels where player attracts sats
  }

  update(dt) {
    // Bob animation
    this.bobOffset += dt * 0.003;

    // Magnet toward player when close (increased range during magnet power-up)
    const d = dist(this, player);
    const effectiveRange = player.magnetTimer > 0 ? 200 : this.magnetRange;
    const magnetBonus = getTalentBonus('magnet');
    const finalRange = effectiveRange * (1 + magnetBonus);
    if (d < finalRange) {
      const a = angle(this, player);
      const pull = (1 - d / finalRange) * (player.magnetTimer > 0 ? 8 : 4);
      this.x += Math.cos(a) * pull;
      this.y += Math.sin(a) * pull;
    }

    // Collect on touch
    if (d < this.radius + player.radius) {
      let value = this.value;
      // Greed talent: 5% chance for double sats
      if (getTalentRank('greed') > 0 && Math.random() < 0.05) {
        value *= 2;
        spawnDamageNumber(this.x, this.y, 'DOUBLE!', '#ffd700');
      }
      player.sats += value;
      player.score += value;
      player.stats.totalSats += value;
      // Apply sats talent bonus
      const satsBonus = getTalentBonus('sats');
      if (satsBonus > 0) {
        const bonusSats = Math.floor(value * satsBonus);
        player.sats += bonusSats;
        player.stats.totalSats += bonusSats;
      }
      this.alive = false;
      playSound('pickup');
      // Pickup sparkle
      for (let i = 0; i < 4; i++) {
        particles.push(new Particle(this.x, this.y, COLORS.bitcoin, 2));
      }
    }
  }

  draw() {
    const bobY = this.y + Math.sin(this.bobOffset) * 3;
    ctx.save();
    ctx.shadowColor = COLORS.bitcoin;
    ctx.shadowBlur = 10;

    // Coin
    ctx.fillStyle = COLORS.bitcoin;
    ctx.beginPath();
    ctx.arc(this.x, bobY, this.radius, 0, Math.PI * 2);
    ctx.fill();

    // Lightning bolt symbol (simplified)
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⚡', this.x, bobY + 1);

    // Value text
    ctx.shadowBlur = 0;
    ctx.fillStyle = COLORS.bitcoinLight;
    ctx.font = '8px monospace';
    ctx.fillText(this.value, this.x, bobY - this.radius - 5);

    ctx.restore();
  }
}

class Shop {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.radius = 24;
    this.active = true;
    this.open = false;
  }

  draw() {
    ctx.save();
    const pulse = Math.sin(Date.now() * 0.003) * 0.15 + 0.85;
    ctx.shadowColor = COLORS.shop;
    ctx.shadowBlur = 15 * pulse;

    // Shop base
    ctx.fillStyle = COLORS.shop;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();

    // Bitcoin symbol
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('₿', this.x, this.y);

    ctx.restore();

    // "Press E" prompt when player is near
    if (this.active && dist(this, player) < 60) {
      ctx.fillStyle = COLORS.textBright;
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('[E] Shop', this.x, this.y - this.radius - 12);
    }
  }
}
