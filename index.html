function render() {
  const applyBrightnessOverlay = () => {
    if (brightness === 1) return;
    const alpha = Math.min(0.35, Math.abs(brightness - 1) * 0.5);
    ctx.fillStyle = brightness < 1
      ? `rgba(0, 0, 0, ${alpha})`
      : `rgba(255, 255, 255, ${alpha * 0.45})`;
    ctx.fillRect(0, 0, GAME_W, GAME_H);
  };

  // Background
  ctx.fillStyle = BIOMES[currentBiome].bg;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Grid
  drawGrid();

  if (gameState === 'start') {
    ctx.restore();
    renderStartScreen();
    applyBrightnessOverlay();
    return;
  }

  if (gameState === 'gameover') {
    renderGameplay();
    // Death particles
    for (const p of deathParticles) p.draw();
    renderGameOver();
    ctx.restore();
    drawDamageNumbers();
    applyBrightnessOverlay();
    return;
  }

  renderGameplay();
  drawDamageNumbers();
  ctx.restore();

  // Minimap
  renderMinimap();
  renderTouchControls();

  if (gameState === 'shop') {
    renderShopMenu();
  }
  applyBrightnessOverlay();
}

function drawGrid() {
  let gridCanvas = gridCanvasCache.get(currentBiome);
  if (!gridCanvas) {
    gridCanvas = document.createElement('canvas');
    gridCanvas.width = GAME_W;
    gridCanvas.height = GAME_H;
    const gridCtx = gridCanvas.getContext('2d');
    const biome = BIOMES[currentBiome];
    const gridSize = 40;
    gridCtx.strokeStyle = biome.grid;
    gridCtx.lineWidth = 1;
    for (let x = 0; x <= GAME_W; x += gridSize) {
      gridCtx.beginPath();
      gridCtx.moveTo(x, 0);
      gridCtx.lineTo(x, GAME_H);
      gridCtx.stroke();
    }
    for (let y = 0; y <= GAME_H; y += gridSize) {
      gridCtx.beginPath();
      gridCtx.moveTo(0, y);
      gridCtx.lineTo(GAME_W, y);
      gridCtx.stroke();
    }
    gridCtx.fillStyle = biome.gridBright;
    for (let x = 0; x <= GAME_W; x += gridSize) {
      for (let y = 0; y <= GAME_H; y += gridSize) {
        gridCtx.fillRect(x - 1, y - 1, 2, 2);
      }
    }
    gridCanvasCache.set(currentBiome, gridCanvas);
  }
  ctx.drawImage(gridCanvas, 0, 0);
}

function renderGameplay() {
  // Shops
  for (const shop of shops) {
    if (shop.active) shop.draw();
  }

  // Sats
  for (const sat of sats) sat.draw();

  // Power-ups
  for (const pu of powerUps) pu.draw();

  // Hazards
  for (const h of hazards) {
    const alpha = h.life / h.maxLife;
    if (h.type === 'sandstorm') {
      ctx.fillStyle = `rgba(255, 152, 0, ${alpha * 0.2})`;
      ctx.fillRect(0, 0, GAME_W, GAME_H);
    } else if (h.type === 'laserGrid') {
      if (!h.active) {
        // Warning indicator - dashed line
        const warnAlpha = 0.3 + Math.sin(Date.now() * 0.01) * 0.2;
        ctx.strokeStyle = `rgba(255, 50, 50, ${warnAlpha})`;
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(h.x1, h.y1);
        ctx.lineTo(h.x2, h.y2);
        ctx.stroke();
        ctx.setLineDash([]);
        // Warning text
        const midX = (h.x1 + h.x2) / 2;
        const midY = (h.y1 + h.y2) / 2;
        ctx.fillStyle = `rgba(255, 50, 50, ${warnAlpha + 0.2})`;
        ctx.font = 'bold 12px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('⚠ LASER', midX, midY);
      } else {
        ctx.strokeStyle = `rgba(224, 64, 251, ${alpha})`;
        ctx.lineWidth = 4;
        ctx.shadowColor = '#e040fb';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.moveTo(h.x1, h.y1);
        ctx.lineTo(h.x2, h.y2);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    } else if (h.type === 'trap') {
      ctx.fillStyle = `rgba(244, 67, 54, ${alpha * 0.4})`;
      ctx.beginPath();
      ctx.arc(h.x, h.y, h.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = `rgba(244, 67, 54, ${alpha})`;
      ctx.lineWidth = 2;
      ctx.stroke();
      // Warning symbol
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⚠', h.x, h.y);
    } else if (h.type === 'blizzard') {
      // Blizzard - simple white overlay (lightweight)
      ctx.fillStyle = `rgba(200, 230, 255, ${alpha * 0.15})`;
      ctx.fillRect(0, 0, GAME_W, GAME_H);
      // Simple snow text
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.8})`;
      ctx.font = 'bold 16px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('❄ BLIZZARD ❄', GAME_W / 2, GAME_H / 2 - 80);
    } else if (h.type === 'vineSnare') {
      // Vines - green organic looking trap
      ctx.fillStyle = `rgba(76, 175, 80, ${alpha * 0.4})`;
      ctx.beginPath();
      ctx.arc(h.x, h.y, h.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = `rgba(139, 195, 74, ${alpha})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const a = (Math.PI / 4) * i;
        const r = h.radius * (0.5 + Math.sin(Date.now() * 0.003 + i) * 0.3);
        const px = h.x + Math.cos(a) * r;
        const py = h.y + Math.sin(a) * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🌿', h.x, h.y);
    }
  }

  // Allies
  for (const ally of allies) ally.draw();

  // Enemies
  for (const enemy of enemies) enemy.draw();

  // Boss
  if (boss && boss.alive) boss.draw();

  // Player
  if (gameState !== 'gameover') player.draw();

  // Bullets
  for (const bullet of bullets) bullet.draw();

  // Particles
  for (const particle of particles) particle.draw();

  // Laser beams
  for (const lb of laserBeams) {
    const alpha = lb.life / lb.maxLife;
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = lb.color || '#00e5ff';
    ctx.lineWidth = lb.width || 3;
    ctx.shadowColor = lb.color || '#00e5ff';
    ctx.shadowBlur = lb.glow || 10;
    ctx.beginPath();
    ctx.moveTo(lb.x1, lb.y1);
    ctx.lineTo(lb.x2, lb.y2);
    ctx.stroke();
    // Inner bright line
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = lb.coreWidth || 1;
    ctx.beginPath();
    ctx.moveTo(lb.x1, lb.y1);
    ctx.lineTo(lb.x2, lb.y2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // HUD
  renderHUD();

  // Boss health bar
  if (boss && boss.alive) renderBossHealthBar();
  renderBossAttackOverlay();

  // Boss entrance flash
  if (bossFlashTimer > 0) {
    const alpha = bossFlashTimer / 1000 * 0.3;
    ctx.fillStyle = `rgba(255, 0, 0, ${alpha})`;
    ctx.fillRect(0, 0, GAME_W, GAME_H);
  }

  // Biome transition flash
  if (biomeFlashTimer > 0) {
    const alpha = biomeFlashTimer / 800 * 0.5;
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.fillRect(0, 0, GAME_W, GAME_H);
  }

  // Wave announce
  if (waveAnnounceTimer > 0) {
    const alpha = Math.min(1, waveAnnounceTimer / 500);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = COLORS.textBright;
    ctx.font = 'bold 32px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(waveAnnounceText, GAME_W / 2, GAME_H / 3);
    ctx.globalAlpha = 1;
  }

  // Next wave countdown with preview
  if (enemies.length === 0 && waveTimer > 0) {
    ctx.fillStyle = COLORS.textDim;
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`Next wave in ${Math.ceil(waveTimer / 1000)}...`, GAME_W / 2, GAME_H / 2 + 40);

    // Show upcoming enemy preview
    const nextWave = wave + 1;
    const upcoming = getWavePreview(nextWave);
    if (upcoming.length > 0) {
      const previewY = GAME_H / 2 + 60;
      const count = Math.min(upcoming.length, 10);
      const boxW = Math.max(200, count * 36 + 30);
      const boxH = 44;
      const boxX = GAME_W / 2 - boxW / 2;
      const boxY = previewY;

      // Background box
      ctx.fillStyle = 'rgba(13, 13, 26, 0.85)';
      ctx.fillRect(boxX, boxY, boxW, boxH);
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      ctx.strokeRect(boxX, boxY, boxW, boxH);

      // "Wave N" label
      ctx.fillStyle = COLORS.text;
      ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(`Wave ${nextWave}:`, GAME_W / 2, boxY + 14);

      // Enemy icons
      const iconSpacing = 34;
      const iconsStartX = GAME_W / 2 - ((count - 1) * iconSpacing) / 2;
      for (let i = 0; i < count; i++) {
        const cx = iconsStartX + i * iconSpacing;
        const cy = boxY + 32;
        drawPreviewIcon(cx, cy, upcoming[i]);
      }
    }
  }
}

function renderTouchControls() {
  if (!shouldShowTouchControls()) return;

  const buttons = getGameplayButtonRects();
  const buttonDefs = [
    { rect: buttons.shop, label: 'SHOP', fill: 'rgba(247, 147, 26, 0.22)' },
    { rect: buttons.convert, label: 'WAKE', fill: 'rgba(76, 175, 80, 0.24)' },
    { rect: buttons.pause, label: 'PAUSE', fill: 'rgba(255, 255, 255, 0.12)' }
  ];

  ctx.save();
  ctx.globalAlpha = 0.92;

  ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
  ctx.beginPath();
  ctx.arc(touchState.leftBaseX, touchState.leftBaseY, 64, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.16)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = 'rgba(0, 188, 212, 0.35)';
  ctx.beginPath();
  ctx.arc(touchState.leftStickX, touchState.leftStickY, 28, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
  ctx.beginPath();
  ctx.arc(touchState.rightBaseX, touchState.rightBaseY, 48, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.16)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(touchState.rightBaseX, touchState.rightBaseY, 48, 0, Math.PI * 2);
  ctx.stroke();

  ctx.fillStyle = 'rgba(247, 147, 26, 0.34)';
  ctx.beginPath();
  ctx.arc(touchState.rightStickX, touchState.rightStickY, 24, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = 'rgba(255, 255, 255, 0.16)';
  ctx.setLineDash([6, 6]);
  ctx.beginPath();
  ctx.moveTo(player.x, player.y);
  ctx.lineTo(player.x + touchState.aimX * 72, player.y + touchState.aimY * 72);
  ctx.stroke();
  ctx.setLineDash([]);

  for (const button of buttonDefs) {
    ctx.fillStyle = button.fill;
    ctx.fillRect(button.rect.x, button.rect.y, button.rect.w, button.rect.h);
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.22)';
    ctx.lineWidth = 2;
    ctx.strokeRect(button.rect.x, button.rect.y, button.rect.w, button.rect.h);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(button.label, button.rect.x + button.rect.w / 2, button.rect.y + button.rect.h / 2 + 1);
  }

  ctx.restore();
}

function renderBossAttackOverlay() {
  if (!boss || !boss.alive || boss.entering) return;

  const attackKey = boss.attacks[boss.attackPattern];
  const meta = BOSS_ATTACK_META[attackKey] || { label: attackKey, color: '#fff', pattern: 'none' };
  const cyclePct = clamp(boss.attackTimer / boss.attackCycle, 0, 1);
  const urgent = cyclePct > 0.72;
  const alpha = urgent ? 0.24 + Math.sin(Date.now() * 0.015) * 0.08 : 0.12;

  ctx.save();

  if (meta.pattern === 'ring' || meta.pattern === 'radial') {
    ctx.strokeStyle = meta.color;
    ctx.lineWidth = urgent ? 4 : 2;
    ctx.globalAlpha = alpha + 0.15;
    ctx.beginPath();
    ctx.arc(boss.x, boss.y, boss.radius + 34 + Math.sin(Date.now() * 0.01) * 8, 0, Math.PI * 2);
    ctx.stroke();
  }

  if (meta.pattern === 'line') {
    const a = angle(boss, player);
    const spread = attackKey === 'laserGrid' ? 0.4 : 0;
    ctx.strokeStyle = meta.color;
    ctx.lineWidth = urgent ? 4 : 2;
    ctx.setLineDash([10, 8]);
    ctx.globalAlpha = alpha + 0.18;
    for (let i = -1; i <= 1; i++) {
      if (attackKey !== 'laserGrid' && i !== 0) continue;
      const ta = a + i * spread;
      ctx.beginPath();
      ctx.moveTo(boss.x, boss.y);
      ctx.lineTo(boss.x + Math.cos(ta) * 900, boss.y + Math.sin(ta) * 900);
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  if (meta.pattern === 'vertical') {
    ctx.globalAlpha = alpha;
    ctx.fillStyle = meta.color;
    for (let i = 0; i < 6; i++) {
      const x = 80 + i * 160;
      ctx.fillRect(x, 0, 8, 38);
      ctx.fillRect(x + 16, 0, 4, 22);
    }
  }

  if (meta.pattern === 'seekers') {
    ctx.globalAlpha = alpha + 0.12;
    ctx.strokeStyle = meta.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius + 22 + Math.sin(Date.now() * 0.01) * 4, 0, Math.PI * 2);
    ctx.stroke();
  }

  if (meta.pattern === 'blink') {
    ctx.globalAlpha = alpha + 0.12;
    ctx.strokeStyle = meta.color;
    ctx.lineWidth = 2;
    ctx.strokeRect(boss.x - boss.radius - 26, boss.y - boss.radius - 26, (boss.radius + 26) * 2, (boss.radius + 26) * 2);
  }

  const panelW = 220;
  const panelH = 48;
  const panelX = GAME_W - panelW - 14;
  const panelY = 72;
  ctx.globalAlpha = 1;
  ctx.fillStyle = 'rgba(6, 8, 14, 0.82)';
  ctx.fillRect(panelX, panelY, panelW, panelH);
  ctx.strokeStyle = meta.color;
  ctx.lineWidth = 2;
  ctx.strokeRect(panelX, panelY, panelW, panelH);
  ctx.fillStyle = meta.color;
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(`Boss: ${meta.label}`, panelX + 10, panelY + 8);
  ctx.fillStyle = '#9aa4b2';
  ctx.font = '10px monospace';
  ctx.fillText(colorblindMode ? `Pattern: ${meta.pattern}` : `Attack cycle`, panelX + 10, panelY + 24);
  ctx.fillStyle = '#1a2230';
  ctx.fillRect(panelX + 118, panelY + 23, 88, 10);
  ctx.fillStyle = meta.color;
  ctx.fillRect(panelX + 118, panelY + 23, 88 * cyclePct, 10);

  ctx.restore();
}

function renderHUD() {
  const hudScale = uiScale;
  const hudW = GAME_W / hudScale;
  const hudH = GAME_H / hudScale;
  ctx.save();
  ctx.scale(hudScale, hudScale);

  // Health bar (top-left)
  const hbX = 15, hbY = 15, hbW = 180, hbH = 16;
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(hbX, hbY, hbW, hbH);
  const healthPct = Math.max(0, player.health / player.maxHealth);
  ctx.fillStyle = healthPct > 0.3 ? COLORS.healthGreen : COLORS.healthRed;
  ctx.fillRect(hbX, hbY, hbW * healthPct, hbH);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.strokeRect(hbX, hbY, hbW, hbH);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`HP ${Math.max(0, Math.ceil(player.health))}/${player.maxHealth}`, hbX + hbW / 2, hbY + hbH / 2 + 1);

  // XP bar (below health)
  const xpY = hbY + hbH + 4;
  const xpH = 14;
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(hbX, xpY, hbW, xpH);
  const xpPct = Math.min(1, playerXP / xpForNextLevel);
  ctx.fillStyle = '#9c27b0';
  ctx.fillRect(hbX, xpY, hbW * xpPct, xpH);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.strokeRect(hbX, xpY, hbW, xpH);
  
  // Shorter, more reliable text that always fits
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`Lv.${playerLevel} | ${playerXP}xp`, hbX + hbW / 2, xpY + xpH / 2);
  ctx.textBaseline = 'alphabetic';

  // Sat balance with lightning (top-center)
  ctx.fillStyle = COLORS.bitcoin;
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`⚡ ${player.sats} sats`, hudW / 2, 26);

  // Score (top-right)
  ctx.fillStyle = COLORS.textBright;
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`Score: ${player.score}`, hudW - 15, 26);

  // Level/Wave indicator (bottom-left)
  ctx.fillStyle = COLORS.text;
  ctx.font = '12px monospace';
  ctx.textAlign = 'left';
  const biomeText = dailyMode ? `Daily #${dailySeed}` : `${BIOMES[currentBiome].name}`;
  ctx.fillText(`Wave ${wave} | ${biomeText}`, 15, hudH - 15);

  // Current weapon (bottom-center)
  const weaponNames = { pistol: '🔫 Pistol', shotgun: '▸ Shotgun', laser: '│ Laser', homing: '◉ Homing', flamethrower: '🔥 Flame', railgun: '⚡ Rail' };
  const weaponColors = { pistol: '#4dd0e1', shotgun: '#ffeb3b', laser: '#00e5ff', homing: '#e040fb', flamethrower: '#ff5722', railgun: '#00bcd4' };
  const currentWep = player.weapons[player.currentWeapon];
  ctx.fillStyle = weaponColors[currentWep] || '#fff';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  const wepText = weaponNames[currentWep] || currentWep;
  const ammoText = currentWep === 'laser' || player.weaponAmmo[currentWep] === undefined ? ' [∞]' : ` [${player.weaponAmmo[currentWep]}]`;
  ctx.fillText(`${wepText}${ammoText}`, hudW / 2, hudH - 35);

  // Weapon slots hint
  if (player.weapons.length > 1 && showKeybindHints) {
    if (isGamepadUiPreferred()) {
      drawInlineControllerPrompt(
        [
          makeControllerActionToken('prevWeapon'),
          makeControllerTextToken('/'),
          makeControllerActionToken('nextWeapon'),
          makeControllerTextToken(' switch')
        ],
        hudW / 2,
        hudH - 20,
        { align: 'center', font: '9px monospace', textColor: COLORS.textDim, badgeHeight: 13, gap: 3 }
      );
    } else {
      ctx.fillStyle = COLORS.textDim;
      ctx.font = '9px monospace';
      ctx.fillText('1-4 switch', hudW / 2, hudH - 20);
    }
  }

  // Boost timers
  let boostY = 52; // Start below XP bar (ends at ~49)

  // Talent points indicator
  if (talentPoints > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`★ ${talentPoints} Talent Point${talentPoints > 1 ? 's' : ''}!`, 15, boostY);
    boostY += 14;
  }
  
  if (player.damageBoostTimer > 0) {
    ctx.fillStyle = COLORS.enemyContractor;
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`⚔ DMG ${Math.ceil(player.damageBoostTimer / 1000)}s`, 15, boostY);
    boostY += 14;
  }
  if (player.speedBoostTimer > 0) {
    ctx.fillStyle = COLORS.convert;
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`» SPD ${Math.ceil(player.speedBoostTimer / 1000)}s`, 15, boostY);
  }

  // Shield charges
  if (player.shieldCharges > 0) {
    ctx.fillStyle = '#2196f3';
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`🛡 ${player.shieldCharges}`, 15, boostY + 14);
  }

  // Time slow indicator
  if (player.timeSlowTimer > 0) {
    ctx.fillStyle = '#9c27b0';
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`⏱ ${Math.ceil(player.timeSlowTimer / 1000)}s`, 15, boostY + (player.shieldCharges > 0 ? 28 : 14));
  }

  // Magnet indicator
  if (player.magnetTimer > 0) {
    ctx.fillStyle = '#00bcd4';
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`⊕ ${Math.ceil(player.magnetTimer / 1000)}s`, 15, boostY + (player.timeSlowTimer > 0 ? 42 : player.shieldCharges > 0 ? 28 : 14));
  }

  // Combo display
  if (comboCount > 1) {
    ctx.fillStyle = '#ffeb3b';
    ctx.font = `bold ${14 + comboCount}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(`${comboCount}x COMBO! (${comboMultiplier.toFixed(1)}x)`, hudW / 2, 80);
  }

  if (hasPendingAudioUnlock()) {
    ctx.fillStyle = '#ffcc80';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(getAudioUnlockPromptText(), hudW / 2, 42);
  } else if (controllerFullscreenPromptVisible && isGamepadUiPreferred() && !isFullscreenDisplayActive()) {
    ctx.fillStyle = '#ffcc80';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(getControllerFullscreenPromptText(), hudW / 2, 42);
  }

  // Controls hint (bottom-right, subtle)
  if (showKeybindHints) {
    const usingGamepad = isGamepadUiPreferred();
    if (usingGamepad) {
      drawInlineControllerPrompt(
        [
          makeControllerLabelToken('LS'),
          makeControllerTextToken(' / ', COLORS.textDim),
          makeControllerLabelToken('D-PAD'),
          makeControllerTextToken(' move | ', COLORS.textDim),
          makeControllerLabelToken('RS'),
          makeControllerTextToken(' aim/fire | ', COLORS.textDim),
          makeControllerLabelToken('LT'),
          makeControllerTextToken('/', COLORS.textDim),
          makeControllerLabelToken('RT'),
          makeControllerTextToken(' fire | ', COLORS.textDim),
          makeControllerActionToken('convert'),
          makeControllerTextToken(' wake | ', COLORS.textDim),
          makeControllerActionToken('confirm'),
          makeControllerTextToken(' shop', COLORS.textDim)
        ],
        hudW - 15,
        hudH - MINIMAP_SIZE - 25,
        { align: 'right', font: '10px monospace', textColor: COLORS.textDim, badgeHeight: 13, gap: 3 }
      );
    } else {
      ctx.fillStyle = COLORS.textDim;
      ctx.font = '10px monospace';
      ctx.textAlign = 'right';
      const shootHint = touchControlsEnabled ? 'Right aim/shoot' : 'Click shoot';
      const moveHint = touchControlsEnabled ? 'Left stick move' : 'WASD move';
      const convertHint = touchControlsEnabled ? 'WAKE btn' : formatKey(keybinds.convert);
      const shopHint = touchControlsEnabled ? 'SHOP btn' : formatKey(keybinds.shop);
      ctx.fillText(`${moveHint} | ${shootHint} | ${convertHint} | ${shopHint}`, hudW - 15, hudH - MINIMAP_SIZE - 25);
    }
  }
  ctx.restore();
}

function renderBossHealthBar() {
  if (!boss || !boss.alive) return;
  const barW = 400;
  const barH = 20;
  const barX = GAME_W / 2 - barW / 2;
  const barY = 45;
  const healthPct = Math.max(0, boss.health / boss.maxHealth);

  // Background
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(barX - 4, barY - 4, barW + 8, barH + 8);

  // Health bar
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(barX, barY, barW, barH);

  // Health fill - changes color in phase 2
  ctx.fillStyle = boss.phase === 2 ? '#ff1744' : '#d32f2f';
  ctx.fillRect(barX, barY, barW * healthPct, barH);

  // Border
  ctx.strokeStyle = boss.phase === 2 ? '#ff5252' : '#e91e63';
  ctx.lineWidth = 2;
  ctx.strokeRect(barX, barY, barW, barH);

  // Boss name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`${boss.name} - ${Math.ceil(boss.health)}/${boss.maxHealth}`, GAME_W / 2, barY + barH / 2);
}

function renderMinimap() {
  if (gameState !== 'playing' && gameState !== 'shop') return;

  const scaleX = MINIMAP_SIZE / GAME_W;
  const scaleY = MINIMAP_SIZE / GAME_H;

  // Background
  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillRect(MINIMAP_X, MINIMAP_Y, MINIMAP_SIZE, MINIMAP_SIZE);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.strokeRect(MINIMAP_X, MINIMAP_Y, MINIMAP_SIZE, MINIMAP_SIZE);

  // Player
  ctx.fillStyle = COLORS.player;
  ctx.fillRect(
    MINIMAP_X + player.x * scaleX - 2,
    MINIMAP_Y + player.y * scaleY - 2,
    4, 4
  );

  // Allies
  for (const a of allies) {
    ctx.fillStyle = '#4caf50';
    ctx.fillRect(
      MINIMAP_X + a.x * scaleX - 1,
      MINIMAP_Y + a.y * scaleY - 1,
      3, 3
    );
  }

  // Enemies
  ctx.fillStyle = '#ff5252';
  for (const e of enemies) {
    if (!e.converted) {
      ctx.fillRect(
        MINIMAP_X + e.x * scaleX - 1,
        MINIMAP_Y + e.y * scaleY - 1,
        2, 2
      );
    }
  }

  // Boss
  if (boss && boss.alive) {
    ctx.fillStyle = '#ff1744';
    ctx.fillRect(
      MINIMAP_X + boss.x * scaleX - 3,
      MINIMAP_Y + boss.y * scaleY - 3,
      6, 6
    );
  }

  // Shops
  ctx.fillStyle = COLORS.bitcoin;
  for (const s of shops) {
    if (s.active) {
      ctx.fillRect(
        MINIMAP_X + s.x * scaleX - 2,
        MINIMAP_Y + s.y * scaleY - 2,
        4, 4
      );
    }
  }

  // Power-ups
  ctx.fillStyle = '#fff';
  for (const p of powerUps) {
    ctx.fillRect(
      MINIMAP_X + p.x * scaleX - 1,
      MINIMAP_Y + p.y * scaleY - 1,
      3, 3
    );
  }
}

function renderPauseMenu() {
  const usingGamepad = isGamepadUiPreferred();
  // Overlay
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Pause text
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('PAUSED', GAME_W / 2, GAME_H / 2 - 40);

  // Instructions
  ctx.fillStyle = COLORS.text;
  ctx.font = '18px monospace';
  if (usingGamepad) {
    drawInlineControllerPrompt(
      [
        makeControllerTextToken('Press ', COLORS.text),
        makeControllerActionToken('confirm'),
        makeControllerTextToken(' / ', COLORS.text),
        makeControllerActionToken('pause'),
        makeControllerTextToken(' to resume', COLORS.text)
      ],
      GAME_W / 2,
      GAME_H / 2 + 20,
      { align: 'center', font: '18px monospace', textColor: COLORS.text, badgeHeight: 20, gap: 5 }
    );
  } else {
    ctx.fillText(touchControlsEnabled ? 'Tap anywhere or PAUSE to resume' : 'Press ESC to resume', GAME_W / 2, GAME_H / 2 + 20);
  }

  ctx.fillStyle = COLORS.textDim;
  ctx.font = '14px monospace';
  if (usingGamepad) {
    drawInlineControllerPrompt(
      [
        makeControllerActionToken('back'),
        makeControllerTextToken(' back | ', COLORS.textDim),
        makeControllerActionToken('shop'),
        makeControllerTextToken(' shop | ', COLORS.textDim),
        makeControllerActionToken('convert'),
        makeControllerTextToken(' settings', COLORS.textDim)
      ],
      GAME_W / 2,
      GAME_H / 2 + 60,
      { align: 'center', font: '14px monospace', textColor: COLORS.textDim, badgeHeight: 16, gap: 4 }
    );
  } else {
    ctx.fillText(
      touchControlsEnabled ? 'Tap resume | Settings menu stays touch-friendly' : 'Click resume | R reset | S shop | O settings',
      GAME_W / 2,
      GAME_H / 2 + 60
    );
  }

  // Handle resume click
  if (mouse.clicked) {
    paused = false;
    mouse.clicked = false;
    mouse.down = false;
  }
  // Handle reset
  if (keys['r']) {
    paused = false;
    keys['r'] = false;
    initGame();
  }
}

function renderSettings() {
  // Overlay
  ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  const { boxW, boxH, boxX, boxY, rowH, compact } = getSettingsLayout();

  ctx.fillStyle = 'rgba(13, 13, 26, 0.95)';
  ctx.fillRect(boxX, boxY, boxW, boxH);
  ctx.strokeStyle = COLORS.bitcoin;
  ctx.lineWidth = 3;
  ctx.strokeRect(boxX, boxY, boxW, boxH);

  // Title
  ctx.fillStyle = COLORS.bitcoin;
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('⚙ SETTINGS', GAME_W / 2, boxY + 35);
  ctx.fillStyle = getAudioRuntimeStatus() === 'running' ? '#4caf50' : '#ffcc80';
  ctx.font = '11px monospace';
  ctx.fillText(`Audio: ${getAudioRuntimeStatus()}`, GAME_W / 2, boxY + 52);

  // Items
  SETTINGS_ITEMS.forEach((item, i) => {
    const iy = boxY + 70 + i * rowH;
    const selected = i === settingsSelection;

    if (selected) {
      ctx.fillStyle = 'rgba(247, 147, 26, 0.15)';
      ctx.fillRect(boxX + 10, iy - 17, boxW - 20, compact ? 40 : 35);
    }

    ctx.fillStyle = selected ? COLORS.textBright : COLORS.text;
    ctx.font = selected ? 'bold 14px monospace' : '14px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(item.label, boxX + 25, iy + 5);

    // Value display
    ctx.textAlign = 'right';
    if (item.key === 'volume') {
      const bar = '█'.repeat(Math.round(masterVolume * 10)) + '░'.repeat(10 - Math.round(masterVolume * 10));
      ctx.fillStyle = COLORS.bitcoin;
      ctx.fillText(`${bar} ${Math.round(masterVolume * 100)}%`, boxX + boxW - 25, iy + 5);
    } else if (item.key === 'brightness') {
      const bar = '█'.repeat(Math.round((brightness - 0.6) / 0.08)) + '░'.repeat(10 - Math.round((brightness - 0.6) / 0.08));
      ctx.fillStyle = '#ffd54f';
      ctx.fillText(`${bar} ${Math.round(brightness * 100)}%`, boxX + boxW - 25, iy + 5);
    } else if (item.key === 'uiScale') {
      const bar = '█'.repeat(Math.round((uiScale - 0.85) / 0.05)) + '░'.repeat(10 - Math.round((uiScale - 0.85) / 0.05));
      ctx.fillStyle = '#80cbc4';
      ctx.fillText(`${bar} ${uiScale.toFixed(2)}x`, boxX + boxW - 25, iy + 5);
    } else if (item.key === 'mute') {
      ctx.fillStyle = muted ? '#f44336' : COLORS.textDim;
      ctx.fillText(muted ? 'ON' : 'OFF', boxX + boxW - 25, iy + 5);
    } else if (item.key === 'showKeybindHints') {
      ctx.fillStyle = showKeybindHints ? '#4caf50' : COLORS.textDim;
      ctx.fillText(showKeybindHints ? 'ON' : 'OFF', boxX + boxW - 25, iy + 5);
    } else if (item.key === 'touchControls') {
      ctx.fillStyle = touchControlsEnabled ? '#4caf50' : COLORS.textDim;
      ctx.fillText(touchControlsEnabled ? 'ON' : 'OFF', boxX + boxW - 25, iy + 5);
    } else if (item.key === 'controller') {
      ctx.fillStyle = gamepadState.connected ? '#4caf50' : COLORS.textDim;
      ctx.fillText('[Open]', boxX + boxW - 25, iy + 5);
    } else if (item.key === 'skin') {
      const skin = SKINS[currentSkin];
      ctx.fillStyle = skin.color;
      ctx.fillText(`◉ ${skin.name}`, boxX + boxW - 25, iy + 5);
    } else if (item.key === 'keybinds') {
      ctx.fillStyle = COLORS.textDim;
      ctx.fillText('[Open]', boxX + boxW - 25, iy + 5);
    } else if (item.key === 'talents') {
      ctx.fillStyle = talentPoints > 0 ? '#ffd700' : COLORS.textDim;
      ctx.fillText(talentPoints > 0 ? `★ ${talentPoints}` : `[Open]`, boxX + boxW - 25, iy + 5);
    } else if (item.key === 'reducedMotion') {
      ctx.fillStyle = reducedMotion ? '#4caf50' : COLORS.textDim;
      ctx.fillText(reducedMotion ? 'ON' : 'OFF', boxX + boxW - 25, iy + 5);
    } else if (item.key === 'colorblind') {
      ctx.fillStyle = colorblindMode ? '#4caf50' : COLORS.textDim;
      ctx.fillText(colorblindMode ? 'ON' : 'OFF', boxX + boxW - 25, iy + 5);
    } else {
      ctx.fillStyle = COLORS.textDim;
      ctx.fillText('[ESC]', boxX + boxW - 25, iy + 5);
    }
  });

  ctx.fillStyle = COLORS.textDim;
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(compact ? 'Tap any row | Enter select | ESC back' : '↑/↓ navigate | Enter select | ESC back', GAME_W / 2, boxY + boxH - 15);
}

function renderControllerSettings() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  const layout = getControllerLayout();
  const { compact, boxW, boxH, boxX, boxY, rowH } = layout;
  const gamepad = getActiveGamepad();
  const rumbleAvailable = gamepadSupportsRumble(gamepad);

  ctx.fillStyle = 'rgba(13, 13, 26, 0.96)';
  ctx.fillRect(boxX, boxY, boxW, boxH);
  ctx.strokeStyle = '#4dd0e1';
  ctx.lineWidth = 3;
  ctx.strokeRect(boxX, boxY, boxW, boxH);

  ctx.fillStyle = '#4dd0e1';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAMEPAD SETTINGS', GAME_W / 2, boxY + 28);

  ctx.fillStyle = gamepad ? '#4caf50' : '#f44336';
  ctx.font = compact ? '10px monospace' : '11px monospace';
  const controllerName = gamepadState.name || 'Connected';
  const shortControllerName = controllerName.length > 34 ? `${controllerName.slice(0, 31)}...` : controllerName;
  const connectionText = gamepad ? `Controller: ${shortControllerName}` : 'Controller: not connected';
  ctx.fillText(connectionText, GAME_W / 2, boxY + 50);

  ctx.fillStyle = COLORS.textDim;
  const statusText = gamepad
    ? `Rumble: ${rumbleAvailable ? 'available' : 'browser/controller dependent'} | Move: LS/D-pad | Shoot: RS/LT/RT`
    : getGamepadConnectionHint();
  ctx.fillText(statusText, GAME_W / 2, boxY + 68);

  CONTROLLER_SETTINGS_ITEMS.forEach((item, i) => {
    const iy = boxY + 96 + i * rowH;
    const selected = i === controllerSelection;

    if (selected) {
      ctx.fillStyle = 'rgba(77, 208, 225, 0.14)';
      ctx.fillRect(boxX + 10, iy - 14, boxW - 20, compact ? 30 : 28);
    }

    ctx.fillStyle = selected ? COLORS.textBright : COLORS.text;
    ctx.font = selected ? 'bold 12px monospace' : '12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(item.label, boxX + 18, iy + 4);

    ctx.textAlign = 'right';
    if (item.type === 'toggle') {
      ctx.fillStyle = controllerVibrationEnabled ? '#4caf50' : COLORS.textDim;
      ctx.fillText(controllerVibrationEnabled ? 'ON' : 'OFF', boxX + boxW - 18, iy + 4);
    } else if (item.type === 'slider') {
      const filled = Math.max(1, Math.round(controllerVibrationIntensity * 10));
      const bar = '█'.repeat(filled) + '░'.repeat(10 - filled);
      ctx.fillStyle = rumbleAvailable ? '#80cbc4' : COLORS.textDim;
      ctx.fillText(`${bar} ${Math.round(controllerVibrationIntensity * 100)}%`, boxX + boxW - 18, iy + 4);
    } else if (item.type === 'binding') {
      if (controllerRemappingAction === item.action) {
        const blink = Math.sin(Date.now() * 0.01) > 0;
        if (blink) {
          ctx.fillStyle = '#ffeb3b';
          ctx.fillText(gamepad ? 'Press controller button...' : 'Connect controller...', boxX + boxW - 18, iy + 4);
        }
      } else {
        drawInlineControllerPrompt(
          [makeControllerActionToken(item.action)],
          boxX + boxW - 18,
          iy + 4,
          { align: 'right', font: '12px monospace', textColor: '#4dd0e1', badgeHeight: 15, gap: 0 }
        );
      }
    } else if (item.key === 'testRumble') {
      ctx.fillStyle = rumbleAvailable ? COLORS.bitcoin : COLORS.textDim;
      ctx.fillText(rumbleAvailable ? '[Play]' : '[N/A]', boxX + boxW - 18, iy + 4);
    } else {
      ctx.fillStyle = COLORS.textDim;
      ctx.fillText(item.key === 'resetController' ? '[Reset]' : '[Back]', boxX + boxW - 18, iy + 4);
    }
  });

  ctx.fillStyle = COLORS.textDim;
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  const footer = controllerRemappingAction
    ? (gamepad ? 'Press a controller button to bind | ESC or Back row cancels' : 'Connect a controller, then press a button | ESC cancels')
    : !gamepad
      ? (compact ? 'Use mouse/touch for now | Reopen after pad shows up' : 'Use mouse/keyboard for now | Reopen after the controller appears')
      : compact
      ? 'Tap row or use D-pad | RS/LT/RT all fire'
      : `↑/↓ navigate | Enter/${getControllerBindingLabel('confirm')} select | D-pad fixed | RS/LT/RT all fire`;
  ctx.fillText(footer, GAME_W / 2, boxY + boxH - 16);
}

function renderKeybinds() {
  // Overlay
  ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  const layout = getKeybindsLayout();
  const { boxW, boxH, boxX, boxY, rowH, compact } = layout;
  const footerButtons = getKeybindFooterButtons(layout);

  ctx.fillStyle = 'rgba(13, 13, 26, 0.95)';
  ctx.fillRect(boxX, boxY, boxW, boxH);
  ctx.strokeStyle = '#9c27b0';
  ctx.lineWidth = 3;
  ctx.strokeRect(boxX, boxY, boxW, boxH);

  ctx.fillStyle = '#9c27b0';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('⌨ KEYBINDS', GAME_W / 2, boxY + 30);

  KEYBINDS_LIST.forEach((item, i) => {
    const iy = boxY + 60 + i * rowH;
    const selected = i === keybindsSelection;
    const val = keybinds[item.key];
    const display = Array.isArray(val) ? val.map(formatKey).join(' / ') : formatKey(val);

    if (selected) {
      ctx.fillStyle = 'rgba(156, 39, 176, 0.2)';
      ctx.fillRect(boxX + 10, iy - 14, boxW - 20, compact ? 32 : 28);
    }

    ctx.fillStyle = selected ? '#fff' : COLORS.text;
    ctx.font = selected ? 'bold 12px monospace' : '12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(item.label, boxX + 20, iy + 5);

    ctx.textAlign = 'right';
    if (remappingKey === item.key) {
      const blink = Math.sin(Date.now() * 0.008) > 0;
      if (blink) {
        ctx.fillStyle = '#ffeb3b';
        ctx.fillText('Press a key...', boxX + boxW - 20, iy + 5);
      }
    } else {
      ctx.fillStyle = COLORS.bitcoin;
      ctx.fillText(display, boxX + boxW - 20, iy + 5);
    }
  });

  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(footerButtons.reset.x, footerButtons.reset.y, footerButtons.reset.w, footerButtons.reset.h);
  ctx.fillRect(footerButtons.close.x, footerButtons.close.y, footerButtons.close.w, footerButtons.close.h);
  ctx.strokeStyle = '#666';
  ctx.strokeRect(footerButtons.reset.x, footerButtons.reset.y, footerButtons.reset.w, footerButtons.reset.h);
  ctx.strokeRect(footerButtons.close.x, footerButtons.close.y, footerButtons.close.w, footerButtons.close.h);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Reset Defaults', footerButtons.reset.x + footerButtons.reset.w / 2, footerButtons.reset.y + footerButtons.reset.h / 2);
  ctx.fillText('Back', footerButtons.close.x + footerButtons.close.w / 2, footerButtons.close.y + footerButtons.close.h / 2);
  ctx.textBaseline = 'alphabetic';

  ctx.fillStyle = COLORS.textDim;
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  const footer = remappingKey
    ? 'Press a key to bind | ESC cancel'
    : compact
      ? 'Tap a row to select | External keyboard to remap'
      : '↑/↓ navigate | Enter select | ESC back';
  ctx.fillText(footer, GAME_W / 2, boxY + boxH - 50);
}

function renderTalents() {
  // Overlay
  ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  const { compact, branches, branchW, branchY, startY, spacing } = getTalentsLayout();
  const branch = branches[talentsBranch];
  const tree = TALENT_TREE[branch];

  // Title
  ctx.fillStyle = tree.color;
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${tree.icon} ${tree.name.toUpperCase()}`, GAME_W / 2, 40);

  // Talent points
  ctx.fillStyle = '#ffd700';
  ctx.font = '16px monospace';
  ctx.fillText(`Available: ${talentPoints} ★`, GAME_W / 2, 70);
  ctx.fillStyle = COLORS.textDim;
  ctx.font = '10px monospace';
  ctx.fillText(`sel:${talentSelection} moveY:${gamepadState.moveY.toFixed(2)} dpadY:${gamepadState.dpadY.toFixed(2)}`, GAME_W / 2, 88);

  // Branch selector
  const branchStartX = GAME_W / 2 - (branches.length * branchW) / 2;
  branches.forEach((b, i) => {
    const t = TALENT_TREE[b];
    const x = branchStartX + i * branchW + branchW / 2;
    ctx.fillStyle = i === talentsBranch ? t.color : '#333';
    ctx.fillRect(x - branchW / 2 + 5, branchY, branchW - 10, 30);
    ctx.fillStyle = i === talentsBranch ? '#fff' : '#888';
    ctx.font = 'bold 12px monospace';
    ctx.fillText(`${t.icon} ${t.name}`, x, branchY + 20);
  });

  // Talents
  tree.talents.forEach((talent, i) => {
    const y = startY + i * spacing;
    const selected = talentSelection === i;
    const rank = getTalentRank(talent.id);
    const maxed = rank >= talent.maxRank;
    const canAfford = talentPoints >= talent.cost && !maxed;
    const hasReq = !talent.requires || getTalentRank(talent.requires) > 0;

    // Background
    ctx.fillStyle = selected
      ? 'rgba(255,255,255,0.08)'
      : hasReq ? (rank > 0 ? `${tree.color}33` : 'rgba(30, 30, 50, 0.6)') : 'rgba(20, 20, 30, 0.4)';
    ctx.fillRect(compact ? 78 : 100, y, compact ? GAME_W - 156 : GAME_W - 200, 45);

    // Border
    ctx.strokeStyle = selected
      ? '#fff'
      : hasReq ? (maxed ? '#ffd700' : canAfford ? tree.color : '#555') : '#333';
    ctx.lineWidth = selected || maxed ? 2 : 1;
    ctx.strokeRect(compact ? 78 : 100, y, compact ? GAME_W - 156 : GAME_W - 200, 45);

    // Talent info
    if (selected) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 18px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('>', compact ? 86 : 92, y + 23);
    }
    ctx.fillStyle = hasReq ? '#fff' : '#555';
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(talent.name, compact ? 93 : 115, y + 18);

    ctx.fillStyle = hasReq ? '#aaa' : '#444';
    ctx.font = '11px monospace';
    ctx.fillText(`${talent.desc} (${talent.cost}★)`, compact ? 93 : 115, y + 34);

    // Rank dots (positioned to fit inside card bounds)
    const dotSpacing = 14;
    const dotStartX = (compact ? GAME_W - 94 : GAME_W - 108) - (talent.maxRank - 1) * dotSpacing;
    for (let r = 0; r < talent.maxRank; r++) {
      ctx.fillStyle = r < rank ? tree.color : '#333';
      ctx.beginPath();
      ctx.arc(dotStartX + r * dotSpacing, y + 22, 5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Maxed indicator
    if (maxed) {
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'right';
      ctx.fillText('MAX', compact ? GAME_W - 98 : GAME_W - 115, y + 26);
    }
  });

  // Respec button
  const respecY = startY + tree.talents.length * spacing + 20;
  const respecSelected = talentSelection === tree.talents.length;
  const respecCost = getRespecCost();
  const respecLabel = respecCost > 0 ? `Respec (${respecCost} sats)` : 'Respec (Free)';
  ctx.fillStyle = respecConfirm ? '#f44336' : respecSelected ? '#777' : '#555';
  ctx.fillRect(GAME_W / 2 - 60, respecY, 120, 30);
  if (respecSelected) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.strokeRect(GAME_W / 2 - 60, respecY, 120, 30);
  }
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(respecConfirm ? 'Click to confirm' : respecLabel, GAME_W / 2, respecY + 19);

  const backRect = getTalentBackRect();
  const backSelected = talentSelection === tree.talents.length + 1;
  ctx.fillStyle = backSelected ? 'rgba(255,255,255,0.16)' : 'rgba(255,255,255,0.08)';
  ctx.fillRect(backRect.x, backRect.y, backRect.w, backRect.h);
  ctx.strokeStyle = backSelected ? '#fff' : '#666';
  ctx.lineWidth = backSelected ? 2 : 1;
  ctx.strokeRect(backRect.x, backRect.y, backRect.w, backRect.h);
  ctx.fillStyle = '#fff';
  ctx.fillText('Back', backRect.x + backRect.w / 2, backRect.y + 17);

  // Controls hint
  ctx.fillStyle = COLORS.textDim;
  ctx.font = '11px monospace';
  if (isGamepadUiPreferred()) {
    ctx.fillText(
      compact
        ? 'D-pad/LS move | A buy/select | ←/→ branch | B back'
        : 'D-pad or Left Stick: Move | A: Buy / Select | Left / Right: Switch Branch | B: Back',
      GAME_W / 2,
      GAME_H - 20
    );
  } else {
    ctx.fillText(
      compact
        ? '↑/↓ move | Enter buy/select | ←/→ branch | ESC back'
        : 'Up / Down: Move | Enter: Buy / Select | Left / Right: Switch Branch | ESC: Back',
      GAME_W / 2,
      GAME_H - 20
    );
  }
}

function renderInfoPanel() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.88)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  const layout = getInfoPanelLayout();
  const { compact, boxW, boxH, boxX, boxY, tabY, contentX, contentY, contentW, contentH } = layout;
  const tabRects = getInfoPanelTabRects(layout);
  const closeRect = getInfoPanelCloseRect(layout);

  ctx.fillStyle = 'rgba(10, 12, 22, 0.97)';
  ctx.fillRect(boxX, boxY, boxW, boxH);
  ctx.strokeStyle = COLORS.bitcoin;
  ctx.lineWidth = 3;
  ctx.strokeRect(boxX, boxY, boxW, boxH);

  ctx.fillStyle = COLORS.bitcoin;
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('v0.2.0 META HUB', GAME_W / 2, boxY + 30);

  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(closeRect.x, closeRect.y, closeRect.w, closeRect.h);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(closeRect.x, closeRect.y, closeRect.w, closeRect.h);
  ctx.fillStyle = COLORS.text;
  ctx.font = 'bold 11px monospace';
  ctx.fillText('CLOSE', closeRect.x + closeRect.w / 2, closeRect.y + 16);

  INFO_TABS.forEach((tab, i) => {
    const tabRect = tabRects[i];
    const selected = infoPanelTab === i;
    ctx.fillStyle = selected ? 'rgba(247, 147, 26, 0.2)' : 'rgba(255,255,255,0.06)';
    ctx.fillRect(tabRect.x, tabRect.y, tabRect.w, tabRect.h);
    ctx.strokeStyle = selected ? COLORS.bitcoin : '#555';
    ctx.lineWidth = selected ? 2 : 1;
    ctx.strokeRect(tabRect.x, tabRect.y, tabRect.w, tabRect.h);
    ctx.fillStyle = selected ? COLORS.textBright : COLORS.textDim;
    ctx.font = selected ? 'bold 13px monospace' : '12px monospace';
    ctx.fillText(tab.label.toUpperCase(), tabRect.x + tabRect.w / 2, tabRect.y + 21);
  });

  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fillRect(contentX, contentY, contentW, contentH);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.strokeRect(contentX, contentY, contentW, contentH);

  const tabKey = INFO_TABS[infoPanelTab].key;
  if (tabKey === 'tutorial') {
    const cols = compact ? 2 : 3;
    const cardGap = 14;
    const cardW = Math.floor((contentW - cardGap * (cols + 1)) / cols);
    const cardH = compact ? 118 : 146;
    TUTORIAL_PAGES.forEach((page, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = contentX + cardGap + col * (cardW + cardGap);
      const y = contentY + 14 + row * (cardH + 10);
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      ctx.fillRect(x, y, cardW, cardH);
      ctx.strokeStyle = page.color;
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, cardW, cardH);
      ctx.fillStyle = page.color;
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(page.title, x + 12, y + 20);
      ctx.fillStyle = COLORS.text;
      ctx.font = compact ? '10px monospace' : '11px monospace';
      let lineY = y + 42;
      for (const line of page.lines) {
        const wrapped = wrapTextLines(`- ${line}`, cardW - 24);
        for (const wrappedLine of wrapped) {
          ctx.fillText(wrappedLine, x + 12, lineY);
          lineY += compact ? 13 : 15;
        }
        lineY += 2;
      }
    });
  } else if (tabKey === 'achievements') {
    const cols = 4;
    const gap = 12;
    const cardW = Math.floor((contentW - gap * (cols + 1)) / cols);
    const cardH = 78;
    ctx.fillStyle = COLORS.textDim;
    ctx.font = '11px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(`Unlocked ${unlockedAchievements.size}/${ACHIEVEMENTS.length}`, contentX + contentW - 12, contentY + 18);

    ACHIEVEMENTS.forEach((ach, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = contentX + gap + col * (cardW + gap);
      const y = contentY + 28 + row * (cardH + 8);
      const unlocked = unlockedAchievements.has(ach.id);
      ctx.fillStyle = unlocked ? 'rgba(76, 175, 80, 0.12)' : 'rgba(255,255,255,0.03)';
      ctx.fillRect(x, y, cardW, cardH);
      ctx.strokeStyle = unlocked ? '#4caf50' : '#444';
      ctx.lineWidth = unlocked ? 2 : 1;
      ctx.strokeRect(x, y, cardW, cardH);
      ctx.fillStyle = unlocked ? '#fff' : '#777';
      ctx.font = 'bold 20px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(unlocked ? ach.icon : '?', x + 12, y + 24);
      ctx.font = 'bold 12px monospace';
      ctx.fillStyle = unlocked ? COLORS.textBright : COLORS.text;
      const nameLines = wrapTextLines(ach.name, cardW - 56);
      ctx.fillText(nameLines[0], x + 44, y + 18);
      ctx.fillStyle = COLORS.textDim;
      ctx.font = '10px monospace';
      const descLines = wrapTextLines(ach.desc, cardW - 56).slice(0, 2);
      descLines.forEach((line, idx) => {
        ctx.fillText(line, x + 44, y + 32 + idx * 11);
      });
      const meta = achievementMeta[ach.id];
      const status = unlocked
        ? `Unlocked${meta && meta.wave ? ` at W${meta.wave}` : ''}`
        : getAchievementProgress(ach);
      ctx.fillStyle = unlocked ? '#81c784' : '#ffcc80';
      ctx.fillText(status, x + 44, y + 67);
    });
  } else {
    const accuracy = lifetimeStats.totalShotsFired > 0
      ? Math.round((lifetimeStats.totalShotsHit / lifetimeStats.totalShotsFired) * 100)
      : 0;
    const lastAccuracy = lastRunStats && lastRunStats.shotsFired > 0
      ? Math.round((lastRunStats.shotsHit / lastRunStats.shotsFired) * 100)
      : 0;
    const colW = Math.floor((contentW - 36) / 2);
    const leftX = contentX + 12;
    const rightX = leftX + colW + 12;

    const drawStatBlock = (title, x, y, w, lines, accent) => {
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      ctx.fillRect(x, y, w, 224);
      ctx.strokeStyle = accent;
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, w, 224);
      ctx.fillStyle = accent;
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(title, x + 12, y + 20);
      ctx.fillStyle = COLORS.text;
      ctx.font = '11px monospace';
      lines.forEach((line, idx) => {
        ctx.fillText(line, x + 12, y + 44 + idx * 15);
      });
    };

    drawStatBlock('Lifetime', leftX, contentY + 14, colW, [
      `Runs Started: ${lifetimeStats.totalRuns}`,
      `Deaths: ${lifetimeStats.totalDeaths}`,
      `Best Score: ${lifetimeStats.bestScore || 0}`,
      `Best Wave: ${lifetimeStats.bestWave || 0}`,
      `Best Combo: ${lifetimeStats.bestCombo || 0}`,
      `Kills: ${lifetimeStats.totalKills}`,
      `Bosses: ${lifetimeStats.totalBosses}`,
      `Converts: ${lifetimeStats.totalConverts}`,
      `Sats: ${lifetimeStats.totalSats}`,
      `Damage: ${Math.round(lifetimeStats.totalDamageDealt || 0)}`,
      `Accuracy: ${accuracy}%`,
      `Play Time: ${formatDuration(lifetimeStats.totalTimePlayed || 0)}`
    ], '#4dd0e1');

    drawStatBlock('Last Run', rightX, contentY + 14, colW, lastRunStats ? [
      `Score: ${lastRunStats.score}`,
      `Wave: ${lastRunStats.wave}`,
      `Kills: ${lastRunStats.kills}`,
      `Bosses: ${lastRunStats.bossesKilled}`,
      `Converts: ${lastRunStats.converts}`,
      `Sats: ${lastRunStats.sats}`,
      `Damage: ${lastRunStats.damageDealt}`,
      `Shots Fired: ${lastRunStats.shotsFired}`,
      `Accuracy: ${lastAccuracy}%`,
      `Best Combo: ${lastRunStats.bestCombo}`,
      `Elites: ${lastRunStats.elitesKilled}`,
      `Time: ${formatDuration(lastRunStats.runTimeMs)}`
    ] : [
      'No completed run saved yet.',
      'Start a run and finish it to populate this panel.'
    ], '#ffb74d');

    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fillRect(contentX + 12, contentY + 254, contentW - 24, contentH - 268);
    ctx.strokeStyle = '#9c27b0';
    ctx.lineWidth = 2;
    ctx.strokeRect(contentX + 12, contentY + 254, contentW - 24, contentH - 268);
    ctx.fillStyle = '#ce93d8';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('Weapon Mastery', contentX + 24, contentY + 276);

    const masteryEntries = Object.entries(weaponMastery);
    masteryEntries.forEach(([weapon, value], i) => {
      const col = i % 3;
      const row = Math.floor(i / 3);
      const x = contentX + 24 + col * 240;
      const y = contentY + 302 + row * 24;
      ctx.fillStyle = COLORS.text;
      ctx.font = '12px monospace';
      ctx.fillText(`${weapon.toUpperCase()}: ${value}`, x, y);
    });
  }

  ctx.fillStyle = COLORS.textDim;
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Left/Right or LB/RB switch tabs | ESC/B closes | Click tab headers to jump', GAME_W / 2, boxY + boxH - 16);
}

function renderStartScreen() {
  const layout = getStartScreenLayout();
  const buttonRects = getStartScreenButtonRects(layout);
  const metaRect = getStartScreenMetaRect(layout);
  // Animated particle background
  updateStartParticles();
  drawStartParticles();

  // Title
  ctx.fillStyle = COLORS.bitcoin;
  ctx.font = layout.compact ? 'bold 30px monospace' : 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('FREEDOM FIGHTERS', GAME_W / 2, layout.titleY);

  ctx.fillStyle = COLORS.enemyContractor;
  ctx.font = layout.compact ? 'bold 22px monospace' : 'bold 28px monospace';
  ctx.fillText('vs WAR MONGERS', GAME_W / 2, layout.titleY + (layout.compact ? 38 : 45));

  // Subtitle
  ctx.fillStyle = COLORS.textDim;
  ctx.font = layout.compact ? '12px monospace' : '14px monospace';
  ctx.fillText('Fight back against war profiteers & central bankers', GAME_W / 2, layout.subtitleY);
  ctx.fillText('Bitcoin & Lightning Network are the alternative', GAME_W / 2, layout.subtitleY + 18);

  // Meta progression display (below subtitle, above controls)
  const metaW = metaRect.w;
  const metaH = metaRect.h;
  const metaX = metaRect.x;
  const metaY = metaRect.y;
  const usingGamepad = isGamepadUiPreferred();
  const controllerConnectedNeedsUnlock =
    gamepadState.connected &&
    !muted &&
    (!audioCtx || audioCtx.state !== 'running') &&
    !hasStickyUserActivation();
  const showControllerStartupUi = usingGamepad || controllerConnectedNeedsUnlock;
  ctx.fillStyle = 'rgba(13, 13, 26, 0.8)';
  ctx.fillRect(metaX, metaY, metaW, metaH);
  ctx.strokeStyle = '#9c27b0';
  ctx.lineWidth = 1;
  ctx.strokeRect(metaX, metaY, metaW, metaH);

  const skin = SKINS[currentSkin] || SKINS.default;
  ctx.fillStyle = skin.color;
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`★ Lv.${playerLevel} - ${skin.name}`, GAME_W / 2, metaY + 15);

  ctx.fillStyle = COLORS.textDim;
  ctx.font = '10px monospace';
  const xpPct = Math.floor((playerXP / xpForNextLevel) * 100);
  ctx.fillText(`XP: ${playerXP}/${xpForNextLevel} (${xpPct}%) | Kills: ${lifetimeStats.totalKills}`, GAME_W / 2, metaY + 32);
  ctx.fillText(`Runs: ${lifetimeStats.totalRuns} | Bosses: ${lifetimeStats.totalBosses}`, GAME_W / 2, metaY + 46);

  // Instructions box
  const boxX = GAME_W / 2 - layout.boxW / 2;
  const boxY = layout.boxY;
  const boxW = layout.boxW;
  const boxH = layout.boxH;
  ctx.fillStyle = 'rgba(26, 26, 46, 0.9)';
  ctx.fillRect(boxX, boxY, boxW, boxH);
  ctx.strokeStyle = COLORS.gridBright;
  ctx.lineWidth = 2;
  ctx.strokeRect(boxX, boxY, boxW, boxH);

  ctx.fillStyle = COLORS.textBright;
  ctx.font = 'bold 14px monospace';
  ctx.fillText('CONTROLS', GAME_W / 2, boxY + 25);

  ctx.fillStyle = COLORS.text;
  ctx.font = layout.compact ? '11px monospace' : '12px monospace';
  const lines = [
    showControllerStartupUi ? [
      makeControllerLabelToken('LS'),
      makeControllerTextToken(' / ', COLORS.text),
      makeControllerLabelToken('D-PAD'),
      makeControllerTextToken(' - Move', COLORS.text)
    ] : touchControlsEnabled ? 'Left Stick - Move' : 'WASD / Arrows - Move',
    showControllerStartupUi ? [
      makeControllerLabelToken('RS'),
      makeControllerTextToken(' - Aim + Shoot | ', COLORS.text),
      makeControllerLabelToken('LT'),
      makeControllerTextToken(' / ', COLORS.text),
      makeControllerLabelToken('RT'),
      makeControllerTextToken(' - Alt Shoot', COLORS.text)
    ] : touchControlsEnabled ? 'Right Side - Aim + Shoot' : 'Mouse Click - Shoot',
    showControllerStartupUi ? [
      makeControllerActionToken('convert'),
      makeControllerTextToken(' - Convert enemies', COLORS.text)
    ] : `${touchControlsEnabled ? 'Wake Button' : 'Q'} - Convert enemies`,
    showControllerStartupUi ? [
      makeControllerActionToken('confirm'),
      makeControllerTextToken(' - Open Shop nearby', COLORS.text)
    ] : `${touchControlsEnabled ? 'Shop Button' : 'E'} - Open Shop`,
    '',
    'Collect sats from defeated foes',
    'Buy power-ups at Bitcoin shops',
    'Convert enemies for bonus sats!',
    '',
    'Survive the waves. Spread freedom.'
  ];
  lines.forEach((line, i) => {
    const lineY = boxY + 46 + i * (layout.compact ? 15 : 17);
    if (Array.isArray(line)) {
      drawInlineControllerPrompt(
        line,
        GAME_W / 2,
        lineY,
        { align: 'center', font: layout.compact ? '11px monospace' : '12px monospace', textColor: COLORS.text, badgeHeight: layout.compact ? 13 : 15, gap: 3 }
      );

      ctx.fillText(line, GAME_W / 2, lineY);

  ctx.fillRect(buttonRects.start.x, buttonRects.start.y, buttonRects.start.w, buttonRects.start.h);

  ctx.lineWidth = 2;
  ctx.strokeRect(buttonRects.start.x, buttonRects.start.y, buttonRects.start.w, buttonRects.start.h);
  ctx.fillStyle = COLORS.bitcoin;
  ctx.font = 'bold 20px monospace';
  const controllerAudioLocked = showControllerStartupUi && (controllerConnectedNeedsUnlock || hasPendingAudioUnlock());
  if (showControllerStartupUi && controllerAudioLocked) {
    ctx.fillText('[ PLAY WITH CONTROLLER ]', GAME_W / 2, layout.startY);
  } else if (showControllerStartupUi) {
    drawInlineControllerPrompt(
      [
        makeControllerTextToken('[ ', COLORS.bitcoin),
        makeControllerActionToken('confirm'),
        makeControllerTextToken(' / ', COLORS.bitcoin),
        makeControllerActionToken('pause'),
        makeControllerTextToken(' TO START ]', COLORS.bitcoin)
      ],
      GAME_W / 2,
      layout.startY,
      { align: 'center', font: 'bold 20px monospace', textColor: COLORS.bitcoin, badgeHeight: 20, gap: 4 }
    );
  } else {
    ctx.fillText(`[ ${touchControlsEnabled ? 'TAP' : 'CLICK'} TO START ]`, GAME_W / 2, layout.startY);
  }
  ctx.globalAlpha = 1;

  if (controllerAudioLocked) {
    const unlockBoxW = layout.compact ? 360 : 400;
    const unlockBoxH = layout.compact ? 84 : 92;
    const unlockBoxX = GAME_W / 2 - unlockBoxW / 2;
    const unlockBoxY = buttonRects.start.y - unlockBoxH - 12;
    ctx.fillStyle = 'rgba(255, 204, 128, 0.12)';
    ctx.fillRect(unlockBoxX, unlockBoxY, unlockBoxW, unlockBoxH);
    ctx.strokeStyle = '#ffcc80';
    ctx.lineWidth = 2;
    ctx.strokeRect(unlockBoxX, unlockBoxY, unlockBoxW, unlockBoxH);
    ctx.fillStyle = '#ffcc80';
    ctx.textAlign = 'center';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('XBOX CONTROLLER DETECTED', GAME_W / 2, unlockBoxY + 20);
    ctx.font = layout.compact ? '10px monospace' : '11px monospace';
    ctx.fillText('CLICK HERE ONCE OR PRESS ANY KEY TO ENABLE SOUND', GAME_W / 2, unlockBoxY + 42);
    ctx.fillText('After that, keep playing with the Xbox controller.', GAME_W / 2, unlockBoxY + 60);
    ctx.fillText('Your controller start action will continue automatically.', GAME_W / 2, unlockBoxY + 76);
  }

  // Settings button
  ctx.fillStyle = COLORS.textDim;
  ctx.font = '12px monospace';
  if (showControllerStartupUi) {
    drawInlineControllerPrompt(
      [
        makeControllerTextToken('[ ', COLORS.textDim),
        makeControllerActionToken('convert'),
        makeControllerTextToken(': Settings ]', COLORS.textDim)
      ],
      GAME_W / 2,
      layout.settingsY,
      { align: 'center', font: '12px monospace', textColor: COLORS.textDim, badgeHeight: 15, gap: 4 }
    );
  } else {
    ctx.fillText(`[ ${touchControlsEnabled ? 'Tap' : 'Click'}: Settings ]`, GAME_W / 2, layout.settingsY);
  }

  // Daily challenge button
  ctx.fillStyle = BIOMES[currentBiome].accent;

  if (showControllerStartupUi) {

    );
  } else {

  }

  // Mute indicator
  if (muted) {
    ctx.fillStyle = '#f44336';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('🔇 MUTED', GAME_W / 2, layout.dailyY);
  }

  // High score on start screen
  if (storedHighScore > 0) {
    ctx.fillStyle = COLORS.bitcoin;
    ctx.font = '14px monospace';

  ctx.fillStyle = '#b39ddb';
  ctx.font = '10px monospace';
  const metaHint = showControllerStartupUi
    ? 'Meta Hub: click level panel or use LB/RB'
    : 'Meta Hub: click level panel or press T / G / I';
  ctx.fillText(metaHint, GAME_W / 2, layout.highScoreY + 16);

  // Bitcoin decoration
  ctx.fillStyle = COLORS.bitcoin;
  ctx.font = layout.compact ? '38px monospace' : '48px monospace';
  ctx.fillText('₿', layout.compact ? 58 : 80, layout.compact ? 98 : 120);
  ctx.fillText('₿', GAME_W - (layout.compact ? 58 : 80), layout.compact ? 98 : 120);

  // Debug frame counter
  ctx.fillStyle = '#0f0';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`Frames: ${frameCount}`, 10, 20);

  if (showControllerStartupUi) {
    const startPromptText = controllerAudioLocked
      ? 'Click once or press any key, then use controller normally'
      : controllerFullscreenPromptVisible
        ? getControllerFullscreenPromptText()
        : 'Controller mode active';
    const startPromptHighlighted = controllerAudioLocked || controllerFullscreenPromptVisible;
    ctx.fillStyle = startPromptHighlighted ? '#ffcc80' : 'rgba(255,255,255,0.8)';
    ctx.font = startPromptHighlighted ? '10px monospace' : '11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(startPromptText, GAME_W / 2, layout.touchY);
  } else if (touchControlsEnabled) {
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Android / touch mode enabled', GAME_W / 2, layout.touchY);
  }
}
