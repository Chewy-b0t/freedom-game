function cancelControllerRemapping() {
  controllerRemappingAction = null;
  controllerRemapReady = false;
}

function activateControllerSettingsItem(item) {
  if (item.type === 'toggle') {
    controllerVibrationEnabled = !controllerVibrationEnabled;
    saveSettings();
    return;
  }
  if (item.type === 'slider') {
    controllerVibrationIntensity += 0.1;
    if (controllerVibrationIntensity > 1) controllerVibrationIntensity = 0.2;
    controllerVibrationIntensity = Math.round(controllerVibrationIntensity * 100) / 100;
    saveSettings();
    return;
  }
  if (item.type === 'binding') {
    controllerRemappingAction = item.action;
    controllerRemapReady = false;
    return;
  }
  if (item.key === 'testRumble') {
    rumbleGamepad(0.7, 0.45, 180);
    return;
  }
  if (item.key === 'resetController') {
    resetControllerBindingsToDefault();
    return;
  }
  if (item.key === 'back') {
    cancelControllerRemapping();
    controllerSettingsOpen = false;
    settingsOpen = true;
  }
}

function handleControllerRemapping() {
  if (!controllerSettingsOpen || !controllerRemappingAction) return;
  const gamepad = getActiveGamepad();
  if (!gamepad) return;

  const pressedButton = getFirstPressedGamepadButton(gamepad);
  if (!controllerRemapReady) {
    if (pressedButton === null) controllerRemapReady = true;
    return;
  }
  if (pressedButton === null) return;

  assignControllerBinding(controllerRemappingAction, pressedButton);
  cancelControllerRemapping();
  saveSettings();
  playSound('pickup');
}

// ============================================================
// GAME LOOP
// ============================================================

let lastTime = 0;
let frameCount = 0;

function gameLoop(timestamp) {
  frameCount++;
  const dt = Math.min(timestamp - lastTime, 50); // cap delta to avoid spiral
  lastTime = timestamp;
  pollGamepadInput();
  handleControllerRemapping();

  if (gameState === 'start' && infoPanelOpen && !talentsOpen && !keybindsOpen && !controllerSettingsOpen && !settingsOpen) {
    if (keys['a'] || keys['arrowleft'] || gamepadState.menuLeftPressed || gamepadState.prevWeaponPressed) {
      infoPanelTab = (infoPanelTab - 1 + INFO_TABS.length) % INFO_TABS.length;
      keys['a'] = false;
      keys['arrowleft'] = false;
    }
    if (keys['d'] || keys['arrowright'] || gamepadState.menuRightPressed || gamepadState.nextWeaponPressed) {
      infoPanelTab = (infoPanelTab + 1) % INFO_TABS.length;
      keys['d'] = false;
      keys['arrowright'] = false;
    }
    if (keys['escape'] || gamepadState.backPressed) {
      infoPanelOpen = false;
      keys['escape'] = false;
    }
    if (mouse.clicked) {
      const point = { x: mouse.x, y: mouse.y };
      const layout = getInfoPanelLayout();
      const closeRect = getInfoPanelCloseRect(layout);
      const tabRects = getInfoPanelTabRects(layout);
      if (pointInRect(point, closeRect)) {
        infoPanelOpen = false;
      } else {
        for (let i = 0; i < tabRects.length; i++) {
          if (pointInRect(point, tabRects[i])) {
            infoPanelTab = i;
            break;
          }
        }
      }
      mouse.clicked = false;
      mouse.down = false;
    }
  } else if (gameState === 'start' && !talentsOpen && !keybindsOpen && !controllerSettingsOpen && !settingsOpen) {
    if (gamepadState.settingsPressed) {
      if (blockStartScreenGamepadActionUntilAudioUnlock('settings')) {
        settingsOpen = false;
      } else {
        requestAudioResume('gamepad');
        tryEnterFullscreen('gamepad');
        settingsOpen = true;
        settingsSelection = 0;
      }
    } else if (gamepadState.dailyPressed) {
      if (blockStartScreenGamepadActionUntilAudioUnlock('daily')) {
        dailyMode = false;
      } else {
        requestAudioResume('gamepad');
        tryEnterFullscreen('gamepad');
        dailyMode = false;
        startDailyChallenge();
      }
    } else if (gamepadState.prevWeaponPressed) {
      infoPanelOpen = true;
      infoPanelTab = (infoPanelTab - 1 + INFO_TABS.length) % INFO_TABS.length;
    } else if (gamepadState.nextWeaponPressed) {
      infoPanelOpen = true;
      infoPanelTab = (infoPanelTab + 1) % INFO_TABS.length;
    } else if (gamepadState.confirmPressed || gamepadState.pausePressed) {
      if (!blockStartScreenGamepadActionUntilAudioUnlock('start')) {
        requestAudioResume('gamepad');
        tryEnterFullscreen('gamepad');
        try { initGame(); } catch (e) { console.error(e); }
      }
    }
  }

  // Handle start screen clicks in game loop (single point of truth)
  if (gameState === 'start' && mouse.clicked && !infoPanelOpen && !talentsOpen && !keybindsOpen && !controllerSettingsOpen && !settingsOpen) {
    const point = { x: mouse.x, y: mouse.y };
    const buttons = getStartScreenButtonRects();
    const metaRect = getStartScreenMetaRect();
    if (pointInRect(point, metaRect)) {
      infoPanelOpen = true;
      infoPanelTab = 2;
    } else if (pointInRect(point, buttons.settings)) {
      settingsOpen = !settingsOpen;
      settingsSelection = 0;
    } else if (pointInRect(point, buttons.daily)) {
      dailyMode = false;
      startDailyChallenge();
    } else if (pointInRect(point, buttons.start) && !settingsOpen) {
      try { initGame(); } catch(e) { console.error(e); }
    }
    mouse.clicked = false;
    mouse.down = false;
  }

  // Settings toggle (keyboard fallback)
  if (gameState === 'start' && !controllerSettingsOpen && keys['p']) {
    settingsOpen = !settingsOpen;
    settingsSelection = 0;
    keys['p'] = false;
  }

  if (gameState === 'start' && !settingsOpen && !controllerSettingsOpen && !keybindsOpen && !talentsOpen) {
    if (keys['t']) {
      infoPanelOpen = true;
      infoPanelTab = 0;
      keys['t'] = false;
    }
    if (keys['g']) {
      infoPanelOpen = true;
      infoPanelTab = 1;
      keys['g'] = false;
    }
    if (keys['i']) {
      infoPanelOpen = true;
      infoPanelTab = 2;
      keys['i'] = false;
    }
  }

  // Daily challenge (keyboard fallback)
  if (gameState === 'start' && keys['j']) {
    dailyMode = false;
    startDailyChallenge();
    keys['j'] = false;
  }

  // Settings handling
  if (settingsOpen) {
    if (keys['w'] || keys['arrowup'] || gamepadState.menuUpPressed) { settingsSelection = (settingsSelection - 1 + SETTINGS_ITEMS.length) % SETTINGS_ITEMS.length; keys['w'] = false; keys['arrowup'] = false; }
    if (keys['s'] || keys['arrowdown'] || gamepadState.menuDownPressed) { settingsSelection = (settingsSelection + 1) % SETTINGS_ITEMS.length; keys['s'] = false; keys['arrowdown'] = false; }
    const activateSettingsItem = item => {
      if (item.key === 'volume') {
        masterVolume = Math.round((masterVolume + 0.1) * 10) / 10;
        if (masterVolume > 1.0) masterVolume = 1.0;
        saveSettings();
      } else if (item.key === 'brightness') {
        brightness += 0.1;
        if (brightness > 1.4) brightness = 0.6;
        brightness = Math.round(brightness * 10) / 10;
        saveSettings();
      } else if (item.key === 'uiScale') {
        uiScale += 0.05;
        if (uiScale > 1.35) uiScale = 0.85;
        uiScale = Math.round(uiScale * 100) / 100;
        saveSettings();
      } else if (item.key === 'mute') {
        muted = !muted;
        saveSettings();
      } else if (item.key === 'showKeybindHints') {
        showKeybindHints = !showKeybindHints;
        saveSettings();
      } else if (item.key === 'touchControls') {
        touchControlsEnabled = !touchControlsEnabled;
        if (!touchControlsEnabled) {
          resetTouchJoystick();
          resetTouchAim();
        }
        saveSettings();
      } else if (item.key === 'controller') {
        if (gameState === 'start') {
          settingsOpen = false;
          controllerSettingsOpen = true;
          controllerSelection = 0;
          cancelControllerRemapping();
        }
      } else if (item.key === 'skin') {
        const skinKeys = Object.keys(SKINS);
        let idx = skinKeys.indexOf(currentSkin);
        do { idx = (idx + 1) % skinKeys.length; } while (!unlockedSkins.includes(skinKeys[idx]) && idx !== skinKeys.indexOf(currentSkin));
        currentSkin = skinKeys[idx];
        saveMetaProgression();
      } else if (item.key === 'keybinds') {
        settingsOpen = false;
        keybindsOpen = true;
        keybindsSelection = 0;
        remappingKey = null;
      } else if (item.key === 'talents') {
        settingsOpen = false;
        talentsOpen = true;
        talentsBranch = 0;
        talentSelection = 0;
        respecConfirm = false;
      } else if (item.key === 'reducedMotion') {
        reducedMotion = !reducedMotion;
        saveAccessibility();
      } else if (item.key === 'colorblind') {
        colorblindMode = !colorblindMode;
        saveAccessibility();
      } else if (item.key === 'back') {
        settingsOpen = false;
      }
    };
    if (keys[' '] || keys['enter'] || gamepadState.confirmPressed) {
      activateSettingsItem(SETTINGS_ITEMS[settingsSelection]);
      keys[' '] = false;
      keys['enter'] = false;
    }
    if (mouse.clicked) {
      const { boxW, boxX, boxY, rowH } = getSettingsLayout();
      if (mouse.x >= boxX + 10 && mouse.x <= boxX + boxW - 10) {
        for (let i = 0; i < SETTINGS_ITEMS.length; i++) {
          const iy = boxY + 70 + i * rowH;
          if (mouse.y >= iy - 18 && mouse.y <= iy + 24) {
            settingsSelection = i;
            activateSettingsItem(SETTINGS_ITEMS[i]);
            break;
          }
        }
      }
      mouse.clicked = false;
      mouse.down = false;
    }
    if (keys['escape'] || gamepadState.backPressed) { settingsOpen = false; keys['escape'] = false; }
  }

  if (controllerSettingsOpen && gameState === 'start') {
    if (!controllerRemappingAction) {
      if (keys['w'] || keys['arrowup'] || gamepadState.menuUpPressed) {
        controllerSelection = (controllerSelection - 1 + CONTROLLER_SETTINGS_ITEMS.length) % CONTROLLER_SETTINGS_ITEMS.length;
        keys['w'] = false;
        keys['arrowup'] = false;
      }
      if (keys['s'] || keys['arrowdown'] || gamepadState.menuDownPressed) {
        controllerSelection = (controllerSelection + 1) % CONTROLLER_SETTINGS_ITEMS.length;
        keys['s'] = false;
        keys['arrowdown'] = false;
      }
      if (keys[' '] || keys['enter'] || gamepadState.confirmPressed) {
        activateControllerSettingsItem(CONTROLLER_SETTINGS_ITEMS[controllerSelection]);
        keys[' '] = false;
        keys['enter'] = false;
      }
    }
    if (mouse.clicked) {
      const layout = getControllerLayout();
      if (mouse.x >= layout.boxX + 10 && mouse.x <= layout.boxX + layout.boxW - 10) {
        for (let i = 0; i < CONTROLLER_SETTINGS_ITEMS.length; i++) {
          const iy = layout.boxY + 96 + i * layout.rowH;
          if (mouse.y >= iy - 16 && mouse.y <= iy + 16) {
            controllerSelection = i;
            activateControllerSettingsItem(CONTROLLER_SETTINGS_ITEMS[i]);
            break;
          }
        }
      }
      mouse.clicked = false;
      mouse.down = false;
    }
    if (keys['escape']) {
      if (controllerRemappingAction) cancelControllerRemapping();
      else {
        controllerSettingsOpen = false;
        settingsOpen = true;
      }
      keys['escape'] = false;
    }
  }

  // Keybinds editor
  if (keybindsOpen && gameState === 'start') {
    if (!remappingKey) {
      if (keys['w'] || keys['arrowup'] || gamepadState.menuUpPressed) { keybindsSelection = (keybindsSelection - 1 + KEYBINDS_LIST.length) % KEYBINDS_LIST.length; keys['w'] = false; keys['arrowup'] = false; }
      if (keys['s'] || keys['arrowdown'] || gamepadState.menuDownPressed) { keybindsSelection = (keybindsSelection + 1) % KEYBINDS_LIST.length; keys['s'] = false; keys['arrowdown'] = false; }
      if (keys[' '] || keys['enter'] || gamepadState.confirmPressed) {
        remappingKey = KEYBINDS_LIST[keybindsSelection].key;
        keys[' '] = false;
        keys['enter'] = false;
      }
    }
    if (mouse.clicked) {
      const layout = getKeybindsLayout();
      const footerButtons = getKeybindFooterButtons(layout);
      const point = { x: mouse.x, y: mouse.y };
      if (pointInRect(point, footerButtons.reset)) {
        resetKeybindsToDefault();
      } else if (pointInRect(point, footerButtons.close)) {
        remappingKey = null;
        keybindsOpen = false;
        settingsOpen = true;
      } else if (mouse.x >= layout.boxX + 10 && mouse.x <= layout.boxX + layout.boxW - 10) {
        for (let i = 0; i < KEYBINDS_LIST.length; i++) {
          const iy = layout.boxY + 60 + i * layout.rowH;
          if (mouse.y >= iy - 16 && mouse.y <= iy + 18) {
            keybindsSelection = i;
            if (!touchControlsEnabled || !prefersCoarsePointer) {
              remappingKey = KEYBINDS_LIST[i].key;
            }
            break;
          }
        }
      }
      mouse.clicked = false;
      mouse.down = false;
    }
    if (keys['escape'] || gamepadState.backPressed) {
      if (remappingKey) { remappingKey = null; }
      else { keybindsOpen = false; settingsOpen = true; }
      keys['escape'] = false;
    }
  }

  // Pause handling
  if (gameState === 'playing' && gamepadState.pausePressed) {
    paused = !paused;
  }
  if (paused && gameState === 'playing') {
    // Shop access from pause
    if ((keys['s'] || keys[keybinds.shop] || gamepadState.shopPressed) && !settingsOpen) {
      const nearShop = shops.find(s => s.active && dist(s, player) < 60);
      if (nearShop) {
        gameState = 'shop';
        nearShop.open = true;
        shopSelection = 0;
        paused = false;
        playSound('shopOpen');
      } else {
        waveAnnounceText = 'No shop nearby!';
        waveAnnounceTimer = 1000;
      }
      keys['s'] = false;
      keys[keybinds.shop] = false;
    }

    if (gamepadState.confirmPressed) {
      paused = false;
      requestAnimationFrame(gameLoop);
      return;
    }

    render();
    renderPauseMenu();
    requestAnimationFrame(gameLoop);
    return;
  }

  // Settings from pause (mouse click)
  if (paused && (keys['p'] || gamepadState.settingsPressed)) {
    settingsOpen = !settingsOpen;
    settingsSelection = 0;
    keys['p'] = false;
  }
  if (paused && (mouse.clicked || gamepadState.confirmPressed || gamepadState.pausePressed)) {
    paused = false;
    mouse.clicked = false;
    mouse.down = false;
  }

  update(dt);
  render();

  // Settings overlay
  // Settings / Keybinds / Talents overlay
  if (talentsOpen) {
    // Talent tree input
    const { branches, branchW, branchY, startY, spacing, compact } = getTalentsLayout();
    const padUpDown = gamepadState.dpadY < -0.5 || gamepadState.moveY < -GAMEPAD_MENU_STICK_THRESHOLD;
    const padDownDown = gamepadState.dpadY > 0.5 || gamepadState.moveY > GAMEPAD_MENU_STICK_THRESHOLD;
    const padLeftDown = gamepadState.dpadX < -0.5 || gamepadState.moveX < -GAMEPAD_MENU_STICK_THRESHOLD;
    const padRightDown = gamepadState.dpadX > 0.5 || gamepadState.moveX > GAMEPAD_MENU_STICK_THRESHOLD;
    const talentPadUpPressed = padUpDown && !talentTreePadHeld.up;
    const talentPadDownPressed = padDownDown && !talentTreePadHeld.down;
    const talentPadLeftPressed = padLeftDown && !talentTreePadHeld.left;
    const talentPadRightPressed = padRightDown && !talentTreePadHeld.right;
    talentTreePadHeld.up = padUpDown;
    talentTreePadHeld.down = padDownDown;
    talentTreePadHeld.left = padLeftDown;
    talentTreePadHeld.right = padRightDown;
    let tree = TALENT_TREE[branches[talentsBranch]];
    let maxTalentSelection = tree.talents.length + 1;
    if (keys['a'] || keys['arrowleft'] || gamepadState.menuLeftPressed || talentPadLeftPressed) {
      talentsBranch = (talentsBranch - 1 + branches.length) % branches.length;
      tree = TALENT_TREE[branches[talentsBranch]];
      maxTalentSelection = tree.talents.length + 1;
      talentSelection = Math.min(talentSelection, maxTalentSelection);
      respecConfirm = false;
      keys['a'] = false;
      keys['arrowleft'] = false;
    }
    if (keys['d'] || keys['arrowright'] || gamepadState.menuRightPressed || talentPadRightPressed) {
      talentsBranch = (talentsBranch + 1) % branches.length;
      tree = TALENT_TREE[branches[talentsBranch]];
      maxTalentSelection = tree.talents.length + 1;
      talentSelection = Math.min(talentSelection, maxTalentSelection);
      respecConfirm = false;
      keys['d'] = false;
      keys['arrowright'] = false;
    }
    if (keys['w'] || keys['arrowup'] || gamepadState.menuUpPressed || talentPadUpPressed) {
      talentSelection = (talentSelection - 1 + maxTalentSelection + 1) % (maxTalentSelection + 1);
      respecConfirm = false;
      keys['w'] = false;
      keys['arrowup'] = false;
    }
    if (keys['s'] || keys['arrowdown'] || gamepadState.menuDownPressed || talentPadDownPressed) {
      talentSelection = (talentSelection + 1) % (maxTalentSelection + 1);
      respecConfirm = false;
      keys['s'] = false;
      keys['arrowdown'] = false;
    }
    if (keys['escape'] || gamepadState.backPressed) {
      talentsOpen = false;
      respecConfirm = false;
      keys['escape'] = false;
    }
    if (keys[' '] || keys['enter'] || gamepadState.confirmPressed) {
      if (talentSelection < tree.talents.length) {
        const result = allocateTalent(branches[talentsBranch], talentSelection);
        const t = tree.talents[talentSelection];
        const rank = getTalentRank(t.id);
        if (!result) {
          if (t.requires && getTalentRank(t.requires) === 0) {
            waveAnnounceText = `🔒 Requires: ${t.requires}`;
          } else if (rank >= t.maxRank) {
            waveAnnounceText = '⚡ Already maxed!';
          } else {
            waveAnnounceText = `★ Need ${t.cost} talent point${t.cost>1?'s':''}!`;
          }
          waveAnnounceTimer = 1500;
        }
      } else if (talentSelection === tree.talents.length) {
        if (respecConfirm) {
          if (tryRespecTalents()) {
            respecConfirm = false;
          } else {
            waveAnnounceText = `★ Need ${getRespecCost()} sats to respec!`;
            waveAnnounceTimer = 1500;
          }
        } else {
          respecConfirm = true;
        }
      } else {
        talentsOpen = false;
        respecConfirm = false;
      }
      keys[' '] = false;
      keys['enter'] = false;
    }
    renderTalents();
    
    // Click handling for talents
    if (mouse.clicked) {
      const mx = mouse.x, my = mouse.y;
      tree = TALENT_TREE[branches[talentsBranch]];
      const backRect = getTalentBackRect();
      const branchStartX = GAME_W / 2 - (branches.length * branchW) / 2;
      
      // Check respec button
      const respecY = startY + tree.talents.length * spacing + 20;
      if (pointInRect({ x: mx, y: my }, backRect)) {
        talentSelection = tree.talents.length + 1;
        talentsOpen = false;
        respecConfirm = false;
      } else if (mx > GAME_W / 2 - 60 && mx < GAME_W / 2 + 60 && my > respecY && my < respecY + 30) {
        talentSelection = tree.talents.length;
        if (respecConfirm) {
          if (tryRespecTalents()) {
            respecConfirm = false;
          } else {
            waveAnnounceText = `★ Need ${getRespecCost()} sats to respec!`;
            waveAnnounceTimer = 1500;
          }
        } else {
          respecConfirm = true;
        }
      } else {
        let branchChanged = false;
        for (let i = 0; i < branches.length; i++) {
          const x = branchStartX + i * branchW;
          if (mx >= x + 5 && mx <= x + branchW - 5 && my >= branchY && my <= branchY + 30) {
            talentsBranch = i;
            tree = TALENT_TREE[branches[talentsBranch]];
            talentSelection = Math.min(talentSelection, tree.talents.length + 1);
            respecConfirm = false;
            branchChanged = true;
            break;
          }
        }
        if (branchChanged) {
          mouse.clicked = false;
          mouse.down = false;
        } else {
          // Check talent clicks
          const talentLeft = compact ? 78 : 100;
          const talentRight = compact ? GAME_W - 78 : GAME_W - 100;
          for (let i = 0; i < tree.talents.length; i++) {
            const y = startY + i * spacing;
            if (my > y && my < y + 45 && mx > talentLeft && mx < talentRight) {
              talentSelection = i;
              const result = allocateTalent(branches[talentsBranch], i);
              const t = tree.talents[i];
              const rank = getTalentRank(t.id);
              if (!result) {
                if (t.requires && getTalentRank(t.requires) === 0) {
                  waveAnnounceText = `🔒 Requires: ${t.requires}`;
                } else if (rank >= t.maxRank) {
                  waveAnnounceText = '⚡ Already maxed!';
                } else {
                  waveAnnounceText = `★ Need ${t.cost} talent point${t.cost>1?'s':''}!`;
                }
                waveAnnounceTimer = 1500;
              }
              break;
            }
          }
        }
      }
      mouse.clicked = false;
      mouse.down = false;
    }
  } else if (keybindsOpen) {
    renderKeybinds();
  } else if (controllerSettingsOpen) {
    renderControllerSettings();
  } else if (settingsOpen) {
    renderSettings();
  } else if (infoPanelOpen && gameState === 'start') {
    renderInfoPanel();
  }

  if (!talentsOpen) {
    talentTreePadHeld.up = false;
    talentTreePadHeld.down = false;
    talentTreePadHeld.left = false;
    talentTreePadHeld.right = false;
  }

  requestAnimationFrame(gameLoop);
}

// Load saved meta progression and keybinds before showing start screen
loadMetaProgression();
loadKeybinds();
loadAccessibility();
loadSettings();
loadTalents();
loadStoredHighScore();

// Start the loop
requestAnimationFrame(gameLoop);

</script>
