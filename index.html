class Boss {
  constructor(wave) {
    // Determine boss type based on wave
    let bossKey;
    if (wave === 5) bossKey = 'federalReserve';
    else if (wave === 10) bossKey = 'militaryComplex';
    else if (wave === 15) bossKey = 'shadowCabinet';
    else if (wave === 20) bossKey = 'mediaMachine';
    else if (wave === 25) bossKey = 'techOligarch';
    else if (wave === 30) bossKey = 'theSystem';
    else {
      // Cycle through types for later waves
      const types = Object.keys(BOSS_TYPES);
      bossKey = types[Math.floor(wave / 5) % types.length];
    }

    const type = BOSS_TYPES[bossKey];
    this.type = bossKey;
    this.x = GAME_W / 2;
    this.y = -60;
    this.targetY = 100;
    this.wave = wave;

    // Boss-specific properties
    this.shape = type.shape;
    this.radius = type.radius;
    this.color = type.color;
    this.darkColor = type.darkColor;
    this.glowColor = type.glowColor;
    this.symbol = type.symbol;

    this.maxHealth = type.hp + Math.max(0, (wave - 5) * type.hpPerWave / 5);
    this.health = this.maxHealth;
    this.speed = 1;
    this.alive = true;
    this.entering = true;
    this.enterTimer = 800;
    this.lastShot = 0;
    this.attackPattern = 0;
    this.attackTimer = 0;
    this.attackCycle = type.attackCycle;
    this.attacks = type.attacks;
    this.movement = type.movement;
    this.movementAmp = type.movementAmp;
    this.phase2AttackCycle = type.phase2AttackCycle;
    this.phase = 1;
    this.flashTimer = 0;
    this.satsValue = 200 + wave * 20;
    this.scoreValue = 500 + wave * 50;
    this.angle = 0;
    this.teleportTimer = 0;
    this.name = type.name;
  }

  update(dt) {
    if (!this.alive) return false;

    // Dramatic entrance
    if (this.entering) {
      this.enterTimer -= dt;
      this.y += 3;
      if (this.enterTimer <= 0) {
        this.entering = false;
        this.y = this.targetY;
      }
      return true;
    }

    // Movement based on boss type
    this.angle += 0.012;
    switch (this.movement) {
      case 'sine':
        this.x = GAME_W / 2 + Math.sin(this.angle) * this.movementAmp;
        this.y = this.targetY + Math.sin(this.angle * 0.7) * 30;
        break;
      case 'circle':
        this.x = GAME_W / 2 + Math.cos(this.angle) * this.movementAmp;
        this.y = this.targetY + Math.sin(this.angle) * this.movementAmp * 0.5;
        break;
      case 'erratic':
        this.x = GAME_W / 2 + Math.sin(this.angle * 2.3) * this.movementAmp * 0.8 + Math.sin(this.angle * 5) * 40;
        this.y = this.targetY + Math.sin(this.angle * 1.7) * 40;
        break;
      default:
        this.x = GAME_W / 2 + Math.sin(this.angle) * this.movementAmp;
        this.y = this.targetY;
    }

    // Phase 2 at 50% health
    if (this.health < this.maxHealth * 0.5 && this.phase === 1) {
      this.phase = 2;
      this.attackCycle = this.phase2AttackCycle;
      triggerShake(8, 300);
      playSound('bossEnraged');
      waveAnnounceText = 'BOSS ENRAGED!';
      waveAnnounceTimer = 1500;
    }

    // Flash timer
    if (this.flashTimer > 0) this.flashTimer -= dt;

    // Attack cycling
    this.attackTimer += dt;
    if (this.attackTimer >= this.attackCycle) {
      this.attackTimer = 0;
      this.attackPattern = (this.attackPattern + 1) % this.attacks.length;
    }

    // Execute current attack
    this.executeAttack(dt);

    return true;
  }

  executeAttack(dt) {
    const now = Date.now();
    const fireRate = this.phase === 2 ? 200 : 350;
    const attackType = this.attacks[this.attackPattern];

    switch (attackType) {
      case 'spiral':
        if (now - this.lastShot > fireRate) {
          const spiralCount = this.phase === 2 ? 12 : 8;
          for (let i = 0; i < spiralCount; i++) {
            const a = (Math.PI * 2 / spiralCount) * i + this.angle;
            bullets.push(new Bullet(
              this.x + Math.cos(a) * this.radius,
              this.y + Math.sin(a) * this.radius,
              Math.cos(a) * 3,
              Math.sin(a) * 3,
              12,
              'enemy',
              this.color
            ));
          }
          this.lastShot = now;
          playSound('enemyShoot');
        }
        break;

      case 'moneyRain':
        if (now - this.lastShot > fireRate * 1.5) {
          const count = this.phase === 2 ? 8 : 5;
          for (let i = 0; i < count; i++) {
            const rx = rand(30, GAME_W - 30);
            bullets.push(new Bullet(
              rx, -10,
              rand(-0.5, 0.5),
              rand(3, 5),
              10,
              'enemy',
              '#F7931A'
            ));
          }
          this.lastShot = now;
        }
        break;

      case 'beam':
        if (now - this.lastShot > fireRate * 2) {
          const a = angle(this, player);
          const burstCount = this.phase === 2 ? 7 : 5;
          for (let i = 0; i < burstCount; i++) {
            const spread = (i - (burstCount - 1) / 2) * 0.15;
            const ba = a + spread;
            bullets.push(new Bullet(
              this.x + Math.cos(ba) * this.radius,
              this.y + Math.sin(ba) * this.radius,
              Math.cos(ba) * 5,
              Math.sin(ba) * 5,
              15,
              'enemy',
              '#ffab40'
            ));
          }
          this.lastShot = now;
          playSound('enemyShoot');
        }
        break;

      case 'circleBurst':
        if (now - this.lastShot > fireRate * 1.5) {
          const rings = this.phase === 2 ? 2 : 1;
          for (let r = 0; r < rings; r++) {
            const count = 10;
            const delay = r * 150;
            setTimeout(() => {
              if (!this.alive) return;
              for (let i = 0; i < count; i++) {
                const a = (Math.PI * 2 / count) * i;
                bullets.push(new Bullet(
                  this.x + Math.cos(a) * this.radius,
                  this.y + Math.sin(a) * this.radius,
                  Math.cos(a) * 3.5,
                  Math.sin(a) * 3.5,
                  12,
                  'enemy',
                  this.color
                ));
              }
            }, delay);
          }
          this.lastShot = now;
          playSound('enemyShoot');
        }
        break;

      case 'homingMissiles':
        if (now - this.lastShot > fireRate * 3) {
          const count = this.phase === 2 ? 4 : 3;
          for (let i = 0; i < count; i++) {
            const a = (Math.PI * 2 / count) * i + this.angle;
            const b = new Bullet(
              this.x + Math.cos(a) * this.radius,
              this.y + Math.sin(a) * this.radius,
              Math.cos(a) * 2,
              Math.sin(a) * 2,
              10,
              'enemy',
              '#e040fb'
            );
            b.homing = true;
            b.target = player;
            b.turnSpeed = 0.05;
            bullets.push(b);
          }
          this.lastShot = now;
          playSound('enemyShoot');
        }
        break;

      case 'teleportBurst':
        if (now - this.lastShot > fireRate * 2.5) {
          // Teleport to random position
          this.x = rand(100, GAME_W - 100);
          this.y = rand(80, GAME_H / 2);
          this.teleportTimer = 300;
          // Burst of bullets on teleport
          const count = this.phase === 2 ? 16 : 10;
          for (let i = 0; i < count; i++) {
            const a = (Math.PI * 2 / count) * i;
            bullets.push(new Bullet(
              this.x + Math.cos(a) * this.radius,
              this.y + Math.sin(a) * this.radius,
              Math.cos(a) * 3,
              Math.sin(a) * 3,
              12,
              'enemy',
              this.color
            ));
          }
          this.lastShot = now;
          playSound('enemyShoot');
        }
        break;

      case 'fakeNews':
        // Spread of confusing, slow-moving bullets that home slightly
        if (now - this.lastShot > fireRate * 2) {
          const count = this.phase === 2 ? 9 : 6;
          for (let i = 0; i < count; i++) {
            const a = angle(this, player) + (Math.random() - 0.5) * 1.5;
            const b = new Bullet(
              this.x + Math.cos(a) * this.radius,
              this.y + Math.sin(a) * this.radius,
              Math.cos(a) * 2.5,
              Math.sin(a) * 2.5,
              8,
              'enemy',
              '#42a5f5'
            );
            b.homing = true;
            b.target = player;
            b.turnSpeed = 0.02;
            bullets.push(b);
          }
          this.lastShot = now;
          playSound('enemyShoot');
        }
        break;

      case 'laserGrid':
        if (now - this.lastShot > fireRate * 3) {
          // Fire 3 crossing laser beams
          for (let i = 0; i < 3; i++) {
            const a = angle(this, player) + (i - 1) * 0.4;
            const count = 15;
            for (let j = 0; j < count; j++) {
              const dist = j * 20;
              bullets.push(new Bullet(
                this.x + Math.cos(a) * (this.radius + dist),
                this.y + Math.sin(a) * (this.radius + dist),
                0, 0,
                8,
                'enemy',
                '#00e5ff'
              ));
            }
          }
          this.lastShot = now;
          triggerShake(5, 200);
        }
        break;

      // The System boss attacks
      case 'taxation':
        // Steals sats from player and heals boss
        if (now - this.lastShot > fireRate * 2.5) {
          const stolen = Math.min(player.sats, 20 + (this.phase === 2 ? 20 : 0));
          player.sats -= stolen;
          this.health = Math.min(this.maxHealth, this.health + stolen / 2);
          // Visual feedback
          spawnDamageNumber(player.x, player.y, stolen, '#b8860b');
          waveAnnounceText = `💰 TAXED! -${stolen} sats`;
          waveAnnounceTimer = 1500;
          // Tax bullets (golden coins falling down)
          for (let i = 0; i < 8; i++) {
            const rx = rand(30, GAME_W - 30);
            bullets.push(new Bullet(
              rx, -10,
              rand(-0.5, 0.5),
              rand(4, 6),
              15,
              'enemy',
              '#ffd700'
            ));
          }
          this.lastShot = now;
          playSound('enemyShoot');
        }
        break;

      case 'corruptionAura':
        // Slows player and spawns corrupted allies
        if (now - this.lastShot > fireRate * 3) {
          // Slow effect on player
          player.timeSlowTimer = Math.max(player.timeSlowTimer, 3000);
          // Spawn 2-3 corrupted ally enemies that attack player
          const count = this.phase === 2 ? 3 : 2;
          for (let i = 0; i < count; i++) {
            const angle = (Math.PI * 2 / count) * i;
            const cx = this.x + Math.cos(angle) * 100;
            const cy = this.y + Math.sin(angle) * 100;
            const decoy = new Enemy(cx, cy, 'corruption', this.wave);
            decoy.health = 30;
            decoy.maxHealth = 30;
            decoy.satsValue = 10;
            decoy.convertTimer = 0; // immune to convert
            enemies.push(decoy);
          }
          this.lastShot = now;
          playSound('enemyShoot');
        }
        break;

      case 'fraudDecoy':
        // Creates 2-3 fake boss copies that deal real damage
        if (now - this.lastShot > fireRate * 2.5) {
          const count = this.phase === 2 ? 3 : 2;
          for (let i = 0; i < count; i++) {
            const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
            const dx = this.x + Math.cos(angle) * 150;
            const dy = this.y + Math.sin(angle) * 150;
            const decoy = new Enemy(dx, dy, 'fraud', this.wave);
            decoy.health = 40;
            decoy.maxHealth = 40;
            decoy.satsValue = 15;
            decoy.convertTimer = 0;
            enemies.push(decoy);
          }
          this.lastShot = now;
          playSound('enemyShoot');
        }
        break;
    }
  }

  takeDamage(amount, source = '') {
    this.health -= amount;
    if (source === 'player') {
      player.stats.damageDealt += amount;
    }
    this.flashTimer = 80;
    spawnDamageNumber(this.x + rand(-20, 20), this.y + rand(-20, 20), amount, '#ffeb3b');
    if (Math.random() < 0.3) playSound('hit');
  }

  draw() {
    if (!this.alive) return;

    ctx.save();

    // Teleport flash effect
    if (this.teleportTimer > 0) {
      this.teleportTimer -= 16;
      ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.02) * 0.3;
    }

    // Glow
    const glowColor = this.phase === 2 ? '#ff1744' : this.glowColor;
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = this.phase === 2 ? 25 : 15;

    // Flash on hit
    const fillColor = this.flashTimer > 0 ? '#fff' : (this.phase === 2 ? this.darkColor : this.color);
    ctx.fillStyle = fillColor;

    // Draw boss shape
    this._drawShape();

    // Inner detail
    ctx.fillStyle = this.phase === 2 ? '#ff5252' : this.darkColor;
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const a = (Math.PI / 4) * i - Math.PI / 8;
      const px = this.x + Math.cos(a) * this.radius * 0.6;
      const py = this.y + Math.sin(a) * this.radius * 0.6;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();

    // Boss symbol
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowBlur = 0;
    ctx.fillText(this.phase === 2 ? '☠' : this.symbol, this.x, this.y);

    ctx.restore();

    // Boss name above
    ctx.fillStyle = this.phase === 2 ? '#ff5252' : this.glowColor;
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(this.name, this.x, this.y - this.radius - 20);

    const currentAttack = this.attacks[this.attackPattern];
    const attackMeta = BOSS_ATTACK_META[currentAttack];
    ctx.fillStyle = attackMeta ? attackMeta.color : '#fff';
    ctx.beginPath();
    ctx.arc(this.x, this.y + this.radius + 12, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  _drawShape() {
    ctx.beginPath();
    switch (this.shape) {
      case 'octagon':
        for (let i = 0; i < 8; i++) {
          const a = (Math.PI / 4) * i - Math.PI / 8;
          const px = this.x + Math.cos(a) * this.radius;
          const py = this.y + Math.sin(a) * this.radius;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        break;
      case 'diamond':
        ctx.moveTo(this.x, this.y - this.radius);
        ctx.lineTo(this.x + this.radius, this.y);
        ctx.lineTo(this.x, this.y + this.radius);
        ctx.lineTo(this.x - this.radius, this.y);
        break;
      case 'hexagon':
        for (let i = 0; i < 6; i++) {
          const a = (Math.PI / 3) * i - Math.PI / 6;
          const px = this.x + Math.cos(a) * this.radius;
          const py = this.y + Math.sin(a) * this.radius;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        break;
      case 'square':
        ctx.rect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
        break;
      case 'circle':
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        break;
      default:
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    }
    ctx.closePath();
    ctx.fill();
  }
}

class Ally {
  constructor(x, y, type) {
    this.x = x;
    this.y = y;
    this.type = type;
    this.radius = 12;
    this.speed = 2.5;
    this.health = 60;
    this.maxHealth = 60;
    this.damage = 12;
    this.fireRate = 600;
    this.lastShot = 0;
    this.alive = true;
    this.color = '#4caf50';
    this.regenTimer = 0;
    this.dodgeDir = 0;
    this.dodgeTimer = 0;
    this.targetEnemy = null;
  }

  update(dt) {
    if (!this.alive) return false;

    // Health regeneration (slow heal)
    this.regenTimer += dt;
    if (this.regenTimer > 3000 && this.health < this.maxHealth) {
      this.regenTimer = 0;
      this.health = Math.min(this.maxHealth, this.health + 5);
    }

    // Dodge timer
    if (this.dodgeTimer > 0) this.dodgeTimer -= dt;

    // Find nearest threat
    const threat = findNearestThreat(this, 300);
    const nearest = threat.target;
    let nearDist = threat.distance;

    this.targetEnemy = nearest;

    // Smart AI: dodge bullets, maintain position, fight when safe
    const distToPlayer = dist(this, player);
    let moveX = 0, moveY = 0;

    // Dodge incoming bullets
    const nearbyEnemyBullets = enemyBulletSpatialGrid.size
      ? querySpatialGrid(enemyBulletSpatialGrid, this.x, this.y, 72, COLLISION_GRID_SIZE, enemyBulletGridQueryBuffer)
      : bullets;
    for (let i = 0; i < nearbyEnemyBullets.length; i++) {
      const b = nearbyEnemyBullets[i];
      if (b.owner === 'enemy') {
        const d = dist(this, b);
        if (d < 60) {
          const awayAngle = angle(b, this);
          moveX += Math.cos(awayAngle) * 3;
          moveY += Math.sin(awayAngle) * 3;
          this.dodgeTimer = 200;
        }
      }
    }

    if (nearest && nearDist < 350 && this.dodgeTimer <= 0) {
      // Fight mode: orbit enemy at safe distance
      const orbitAngle = angle(nearest, this) + 0.05;
      const preferredDist = 180;
      const currentDist = dist(this, nearest);

      if (currentDist > preferredDist + 30) {
        // Move closer
        const a = angle(this, nearest);
        moveX += Math.cos(a) * this.speed;
        moveY += Math.sin(a) * this.speed;
      } else if (currentDist < preferredDist - 30) {
        // Back off
        const a = angle(nearest, this);
        moveX += Math.cos(a) * this.speed * 0.8;
        moveY += Math.sin(a) * this.speed * 0.8;
      } else {
        // Orbit
        moveX += Math.cos(orbitAngle) * this.speed;
        moveY += Math.sin(orbitAngle) * this.speed;
      }

      // Shoot
      if (Date.now() - this.lastShot > this.fireRate && nearDist < 350) {
        const ba = angle(this, nearest);
        bullets.push(new Bullet(
          this.x + Math.cos(ba) * 14,
          this.y + Math.sin(ba) * 14,
          Math.cos(ba) * 7,
          Math.sin(ba) * 7,
          this.damage,
          'ally',
          '#81c784'
        ));
        this.lastShot = Date.now();
      }
    } else {
      // Follow player with formation
      const followAngle = angle(player, this);
      const followDist = 80;
      const currentDist = dist(this, player);

      if (currentDist > followDist + 20) {
        const a = angle(this, player);
        moveX += Math.cos(a) * this.speed * 0.9;
        moveY += Math.sin(a) * this.speed * 0.9;
      } else if (currentDist < followDist - 20) {
        const a = angle(player, this);
        moveX += Math.cos(a) * this.speed * 0.5;
        moveY += Math.sin(a) * this.speed * 0.5;
      } else {
        // Gentle orbit around player
        moveX += Math.cos(followAngle + 0.03) * this.speed * 0.4;
        moveY += Math.sin(followAngle + 0.03) * this.speed * 0.4;
      }
    }

    // Apply movement
    this.x += moveX;
    this.y += moveY;

    // Clamp
    this.x = clamp(this.x, this.radius, GAME_W - this.radius);
    this.y = clamp(this.y, this.radius, GAME_H - this.radius);

    return true;
  }

  takeDamage(amount) {
    this.health -= amount;
    if (this.health <= 0) {
      this.alive = false;
      // Ally death explosion - more dramatic
      for (let i = 0; i < 15; i++) {
        particles.push(new Particle(this.x, this.y, this.color, 3));
      }
    }
  }

  draw() {
    if (!this.alive) return;
    ctx.save();

    // Glow
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 10;

    // Outer ring (shield look)
    ctx.strokeStyle = `${this.color}88`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius + 3, 0, Math.PI * 2);
    ctx.stroke();

    // Body
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();

    // Inner detail (shows type)
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const icons = { propaganda: '★', contractor: '★', banker: '★', sniper: '★', rusher: '★', tank: '★' };
    ctx.fillText(icons[this.type] || '★', this.x, this.y);

    ctx.restore();

    // Health bar
    if (this.health < this.maxHealth) {
      const barW = this.radius * 2;
      const barH = 2;
      ctx.fillStyle = '#333';
      ctx.fillRect(this.x - barW / 2, this.y - this.radius - 6, barW, barH);
      ctx.fillStyle = this.color;
      ctx.fillRect(this.x - barW / 2, this.y - this.radius - 6, barW * (this.health / this.maxHealth), barH);
    }
  }
}

class PowerUp {
  constructor(x, y, type) {
    this.x = x;
    this.y = y;
    this.type = type;
    this.radius = 12;
    this.alive = true;
    this.bobOffset = rand(0, Math.PI * 2);
    this.magnetRange = 60;
    this.info = POWERUP_TYPES[type];
  }

  update(dt) {
    this.bobOffset += dt * 0.003;
    const d = dist(this, player);
    if (d < this.magnetRange) {
      const a = angle(this, player);
      this.x += Math.cos(a) * 3;
      this.y += Math.sin(a) * 3;
    }
    if (d < this.radius + player.radius) {
      this.activate();
      this.alive = false;
    }
  }

  activate() {
    playSound('pickup');
    switch (this.type) {
      case 'shield':
        player.shieldCharges = (player.shieldCharges || 0) + 3;
        waveAnnounceText = '🛡 Shield +3 hits!';
        break;
      case 'nuke':
        // Kill all regular enemies
        for (const e of enemies) {
          if (!e.converted) {
            sats.push(new Sat(e.x, e.y, e.satsValue));
            spawnExplosion(e.x, e.y, 10, e.color);
            player.score += e.scoreValue;
          }
        }
        enemies.length = 0;
        triggerShake(15, 400);
        playSound('explosion');
        waveAnnounceText = '☢ NUKE! Screen cleared!';
        break;
      case 'timeSlow':
        player.timeSlowTimer = 5000;
        waveAnnounceText = '⏱ Time Slow 5s!';
        break;
      case 'doubleDamage':
        player.damageBoostTimer = 10000;
        waveAnnounceText = '⚔ Double Damage 10s!';
        break;
      case 'invincibility':
        player.invincible = 5000;
        waveAnnounceText = '★ INVINCIBLE 5s!';
        break;
      case 'magnet':
        player.magnetTimer = 8000;
        waveAnnounceText = '⊕ Magnet 8s!';
        break;
    }
    waveAnnounceTimer = 2000;
    for (let i = 0; i < 12; i++) {
      particles.push(new Particle(this.x, this.y, this.info.color, 3));
    }
  }

  draw() {
    const bobY = this.y + Math.sin(this.bobOffset) * 3;
    ctx.save();
    ctx.shadowColor = this.info.color;
    ctx.shadowBlur = 12;
    ctx.fillStyle = this.info.color;
    ctx.beginPath();
    ctx.arc(this.x, bobY, this.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.info.icon, this.x, bobY);
    ctx.restore();
  }
}

// --- Screen Shake ---
let shakeX = 0, shakeY = 0;
let shakeIntensity = 0;
let shakeDuration = 0;
let shakeTimer = 0;

function triggerShake(intensity, duration) {
  shakeIntensity = intensity;
  shakeDuration = duration;
  shakeTimer = duration;
  if (intensity >= 3) {
    rumbleGamepad(
      clamp(intensity / 12, 0.18, 0.9),
      clamp(intensity / 20, 0.1, 0.7),
      clamp(duration, 50, 220)
    );
  }
}

function updateShake(dt) {
  if (reducedMotion) { shakeX = 0; shakeY = 0; return; }
  if (shakeTimer > 0) {
    shakeTimer -= dt;
    const progress = 1 - shakeTimer / shakeDuration;
    const currentIntensity = shakeIntensity * (1 - progress);
    shakeX = (Math.random() - 0.5) * currentIntensity * 2;
    shakeY = (Math.random() - 0.5) * currentIntensity * 2;
  } else {
    shakeX = 0;
    shakeY = 0;
  }
}

// --- Floating Damage Numbers ---
let damageNumbers = [];

function spawnDamageNumber(x, y, amount, color) {
  const isText = typeof amount === 'string';
  damageNumbers.push({
    x: x + rand(-10, 10),
    y: y,
    text: isText ? amount : Math.round(amount),
    color: color || '#fff',
    life: isText ? 1500 : 800,
    maxLife: isText ? 1500 : 800,
    vy: -1.5,
    isText: isText
  });
}

function updateDamageNumbers(dt) {
  for (let i = damageNumbers.length - 1; i >= 0; i--) {
    const dn = damageNumbers[i];
    dn.y += dn.vy;
    dn.life -= dt;
    if (dn.life <= 0) damageNumbers.splice(i, 1);
  }
}

function drawDamageNumbers() {
  for (const dn of damageNumbers) {
    const alpha = dn.life / dn.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = dn.color;
    ctx.font = dn.isText ? 'bold 16px monospace' : 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(dn.text, dn.x, dn.y);
  }
  ctx.globalAlpha = 1;
}

function getAimAssistTarget(playerEntity, fallbackTarget) {
  if (!playerEntity) return fallbackTarget;

  const currentAngle = Math.atan2(fallbackTarget.y - playerEntity.y, fallbackTarget.x - playerEntity.x);
  const maxAssistAngle = 0.42;
  const maxAssistDistance = 280;
  let bestTarget = null;
  let bestScore = Infinity;

  const considerTarget = target => {
    if (!target || target.alive === false || target.health <= 0) return;
    const dx = target.x - playerEntity.x;
    const dy = target.y - playerEntity.y;
    const targetDistance = Math.hypot(dx, dy);
    if (targetDistance > maxAssistDistance || targetDistance < 1) return;
    const targetAngle = Math.atan2(dy, dx);
    let diff = targetAngle - currentAngle;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    const angleDiff = Math.abs(diff);
    if (angleDiff > maxAssistAngle) return;
    const score = angleDiff * 200 + targetDistance;
    if (score < bestScore) {
      bestScore = score;
      bestTarget = target;
    }
  };

  for (const enemy of enemies) {
    if (!enemy.converted) considerTarget(enemy);
  }
  if (boss && boss.alive && !boss.entering) considerTarget(boss);

  if (!bestTarget) return fallbackTarget;

  return {
    x: lerp(fallbackTarget.x, bestTarget.x, 0.45),
    y: lerp(fallbackTarget.y, bestTarget.y, 0.45)
  };
}

function getAimTarget() {
  if (touchControlsEnabled && player && (touchState.rightId !== null || touchState.shootDown)) {
    const fallbackTarget = {
      x: player.x + touchState.aimX * 220,
      y: player.y + touchState.aimY * 220
    };
    return getAimAssistTarget(player, fallbackTarget);
  }
  if (gamepadState.connected && player && (gamepadState.aimActive || gamepadState.shootDown)) {
    const fallbackTarget = {
      x: player.x + gamepadState.aimX * 240,
      y: player.y + gamepadState.aimY * 240
    };
    return getAimAssistTarget(player, fallbackTarget);
  }
  return mouse;
}

function consumePrimaryShootPressed() {
  if (gamepadState.shootClicked) {
    gamepadState.shootClicked = false;
    return true;
  }
  if (touchControlsEnabled && touchState.shootClicked) {
    touchState.shootClicked = false;
    return true;
  }
  if (mouse.clicked) {
    mouse.clicked = false;
    return true;
  }
  return false;
}

function isPrimaryShootHeld() {
  return mouse.down || (touchControlsEnabled && touchState.shootDown) || gamepadState.shootDown;
}

let talentPoints = 0; // unspent talent points
let allocatedTalents = {}; // { talentId: rank }
let totalTalentPoints = 0; // earned from leveling

function getTalentRank(talentId) {
  return allocatedTalents[talentId] || 0;
}

function allocateTalent(branch, index) {
  const talent = TALENT_TREE[branch].talents[index];
  const currentRank = getTalentRank(talent.id);
  
  // Check requirements
  if (talent.requires && getTalentRank(talent.requires) === 0) return false;
  if (currentRank >= talent.maxRank) return false;
  if (talentPoints < talent.cost) return false;
  
  talentPoints -= talent.cost;
  allocatedTalents[talent.id] = currentRank + 1;
  playSound('talentSpend');
  saveTalents();
  return true;
}

function unallocateTalent(talentId) {
  if (!allocatedTalents[talentId]) return false;
  
  // Find the talent to get cost back
  for (const branch of Object.values(TALENT_TREE)) {
    for (const talent of branch.talents) {
      if (talent.id === talentId) {
        talentPoints += talent.cost;
        allocatedTalents[talentId]--;
        if (allocatedTalents[talentId] <= 0) delete allocatedTalents[talentId];
        saveTalents();
        return true;
      }
    }
  }
  return false;
}

function respecTalents() {
  // Refund all points
  for (const branch of Object.values(TALENT_TREE)) {
    for (const talent of branch.talents) {
      const rank = getTalentRank(talent.id);
      if (rank > 0) {
        talentPoints += rank * talent.cost;
      }
    }
  }
  allocatedTalents = {};
  saveTalents();
}

function getRespecCost() {
  return gameState === 'start' ? 0 : 500;
}

function canAffordRespec() {
  const cost = getRespecCost();
  if (cost <= 0) return true;
  return !!player && player.sats >= cost;
}

function tryRespecTalents() {
  const cost = getRespecCost();
  if (!canAffordRespec()) return false;
  if (cost > 0 && player) {
    player.sats -= cost;
  }
  respecTalents();
  return true;
}

function saveTalents() {
  try {
    localStorage.setItem('freedomTalents', JSON.stringify({ allocatedTalents, talentPoints, totalTalentPoints }));
  } catch (e) {}
}

function loadTalents() {
  try {
    const saved = localStorage.getItem('freedomTalents');
    if (saved) {
      const data = JSON.parse(saved);
      if (data.allocatedTalents) allocatedTalents = data.allocatedTalents;
      if (data.talentPoints !== undefined) talentPoints = data.talentPoints;
      if (data.totalTalentPoints !== undefined) totalTalentPoints = data.totalTalentPoints;
    }
  } catch (e) {}
}

// Get talent bonus multiplier
function getTalentBonus(type) {
  let bonus = 0;
  for (const branch of Object.values(TALENT_TREE)) {
    for (const talent of branch.talents) {
      const rank = getTalentRank(talent.id);
      if (rank > 0 && talent.bonus) {
        if (type === 'damage' && talent.id.startsWith('damage')) bonus += talent.bonus * rank;
        if (type === 'firerate' && talent.id.startsWith('firerate')) bonus += talent.bonus * rank;
        if (type === 'hp' && talent.id.startsWith('hp')) bonus += talent.bonus * rank;
        if (type === 'shield' && talent.id.startsWith('shield')) bonus += talent.bonus * rank;
        if (type === 'speed' && talent.id.startsWith('speed')) bonus += talent.bonus * rank;
        if (type === 'magnet' && talent.id.startsWith('magnet')) bonus += talent.bonus * rank;
        if (type === 'sats' && talent.id === 'sats') bonus += talent.bonus * rank;
        if (type === 'xp' && talent.id === 'xp') bonus += talent.bonus * rank;
      }
    }
  }
  return bonus;
}

function hasTalent(talentId) {
  return getTalentRank(talentId) > 0;
}

function addXP(amount) {
  // Apply XP bonus from level
  const levelBonus = PLAYER_LEVELS.find(l => l.level === playerLevel);
  const xpBonus = levelBonus?.bonus.includes('% XP') ? parseFloat(levelBonus.bonus) / 100 + 1 : 1;
  const xpTalentBonus = getTalentBonus('xp');
  playerXP += Math.floor(amount * xpBonus * (1 + xpTalentBonus));

  // Check level up
  while (playerXP >= xpForNextLevel && playerLevel < 15) {
    playerLevel++;
    totalTalentPoints++;
    talentPoints++;
    const nextLevel = PLAYER_LEVELS.find(l => l.level === playerLevel);
    if (nextLevel) xpForNextLevel = nextLevel.xp;
    else xpForNextLevel = playerXP + 1000;

    // Check for skin unlocks
    for (const [key, skin] of Object.entries(SKINS)) {
      if (skin.unlockLevel === playerLevel && !unlockedSkins.includes(key)) {
        unlockedSkins.push(key);
        waveAnnounceText = `🎨 Unlocked: ${skin.name} Skin!`;
        waveAnnounceTimer = 3000;
      }
    }
    
    if (talentPoints > 0) {
      waveAnnounceText = `⚡ Level Up! +1 Talent Point (${talentPoints} available)`;
      waveAnnounceTimer = 3000;
      playSound('levelUp');
    }
  }
  saveMetaProgression();
  saveTalents();
}

function applyStartingBonus() {
  const level = playerLevel;
  if (level >= 2) player.maxHealth += 10;
  if (level >= 6) player.maxHealth += 10;
  if (level >= 3 || level >= 8) player.sats += 5;

  // Apply selected bonus
  if (selectedBonus === 'health') player.maxHealth += 20;
  else if (selectedBonus === 'damage') player.baseDamage += 5;
  else if (selectedBonus === 'speed') player.baseSpeed += 0.5;

  // Apply talent bonuses
  const hpBonus = getTalentBonus('hp');
  player.maxHealth += hpBonus;

  const shieldBonus = getTalentBonus('shield');
  player.shieldCharges += shieldBonus;

  // Apply damage talent
  const dmgBonus = getTalentBonus('damage');
  if (dmgBonus > 0) player.baseDamage *= (1 + dmgBonus);

  // Glass Cannon: +20% DMG, -10% HP
  if (getTalentRank('glassCannon') > 0) {
    player.baseDamage *= 1.20;
    player.maxHealth = Math.floor(player.maxHealth * 0.90);
  }

  // Apply fire rate talent
  const frBonus = getTalentBonus('firerate');
  if (frBonus > 0) player.fireRate *= (1 - frBonus);

  // Apply speed talent
  const spdBonus = getTalentBonus('speed');
  if (spdBonus > 0) player.baseSpeed *= (1 + spdBonus);

  player.health = player.maxHealth;
}

// Seeded random for daily challenge
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

let dailyRng = null;

function getDailySeed() {
  const now = new Date();
  return now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();
}

function startDailyChallenge() {
  dailyMode = true;
  dailySeed = getDailySeed();

window.addEventListener('keydown', e => {
  // Key remapping
  if (remappingKey && gameState === 'start') {
    const newKey = e.key.toLowerCase();
    if (newKey !== 'escape') {
      keybinds[remappingKey] = newKey;
      saveKeybinds();
      remappingKey = null;
    }
    e.preventDefault();
    return;
  }

  requestAudioResume('keyboard');

  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    e.stopPropagation();
    const key = e.key.toLowerCase();
    if (key !== 'control' && key !== 'meta') {
      keys[key] = true;
    }
    return;
  }
  const key = e.key.toLowerCase();
  if (!e.repeat && (key === 'f' || key === 'enter' || e.code === 'Space')) {
    tryEnterFullscreen('keyboard');
  }
  keys[key] = true;
  // Pause toggle
  if (e.key === 'Escape' && gameState === 'playing') {
    paused = !paused;
    keys['escape'] = false;
    return;
  }
  if (gameState === 'playing' || gameState === 'shop') {
    e.preventDefault();
  }
}, true);
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
  if (gameState === 'playing' || gameState === 'shop') {
    e.preventDefault();
  }
}, true);

    const saved = localStorage.getItem('freedomGameSave');

      const data = JSON.parse(saved);
      unlockedAchievements = new Set(data.achievements || []);
      achievementMeta = data.achievementMeta || {};

        storedUnlockedWeapons = new Set(data.unlockedWeapons);
        player.unlockedWeapons = new Set(data.unlockedWeapons);
        player.weapons = [...player.unlockedWeapons];
        player.currentWeapon = 0;
      }

  // Apply meta progression bonuses

  bullets = [];
  particles = [];
  sats = [];
  shops = [];

  powerUps.length = 0;

  enemyBulletSpatialGrid.clear();

  comboCount = 0;
  comboTimer = 0;
  comboMultiplier = 1;

}

function unlockAchievement(ach) {
  if (!ach || unlockedAchievements.has(ach.id)) return false;
  unlockedAchievements.add(ach.id);
  newAchievements.push(ach);
  achievementMeta[ach.id] = {
    unlockedAt: Date.now(),
    wave,
    score: player ? player.score : 0
  };
  return true;
}

function finalizeRunStats() {
  if (!player) return;
  player.stats.runTimeMs = Date.now() - runStartTime;
  lastRunStats = {
    score: player.score,
    wave,
    sats: player.stats.totalSats,
    kills: player.stats.kills,
    converts: player.stats.converts,
    bossesKilled: player.stats.bossesKilled,
    shotsFired: player.stats.shotsFired,
    shotsHit: player.stats.shotsHit,
    damageDealt: Math.round(player.stats.damageDealt),
    elitesKilled: player.stats.elitesKilled || 0,
    minibossesKilled: player.stats.minibossesKilled || 0,
    bestCombo: player.stats.bestCombo || 0,
    runTimeMs: player.stats.runTimeMs
  };

  lifetimeStats.totalSats += player.stats.totalSats;
  lifetimeStats.totalConverts += player.stats.converts;
  lifetimeStats.totalShotsFired += player.stats.shotsFired;
  lifetimeStats.totalShotsHit += player.stats.shotsHit;
  lifetimeStats.totalDamageDealt += Math.round(player.stats.damageDealt);
  lifetimeStats.totalTimePlayed += player.stats.runTimeMs;
  lifetimeStats.totalDeaths++;
  lifetimeStats.bestWave = Math.max(lifetimeStats.bestWave || 0, wave);
  lifetimeStats.bestScore = Math.max(lifetimeStats.bestScore || 0, player.score);
  lifetimeStats.bestCombo = Math.max(lifetimeStats.bestCombo || 0, player.stats.bestCombo || 0);
  lifetimeStats.totalElitesKilled += player.stats.elitesKilled || 0;
  lifetimeStats.totalMinibossesKilled += player.stats.minibossesKilled || 0;
}

function checkAchievements() {
  if (!player) return;
  for (const ach of ACHIEVEMENTS) {
    if (unlockedAchievements.has(ach.id)) continue;
    if (ach.check(player.stats, wave, player.unlockedWeapons, visitedBiomes)) {
      if (!unlockAchievement(ach)) continue;
      
      // Achievement rewards
      switch (ach.id) {
        case 'firstBlood': // Starting bonus: +5 sats
          player.sats += 5;
          waveAnnounceText = `🏆 ${ach.name}! +5 starting sats`;
          break;
        case 'wave5': // Unlock: Red tint skin accent
          if (!unlockedSkins.includes('red')) unlockedSkins.push('red');
          waveAnnounceText = `🏆 ${ach.name}!`;
          break;
        case 'bossSlayer': // Starting bonus: +10 HP
          player.maxHealth += 10;
          player.health = Math.min(player.health + 10, player.maxHealth);
          waveAnnounceText = `🏆 ${ach.name}! +10 max HP`;
          break;
        case 'arsenal': // Unlock: All weapon mastery x2
          for (const w of Object.keys(weaponMastery)) {
            weaponMastery[w] *= 2;
          }
          waveAnnounceText = `🏆 ${ach.name}! Weapon mastery x2!`;
          break;
        case 'globetrotter': // Unlock: Rainbow skin trail effect
          waveAnnounceText = `🏆 ${ach.name}!`;
          break;
        default:
          waveAnnounceText = `🏆 ${ach.name}!`;
      }
      waveAnnounceTimer = 3000;
      playSound('levelUp');
    }
  }
}

function startWave() {
  wave++;
  shopWaveCounter++;

  // Biome change
  const newBiome = Math.floor((wave - 1) / biomeChangeWave) % BIOMES.length;
  if (newBiome !== currentBiome) {
    currentBiome = newBiome;
    visitedBiomes.add(currentBiome);
    waveAnnounceText = `BIOME: ${BIOMES[currentBiome].name}`;
    waveAnnounceTimer = 2500;
    // Transition flash
    biomeFlashTimer = 1000;
  } else if (wave % 3 === 0 && wave % 5 !== 0 && wave >= 6) {
    waveAnnounceText = `⚠ MINIBOSS WAVE ${wave} ⚠`;
    waveAnnounceTimer = 2500;
    biomeFlashTimer = 800;
  } else {
    waveAnnounceText = `WAVE ${wave}`;
    waveAnnounceTimer = 2000;
  }
  playSound('waveStart');

  // Boss wave every 5 waves
  if (wave % 5 === 0) {
    boss = new Boss(wave);
    playSound('bossEnter');
    triggerShake(15, 800);
    waveAnnounceText = `⚠ BOSS: ${boss.name} ⚠`;
    waveAnnounceTimer = 4000;
    // Flash effect for boss entrance
    bossFlashTimer = 1000;
    // Still spawn some minions during boss fights
    const minionCount = wave <= 10 ? 2 : Math.min(6, 2 + Math.floor(wave / 8));
    for (let i = 0; i < minionCount; i++) {
      let x, y;
      const side = randInt(0, 3);
      switch (side) {
        case 0: x = rand(20, GAME_W - 20); y = -20; break;
        case 1: x = GAME_W + 20; y = rand(20, GAME_H - 20); break;
        case 2: x = rand(20, GAME_W - 20); y = GAME_H + 20; break;
        default: x = -20; y = rand(20, GAME_H - 20); break;
      }
      const type = Math.random() < 0.5 ? 'propaganda' : 'contractor';
      const enemy = new Enemy(x, y, type, wave);
      enemy.convertTimer = enemy.convertWindow;
      enemies.push(enemy);
    }
    enemiesRemaining = minionCount;
    return;
  }

  // Determine enemy count and types based on wave
  const baseCount = 2 + Math.floor(wave * 1.5);
  const count = Math.min(baseCount, 25);

  // Miniboss every 3 waves (not on boss waves)
  const isMinibossWave = wave % 3 === 0 && wave % 5 !== 0 && wave >= 6;
  // Elite enemies start from wave 8
  const eliteChance = wave >= 15 ? 0.3 : wave >= 10 ? 0.15 : 0;

  for (let i = 0; i < count; i++) {
    // Spawn from edges
    let x, y;
    const side = randInt(0, 3);
    switch (side) {
      case 0: x = rand(20, GAME_W - 20); y = -20; break;
      case 1: x = GAME_W + 20; y = rand(20, GAME_H - 20); break;
      case 2: x = rand(20, GAME_W - 20); y = GAME_H + 20; break;
      default: x = -20; y = rand(20, GAME_H - 20); break;
    }

    // Type distribution shifts with waves
    let type;
    const r = Math.random();
    if (wave <= 2) {
      type = r < 0.7 ? 'propaganda' : 'contractor';
    } else if (wave <= 4) {
      type = r < 0.35 ? 'propaganda' : r < 0.65 ? 'contractor' : r < 0.85 ? 'banker' : 'rusher';
    } else if (wave <= 7) {
      type = r < 0.2 ? 'propaganda' : r < 0.4 ? 'contractor' : r < 0.6 ? 'banker' : r < 0.8 ? 'sniper' : 'rusher';
    } else if (wave <= 10) {
      type = r < 0.15 ? 'propaganda' : r < 0.3 ? 'contractor' : r < 0.45 ? 'banker' : r < 0.6 ? 'sniper' : r < 0.75 ? 'rusher' : 'tank';
    } else if (wave <= 15) {
      type = r < 0.1 ? 'propaganda' : r < 0.2 ? 'contractor' : r < 0.3 ? 'banker' : r < 0.4 ? 'sniper' : r < 0.5 ? 'rusher' : r < 0.6 ? 'tank' : r < 0.75 ? 'fraud' : 'corruption';
    } else if (wave <= 20) {
      type = r < 0.08 ? 'propaganda' : r < 0.16 ? 'contractor' : r < 0.24 ? 'banker' : r < 0.32 ? 'sniper' : r < 0.4 ? 'rusher' : r < 0.48 ? 'tank' : r < 0.6 ? 'fraud' : r < 0.72 ? 'corruption' : r < 0.85 ? 'taxes' : 'abuse';
    } else {
      // Late game: all enemy types including censorship
      type = r < 0.06 ? 'propaganda' : r < 0.12 ? 'contractor' : r < 0.18 ? 'banker' : r < 0.24 ? 'sniper' : r < 0.3 ? 'rusher' : r < 0.36 ? 'tank' : r < 0.46 ? 'fraud' : r < 0.56 ? 'corruption' : r < 0.66 ? 'taxes' : r < 0.76 ? 'abuse' : 'censorship';
    }

    const isElite = Math.random() < eliteChance;
    const isMiniboss = isMinibossWave && i === 0; // First enemy on miniboss wave is miniboss
    const enemy = new Enemy(x, y, type, wave, isElite, isMiniboss);
    if (!isElite && !isMiniboss) enemy.convertTimer = enemy.convertWindow;
    enemies.push(enemy);
  }

  enemiesRemaining = count;

  // Shop appears every 3 waves
  if (shopWaveCounter >= 3) {
    shopWaveCounter = 0;
    const sx = rand(100, GAME_W - 100);
    const sy = rand(100, GAME_H - 100);
    shops.push(new Shop(sx, sy));
  }
}

function spawnExplosion(x, y, count, color) {
  if (reducedMotion) count = Math.min(count, 5);
  if (particles.length >= MAX_PARTICLES) return;
  for (let i = 0; i < count; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    particles.push(new Particle(x, y, color || COLORS.particle[randInt(0, COLORS.particle.length - 1)], rand(2, 5)));
  }
}

function applyRadialDamage(x, y, radius, damage, owner, options = {}) {
  const {
    color = '#fff',
    particleCount = 12,
    shake = 0,
    sound = null,
    damageFalloff = 0.55,
    bossMultiplier = 0.75
  } = options;

  const validTargets = owner === 'player' || owner === 'ally'
    ? [
        ...enemies.filter(e => !e.converted && e.health > 0),
        ...(boss && boss.alive && !boss.entering ? [boss] : [])
      ]
    : [player, ...allies.filter(a => a.alive)];

  let hits = 0;
  for (const target of validTargets) {
    const d = Math.hypot(target.x - x, target.y - y);
    const effectiveRadius = radius + (target.radius || 0);
    if (d > effectiveRadius) continue;

    if ((owner === 'player' || owner === 'ally') && target.hasShield && target.shieldHP > 0) {
      target.shieldHP--;
      spawnDamageNumber(target.x, target.y, 'BLOCKED!', '#2196f3');
      hits++;
      continue;
    }

    const falloff = Math.max(damageFalloff, 1 - d / Math.max(1, effectiveRadius));
    target.takeDamage(damage * falloff * (target === boss ? bossMultiplier : 1), owner);
    hits++;
  }

  spawnExplosion(x, y, particleCount, color);
  if (shake > 0) triggerShake(shake, 180);
  if (sound) playSound(sound);
  return hits;
}

function getEnemyColorForType(type) {
  const colors = {
    propaganda: '#ff5722', contractor: '#e64a19', banker: '#d32f2f',
    sniper: '#7c4dff', rusher: '#ff4081', tank: '#607d8b',
    fraud: '#9c27b0', corruption: '#b8860b', taxes: '#78909c',
    abuse: '#d50000', censorship: '#111111'
  };
  return colors[type] || '#fff';
}

function getEnemyIcon(type) {
  const icons = { propaganda: '◆', contractor: '■', banker: '⬡', sniper: '▲', rusher: '●', tank: '⬢', fraud: '▼', corruption: '★', taxes: '%', abuse: '!', censorship: '█' };
  return icons[type] || '?';
}

// Render a simple colored icon for wave preview
function drawPreviewIcon(x, y, type) {
  const color = getEnemyColor(getEnemyColorForType(type));
  const s = 6;

  ctx.fillStyle = color;

  switch(type) {
    case 'propaganda': // diamond
      ctx.beginPath();
      ctx.moveTo(x, y - s);
      ctx.lineTo(x + s, y);
      ctx.lineTo(x, y + s);
      ctx.lineTo(x - s, y);
      ctx.closePath();
      ctx.fill();
      break;
    case 'contractor': // square
      ctx.fillRect(x - s, y - s, s * 2, s * 2);
      break;
    case 'banker': // hexagon
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i - Math.PI / 6;
        const px = x + Math.cos(a) * s;
        const py = y + Math.sin(a) * s;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      break;
    case 'sniper': // triangle
      ctx.beginPath();
      ctx.moveTo(x, y - s);
      ctx.lineTo(x + s, y + s);
      ctx.lineTo(x - s, y + s);
      ctx.closePath();
      ctx.fill();
      break;
    case 'rusher': // circle
      ctx.beginPath();
      ctx.arc(x, y, s, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'tank': // octagon
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const a = (Math.PI / 4) * i - Math.PI / 8;
        const px = x + Math.cos(a) * s;
        const py = y + Math.sin(a) * s;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      break;
    case 'fraud': // inverted triangle
      ctx.beginPath();
      ctx.moveTo(x, y + s);
      ctx.lineTo(x + s, y - s);
      ctx.lineTo(x - s, y - s);
      ctx.closePath();
      ctx.fill();
      break;
    case 'corruption': // star
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const a = (Math.PI / 5) * i - Math.PI / 2;
        const r = i % 2 === 0 ? s : s * 0.5;
        const px = x + Math.cos(a) * r;
        const py = y + Math.sin(a) * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      break;
    case 'taxes': // square with cut corner
      ctx.beginPath();
      ctx.moveTo(x - s, y - s);
      ctx.lineTo(x + s, y - s);
      ctx.lineTo(x + s, y + s * 0.3);
      ctx.lineTo(x + s * 0.3, y + s);
      ctx.lineTo(x - s, y + s);
      ctx.closePath();
      ctx.fill();
      break;
    case 'abuse': // jagged circle
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i;
        const r = s * (0.7 + Math.sin(i * 2.3) * 0.3);
        const px = x + Math.cos(a) * r;
        const py = y + Math.sin(a) * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      break;
    case 'censorship': // rectangle
      ctx.fillRect(x - s, y - s * 0.7, s * 2, s * 1.4);
      ctx.fillStyle = '#fff';
      ctx.fillRect(x - s * 0.8, y - 2, s * 1.6, 4);
      break;
    case 'boss': // skull
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('☠', x, y);
      break;
    default:
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('?', x, y);
  }
}

// Cache for wave previews so they don't jitter between random types
const wavePreviewCache = {};

function getWavePreview(waveNum) {
  // Return cached preview if available
  if (wavePreviewCache[waveNum]) return wavePreviewCache[waveNum];

  // Use seeded random based on wave number so preview is consistent
  let seed = waveNum * 7919; // prime number
  const seededRand = () => {
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    return seed / 0x7fffffff;
  };

  if (waveNum % 5 === 0) { wavePreviewCache[waveNum] = ['boss']; return ['boss']; }
  const types = ['propaganda', 'contractor', 'banker', 'sniper', 'rusher', 'tank'];
  const result = [];
  const count = Math.min(2 + Math.floor(waveNum * 1.5), 25);

  for (let i = 0; i < Math.min(count, 8); i++) {
    let type;
    const r = seededRand();
    if (waveNum <= 2) type = r < 0.7 ? 'propaganda' : 'contractor';
    else if (waveNum <= 4) type = r < 0.35 ? 'propaganda' : r < 0.65 ? 'contractor' : r < 0.85 ? 'banker' : 'rusher';
    else if (waveNum <= 7) type = r < 0.2 ? 'propaganda' : r < 0.4 ? 'contractor' : r < 0.6 ? 'banker' : r < 0.8 ? 'sniper' : 'rusher';
    else type = r < 0.15 ? 'propaganda' : r < 0.3 ? 'contractor' : r < 0.45 ? 'banker' : r < 0.65 ? 'sniper' : r < 0.8 ? 'rusher' : 'tank';
    result.push(type);
  }
  wavePreviewCache[waveNum] = result;
  return result;
}

function spawnHazard() {
  // Pick hazard type based on biome
  let type;
  switch (currentBiome) {
    case 1: type = 'sandstorm'; break; // Desert
    case 2: type = 'laserGrid'; break; // Underground
    case 3: type = 'trap'; break; // Wall Street
    case 4: type = 'blizzard'; break; // Arctic
    case 5: type = 'vineSnare'; break; // Jungle
    default: return;
  }

  const info = HAZARD_TYPES[type] || {};
  switch (type) {
    case 'sandstorm':
      hazards.push({
        type,
        life: 4000,
        maxLife: 4000,
        pushX: rand(-1, 1),
        pushY: rand(-1, 1),
        pushForce: info.pushForce,
        damage: 0
      });
      waveAnnounceText = '🌪 Sandstorm!';
      waveAnnounceTimer = 1500;
      break;
    case 'laserGrid':
      const horizontal = Math.random() < 0.5;
      if (horizontal) {
        const y = rand(50, GAME_H - 50);
        hazards.push({
          type, x1: 0, y1: y, x2: GAME_W, y2: y,
          life: 2000, maxLife: 2000, active: false,
          warnTime: 500, damage: info.damage, radius: 0
        });
      } else {
        const x = rand(50, GAME_W - 50);
        hazards.push({
          type, x1: x, y1: 0, x2: x, y2: GAME_H,
          life: 2000, maxLife: 2000, active: false,
          warnTime: 500, damage: info.damage, radius: 0
        });
      }
      break;
    case 'trap':
      hazards.push({
        type,
        x: rand(80, GAME_W - 80),
        y: rand(80, GAME_H - 80),
        radius: 25,
        life: info.duration,
        maxLife: info.duration,
        damage: info.damage
      });
      break;
    case 'blizzard':
      // Snowstorm that slows and damages
      hazards.push({
        type,
        life: 5000,
        maxLife: 5000,
        pushX: rand(-0.5, 0.5),
        pushY: rand(-1.5, -0.5),
        pushForce: info.pushForce || 0.5,
        damage: info.damage || 5
      });
      waveAnnounceText = '❄️ Blizzard!';
      waveAnnounceTimer = 1500;
      break;
    case 'vineSnare':
      // Stationary vine trap that roots player
      hazards.push({
        type,
        x: rand(80, GAME_W - 80),
        y: rand(80, GAME_H - 80),
        radius: 30,
        life: info.duration || 4000,
        maxLife: info.duration || 4000,
        damage: info.damage || 8
      });
      break;
  }
}

// UPDATE
// ============================================================

function update(dt) {
  updateShake(dt);
  updateDamageNumbers(dt);
  // Update death particles
  for (let i = deathParticles.length - 1; i >= 0; i--) {
    deathParticles[i].update(dt);
    if (!deathParticles[i].alive) deathParticles.splice(i, 1);
  }
  if (deathTimer > 0) deathTimer -= dt;
  if (bossFlashTimer > 0) bossFlashTimer -= dt;
  if (biomeFlashTimer > 0) biomeFlashTimer -= dt;

  if (gameState === 'playing') {
    // Regeneration talent
    if (hasTalent('regen') && player && player.health < player.maxHealth) {
      player.regenTimer = (player.regenTimer || 0) + dt;
      if (player.regenTimer >= 5000) {
        player.regenTimer = 0;
        player.heal(1);
      }
    }
    updatePlaying(dt);
  } else if (gameState === 'shop') {
    updateShop(dt);
  }
}

function updatePlaying(dt) {
  // Tutorial hints
  checkTutorialHints();
  player.stats.runTimeMs += dt;

  // Player
  player.update(dt);

  // Weapon switching (1-6 keys)
  if (keys[keybinds.weapon1]) { player.currentWeapon = 0; keys[keybinds.weapon1] = false; }
  if (keys[keybinds.weapon2] && player.weapons.length > 1) { player.currentWeapon = 1; keys[keybinds.weapon2] = false; }
  if (keys[keybinds.weapon3] && player.weapons.length > 2) { player.currentWeapon = 2; keys[keybinds.weapon3] = false; }
  if (keys[keybinds.weapon4] && player.weapons.length > 3) { player.currentWeapon = 3; keys[keybinds.weapon4] = false; }
  if (keys['5'] && player.weapons.length > 4) { player.currentWeapon = 4; keys['5'] = false; }
  if (keys['6'] && player.weapons.length > 5) { player.currentWeapon = 5; keys['6'] = false; }
  if (gamepadState.prevWeaponPressed && player.weapons.length > 1) {
    player.currentWeapon = (player.currentWeapon - 1 + player.weapons.length) % player.weapons.length;
  }
  if (gamepadState.nextWeaponPressed && player.weapons.length > 1) {
    player.currentWeapon = (player.currentWeapon + 1) % player.weapons.length;
  }

  // Laser firing (hold mouse with laser selected)
  if (player.weapons[player.currentWeapon] === 'laser' && isPrimaryShootHeld()) {
    player.laserChargeTime += 16;
    if (player.laserChargeTime > 300 && Date.now() - player.lastShot > 200) {
      player.fireLaser();
      player.laserChargeTime = 0;
      player.lastShot = Date.now();
    }
  } else {
    player.laserChargeTime = 0;
  }

  // Railgun firing (hold to charge, release to fire)
  if (player.weapons[player.currentWeapon] === 'railgun') {
    if (isPrimaryShootHeld()) {
      player.railChargeTime = (player.railChargeTime || 0) + 16;
      if (player.railChargeTime >= 1000 && Date.now() - player.lastShot > 120) {
        player.fireRailgun();
      }
    } else if (player.railChargeTime > 0) {
      player.fireRailgun();
    }
  }

  // Check shop proximity
  let nearShop = shops.find(s => s.active && dist(s, player) < 60);
  const gamepadShopInteractPressed = nearShop && gamepadState.confirmPressed;
  if ((keys[keybinds.shop] || gamepadState.shopPressed || gamepadShopInteractPressed) && nearShop && !nearShop.open) {
    gameState = 'shop';
    nearShop.open = true;
    shopSelection = 0;
    playSound('shopOpen');
    keys[keybinds.shop] = false;
    gamepadState.shopPressed = false;
    gamepadState.confirmPressed = false;
    return;
  }

  // Wake up (convert) mechanic
  const convertKey = keybinds.convert;
  if (keys[convertKey] || gamepadState.convertPressed) {
    keys[convertKey] = false;
    for (let i = 0; i < enemies.length; i++) {
      const enemy = enemies[i];
      if (!enemy.converted && enemy.convertTimer > 0 && dist(enemy, player) < 60) {
        // Bonus sats for converting
        const bonusSats = enemy.satsValue * 2;
        player.sats += bonusSats;
        player.score += enemy.scoreValue * 2;
        playSound('convert');
        triggerShake(3, 100);
        // Convert particles (bigger effect)
        for (let j = 0; j < 15; j++) {
          particles.push(new Particle(enemy.x, enemy.y, COLORS.convert, 3));
        }
        // Always spawn ally (cap at MAX_ALLIES to prevent slowdown)
        if (allies.length < MAX_ALLIES) {
          const ally = new Ally(enemy.x, enemy.y, enemy.type);
          ally.health = ally.maxHealth; // Full health on spawn
          allies.push(ally);
        }
        // Convert flash
        spawnDamageNumber(enemy.x, enemy.y, 'CONVERTED!', '#4caf50');
        // Remove enemy immediately so wave can progress
        player.stats.converts++;
        enemies.splice(i, 1);
        waveAnnounceText = '🔔 WAKE UP! Ally recruited! +' + bonusSats + ' sats';
        waveAnnounceTimer = 2000;
        break; // one at a time
      }
    }
  }

  // Enemies (slowed during timeSlow)
  const timeScale = player.timeSlowTimer > 0 ? 0.4 : 1;
  filterInPlace(enemies, e => {
    const alive = e.update(dt * timeScale);
    if (!alive) {
      // Converted enemy faded away
      return false;
    }
    // Check death
    if (e.health <= 0 && !e.converted) {
      // Explosive elite/miniboss: AoE damage on death
      if (e.isExplosive) {
        const explosionRadius = e.isMiniboss ? 120 : 80;
        const explosionDmg = e.isMiniboss ? 30 : 15;
        // Check if player is in range
        if (dist(e, player) < explosionRadius + player.radius) {
          player.takeDamage(explosionDmg);
          waveAnnounceText = `💥 EXPLOSIVE! -${explosionDmg} HP`;
          waveAnnounceTimer = 1000;
        }
        // Big explosion effect
        spawnExplosion(e.x, e.y, e.isMiniboss ? 40 : 25, e.eliteColor || '#ff5722');
        triggerShake(e.isMiniboss ? 8 : 5, e.isMiniboss ? 300 : 200);
      }
      
      // Combo system
      comboCount++;
      comboTimer = COMBO_WINDOW;
      comboMultiplier = 1 + (comboCount - 1) * 0.2;
      const bonusScore = Math.floor(e.scoreValue * comboMultiplier);
      player.score += bonusScore;
      player.stats.kills++;
      lifetimeStats.totalKills++;
      if (e.isElite) player.stats.elitesKilled = (player.stats.elitesKilled || 0) + 1;
      if (e.isMiniboss) player.stats.minibossesKilled = (player.stats.minibossesKilled || 0) + 1;

      // Grant XP (10 per kill, modified by daily)
      const xpGain = dailyMode ? Math.floor(10 * (dailyModifiers.xpBonus || 1)) : 10;
      addXP(xpGain);

      // Weapon mastery for the weapon used
      const wep = player.weapons[player.currentWeapon];
      if (weaponMastery[wep] !== undefined) weaponMastery[wep]++;

      // Drop sats
      sats.push(new Sat(e.x, e.y, e.satsValue));
      // Explosion
      spawnExplosion(e.x, e.y, 15, e.color);
      playSound('explosion');
      triggerShake(4, 150);

      // Power-up drop chance (10%, modified by daily)
      const powerupChance = dailyMode ? 0.1 * (dailyModifiers.powerupRate || 1) : 0.1;
      if (Math.random() < powerupChance) {
        const types = Object.keys(POWERUP_TYPES);
        powerUps.push(new PowerUp(e.x, e.y, types[randInt(0, types.length - 1)]));
      }

      return false;
    }
    // Collision with player
    if (circleCollision(e, player) && !e.converted) {
      player.takeDamage(e.damage);
      // Knockback
      const a = angle(e, player);
      e.x -= Math.cos(a) * 20;
      e.y -= Math.sin(a) * 20;
    }
    return true;
  });

  // Boss
  if (boss && boss.alive) {
    boss.update(dt);
    // Boss collision with player
    if (circleCollision(boss, player)) {
      player.takeDamage(20);
      const a = angle(boss, player);
      player.x += Math.cos(a) * 30;
      player.y += Math.sin(a) * 30;
    }
  }

  rebuildSpatialGrid(enemies, enemySpatialGrid, COLLISION_GRID_SIZE, enemy => !enemy.converted && enemy.health > 0);

  // Bullets
  filterInPlace(bullets, b => {
    // Homing bullet logic
    if (b.homing && b.target) {
      const targetAlive = b.target.alive !== false || (b.target.health !== undefined && b.target.health > 0);
      if (targetAlive) {
        const ta = angle(b, b.target);
        const currentA = Math.atan2(b.vy, b.vx);
        let diff = ta - currentA;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        const newA = currentA + Math.sign(diff) * Math.min(Math.abs(diff), b.turnSpeed);
        const speed = Math.hypot(b.vx, b.vy);
        b.vx = Math.cos(newA) * speed;
        b.vy = Math.sin(newA) * speed;
      }
    }

    b.update();
    if (!b.alive) return false;

    if (b.owner === 'player' || b.owner === 'ally') {
      // Hit boss
      if (boss && boss.alive && !boss.entering && circleCollision(b, boss)) {
        if (b.explosionRadius) {
          const hits = applyRadialDamage(b.x, b.y, b.explosionRadius, b.splashDamage || b.damage, b.owner, {
            color: b.impactColor || b.color,
            particleCount: b.impactParticleCount || 18,
            shake: b.impactShake || 10,
            sound: 'explosion',
            bossMultiplier: 1
          });
          if (b.owner === 'player' && hits > 0) player.stats.shotsHit++;
        } else {
          boss.takeDamage(b.damage, b.owner);
          if (b.owner === 'player') player.stats.shotsHit++;
        }
        b.alive = false;
        return false;
      }
      // Hit enemies
      const nearbyEnemies = enemySpatialGrid.size
        ? querySpatialGrid(enemySpatialGrid, b.x, b.y, 64, COLLISION_GRID_SIZE, enemyGridQueryBuffer)
        : enemies;
      for (let i = 0; i < nearbyEnemies.length; i++) {
        const e = nearbyEnemies[i];
        if (!e.converted && e.health > 0 && circleCollision(b, e)) {
          if (b.explosionRadius) {
            const hits = applyRadialDamage(b.x, b.y, b.explosionRadius, b.splashDamage || b.damage, b.owner, {
              color: b.impactColor || b.color,
              particleCount: b.impactParticleCount || 18,
              shake: b.impactShake || 10,
              sound: 'explosion'
            });
            if (b.owner === 'player' && hits > 0) player.stats.shotsHit++;
          } else {
            // Shield absorption
            if (e.hasShield && e.shieldHP > 0) {
              e.shieldHP--;
              spawnDamageNumber(e.x, e.y, 'BLOCKED!', '#2196f3');
            } else {
              e.takeDamage(b.damage, b.owner);
              if (b.owner === 'player') player.stats.shotsHit++;
            }
          }
          b.alive = false;
          return false;
        }
      }
    } else {
      // Hit player
      if (circleCollision(b, player)) {
        player.takeDamage(b.damage);
        b.alive = false;
        return false;
      }
      // Hit allies
      for (const a of allies) {
        if (a.alive && circleCollision(b, a)) {
          a.takeDamage(b.damage);
          b.alive = false;
          return false;
        }
      }
    }
    return true;
  });

  rebuildSpatialGrid(bullets, enemyBulletSpatialGrid, COLLISION_GRID_SIZE, bullet => bullet.owner === 'enemy' && bullet.alive);

  // Laser beams update
  for (let i = laserBeams.length - 1; i >= 0; i--) {
    laserBeams[i].life -= dt;
    if (laserBeams[i].life <= 0) laserBeams.splice(i, 1);
  }

  // Allies
  filterInPlace(allies, a => {
    const alive = a.update(dt);
    if (!alive) return false;
    // Check ally collision with enemies
    const nearbyEnemies = enemySpatialGrid.size
      ? querySpatialGrid(enemySpatialGrid, a.x, a.y, 72, COLLISION_GRID_SIZE, enemyGridQueryBuffer)
      : enemies;
    for (let i = 0; i < nearbyEnemies.length; i++) {
      const e = nearbyEnemies[i];
      if (!e.converted && e.health > 0 && circleCollision(a, e)) {
        e.takeDamage(5, 'ally');
        a.takeDamage(e.damage);
      }
    }
    return true;
  });

  // Power-ups
  filterInPlace(powerUps, p => {
    p.update(dt);
    return p.alive;
  });

  // Environmental hazards
  hazardTimer += dt;
  if (hazardTimer >= hazardInterval && currentBiome > 0) { // no hazards in first biome
    hazardTimer = 0;
    spawnHazard();
  }
  filterInPlace(hazards, h => {
    h.life -= dt;
    if (h.life <= 0) return false;
    // Activate laser after warning period
    if (h.type === 'laserGrid' && !h.active && h.life <= h.warnTime) {
      h.active = true;
    }
    // Check player collision
    if (h.type === 'trap' && dist(h, player) < h.radius + player.radius) {
      player.takeDamage(h.damage);
    }
    if (h.type === 'vineSnare' && dist(h, player) < h.radius + player.radius) {
      player.takeDamage(h.damage);
    }
    if (h.type === 'blizzard') {
      // Blizzard pushes player and deals rare chip damage
      player.x += h.pushX * h.pushForce;
      player.y += h.pushY * h.pushForce;
      // Damage only once per 100 frames (~1.6 seconds) to avoid performance issues
      if (Math.random() < 0.005) player.takeDamage(h.damage);
    }
    if (h.type === 'laserGrid' && h.active) {
      // Simple line check - if player is near laser line
      const dx = h.x2 - h.x1;
      const dy = h.y2 - h.y1;
      const len = Math.hypot(dx, dy);
      const proj = ((player.x - h.x1) * dx + (player.y - h.y1) * dy) / (len * len);
      if (proj >= 0 && proj <= 1) {
        const closestX = h.x1 + dx * proj;
        const closestY = h.y1 + dy * proj;
        if (Math.hypot(player.x - closestX, player.y - closestY) < 15) {
          player.takeDamage(h.damage);
          h.active = false; // one hit per laser
        }
      }
    }
    if (h.type === 'sandstorm') {
      // Push player
      player.x += h.pushX * h.pushForce;
      player.y += h.pushY * h.pushForce;
    }
    return true;
  });

  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) {
      comboCount = 0;
      comboMultiplier = 1;
    }
    player.stats.bestCombo = Math.max(player.stats.bestCombo || 0, comboCount);
    // Check combo achievement
    if (comboCount >= 10 && !unlockedAchievements.has('combo10')) {
      const ach = ACHIEVEMENTS.find(a => a.id === 'combo10');
      if (ach && unlockAchievement(ach)) {
        waveAnnounceText = `🏆 ${ach.name}!`;
        waveAnnounceTimer = 2500;
      }
    }
  }

  // Particles
  filterInPlace(particles, p => {
    p.update(dt);
    return p.alive;
  });

  // Sats
  filterInPlace(sats, s => {
    s.update(dt);
    return s.alive;
  });

  // Wave management
  const bossAlive = boss && boss.alive;
  if (!bossAlive && enemies.length === 0) {
    waveTimer -= dt;
    if (waveTimer <= 0) {
      // Grant XP for wave completion
      lifetimeStats.totalWaves++;
      player.stats.wavesCompleted++;
      addXP(5 + wave); // More XP for later waves
      startWave();
      waveTimer = waveDelay;
    }
  }

  // Boss death check
  if (boss && boss.alive && boss.health <= 0) {
    boss.alive = false;
    playSound('bossDeath');
    triggerShake(15, 600);
    spawnExplosion(boss.x, boss.y, 50, '#ff5252');
    spawnExplosion(boss.x, boss.y, 30, '#F7931A');
    // Massive sat reward
    sats.push(new Sat(boss.x - 30, boss.y, boss.satsValue));
    player.score += boss.scoreValue;
    player.stats.bossesKilled++;
    lifetimeStats.totalBosses++;
    // Track The System boss kill
    if (boss && boss.type === 'theSystem') {
      player.stats.systemKilled = (player.stats.systemKilled || 0) + 1;
    }
    // Boss grants 50 XP
    addXP(50);
    waveAnnounceText = 'BOSS DEFEATED! +' + boss.satsValue + ' sats';
    waveAnnounceTimer = 2500;
    boss = null;
    waveTimer = 2000; // brief pause before next wave
    checkAchievements();
  }

  // Wave announce
  if (waveAnnounceTimer > 0) waveAnnounceTimer -= dt;

  // Keep general achievements current instead of only checking on boss death.
  checkAchievements();

  // Game over check
  if (player.health <= 0) {
    gameState = 'gameover';
    playSound('gameOver');
    triggerShake(12, 500);
    spawnExplosion(player.x, player.y, 30);
    // Death animation particles
    deathTimer = 1500;
    for (let i = 0; i < 40; i++) {
      deathParticles.push(new Particle(player.x, player.y, COLORS.player, rand(3, 7)));
    }
    // High score
    if (player.score > player.highScore) {
      player.highScore = player.score;
    }
    finalizeRunStats();
    saveGame();
    saveMetaProgression();
  }
}

function updateShop(dt) {
  const buyShopItem = index => {
    const item = shopItems[index];
    if (!item) return;
    shopSelection = index;
    if (player.sats >= item.cost) {
      player.sats -= item.cost;
      playSound('purchase');
      if (item.type === 'weapon') {
        if (!player.unlockedWeapons.has(item.weapon)) {
          player.unlockedWeapons.add(item.weapon);
        }
        if (item.ammo) {
          player.weaponAmmo[item.weapon] = (player.weaponAmmo[item.weapon] || 0) + item.ammo;
        }
        player.equipWeapon(item.weapon);
      } else {
        switch (index) {
          case 0: player.heal(50); break;
          case 1: player.damageBoostTimer = 30000; break;
          case 2: player.speedBoostTimer = 30000; break;
        }
      }
      waveAnnounceText = 'Purchased: ' + item.name;
      waveAnnounceTimer = 1500;
    } else {
      waveAnnounceText = 'Not enough sats!';
      waveAnnounceTimer = 1000;
    }
  };

  // Navigate shop
  const SHOP_NAV_COOLDOWN = 180; // ms between stick scrolls
  const now = Date.now();

  if (keys['w'] || keys['arrowup'] || gamepadState.menuUpPressed) {
    shopSelection = (shopSelection - 1 + shopItems.length) % shopItems.length;
    keys['w'] = false;
    keys['arrowup'] = false;
    gamepadState._shopNavTimer = now;
  } else if (gamepadState.moveY < -0.5 && (now - (gamepadState._shopNavTimer || 0)) > SHOP_NAV_COOLDOWN) {
    shopSelection = (shopSelection - 1 + shopItems.length) % shopItems.length;
    gamepadState._shopNavTimer = now;
  }

  if (keys['s'] || keys['arrowdown'] || gamepadState.menuDownPressed) {
    shopSelection = (shopSelection + 1) % shopItems.length;
    keys['s'] = false;
    keys['arrowdown'] = false;
    gamepadState._shopNavTimer = now;
  } else if (gamepadState.moveY > 0.5 && (now - (gamepadState._shopNavTimer || 0)) > SHOP_NAV_COOLDOWN) {
    shopSelection = (shopSelection + 1) % shopItems.length;
    gamepadState._shopNavTimer = now;
  }

  if (keys[' '] || keys['enter'] || gamepadState.confirmPressed) {
    buyShopItem(shopSelection);
    keys['enter'] = false;
    keys[' '] = false;
  }

  if (mouse.clicked) {
    const boxW = 380;
    const boxH = 480;
    const boxX = GAME_W / 2 - boxW / 2;
    const boxY = GAME_H / 2 - boxH / 2;
    const closeY = boxY + boxH - 30;

    if (mouse.x >= boxX + 10 && mouse.x <= boxX + boxW - 10) {
      for (let i = 0; i < shopItems.length; i++) {
        const iy = boxY + 80 + i * 48;
        if (mouse.y >= iy - 15 && mouse.y <= iy + 25) {
          buyShopItem(i);
          break;
        }
      }
    }

    if (mouse.y >= closeY) {
      const shop = shops.find(s => s.open);
      if (shop) shop.open = false;
      gameState = 'playing';
    }
    mouse.clicked = false;
    mouse.down = false;
  }

  if (keys[keybinds.shop] || keys[keybinds.pause] || gamepadState.backPressed || gamepadState.pausePressed) {
    // Close shop
    const shop = shops.find(s => s.open);
    if (shop) shop.open = false;
    gameState = 'playing';
    keys[keybinds.shop] = false;
    keys[keybinds.pause] = false;
  }
}
